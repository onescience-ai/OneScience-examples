onescience_manifest_version: "0.1"
resource_type: model

resource:
  id: OneScience/GP_for_TO
  name: GP_for_TO
  domain: cfd
  domain_tags:
    - cfd
    - topology_optimization
    - gaussian_process
    - physics_informed_learning
    - stokes_flow
  task: physics_informed_topology_optimization
  task_tags:
    - train
    - optimization
    - visualization
    - meshfree_method
  modalities:
    - collocation_points
    - boundary_conditions
    - continuous_fields
  input_formats:
    - command_line_args
    - generated_tensors
  output_formats:
    - png
    - console_log
    - loss_history
  summary: 基于物理信息高斯过程的 CFD 拓扑优化标准运行包，支持 doublepipe、diffuser、rugby 和 pipebend 四类 Stokes 流设计问题。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/GP_for_TO
    repo_type: model
    url: https://modelscope.cn/models/OneScience/GP_for_TO
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: unknown

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/GP_for_TO
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: false
    default_run_goal: minimal_validation
    cwd_note: 如果使用 modelscope download --cache_dir 下载模型，请先 cd 到实际下载后的模型包根目录再执行 commands 中的命令。

runtime:
  enabled: true
  onescience_domain: cfd
  min_onescience_version: null
  supported_execution:
    - local_cpu_preflight
    - local_gpu_training
    - local_slurm
    - remote_slurm
  environment:
    required_env: {}
    optional_env:
      ONESCIENCE_SRC: 当 OneScience 未安装为 Python 包时，可指向 onescience/src 以便预检脚本执行 --check-imports。
      MPLCONFIGDIR: Matplotlib 可写缓存目录；集群或只读 HOME 环境建议设置到 /tmp 下。
      MODELSCOPE_CACHE: ModelScope 下载缓存目录。
  dependencies:
    python: ">=3.10"
    python_packages:
      - onescience
      - torch
      - gpytorch
      - numpy
      - matplotlib
      - tqdm
      - pyyaml

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh cfd
  source_paths:
    - onescience/src/onescience/models/GPs
    - onescience/src/onescience/utils/GP_TO
  compatibility:
    examples_path: onescience/examples/cfd/GP_for_TO
    status: examples_compatible
  config_loader: null
  datapipe: onescience.utils.GP_TO.get_data_fluid
  model_classes:
    - onescience.models.GPs.GPPLUS

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: null
    checkpoint_dir: null
    data_dir: null
    output_dir: .
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - main_TO.py
    - train.py
    - slurm.sh
    - scripts/preflight_gp_for_to.py
  entrypoints:
    preflight: scripts/preflight_gp_for_to.py
    inference: null
    train: main_TO.py
    finetune: null
    evaluate: null
    visualize: main_TO.py
    deploy: null

files:
  model_files:
    - id: main_entry
      path: main_TO.py
      role: training_optimization_entry
      description_zh: GP_for_TO 主入口，按 --problem 生成配点和边界样本，构建四个 GPPLUS 输出模型并启动拓扑优化训练。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/GP_for_TO
        repo_type: model
        path: main_TO.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: main_TO.py
      size: null
      checksum: null
      large_file: false
    - id: train_helper
      path: train.py
      role: optimization_loop
      description_zh: 损失函数、动态权重、PDE 残差、体积约束和可视化 checkpoint 逻辑。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/GP_for_TO
        repo_type: model
        path: train.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: train.py
      size: null
      checksum: null
      large_file: false
    - id: slurm_script
      path: slurm.sh
      role: cluster_example
      description_zh: Slurm/DCU 集群运行示例，默认执行 doublepipe 问题。
      required: false
      required_for: [train]
      format: sh
      source:
        platform: modelscope
        repo_id: OneScience/GP_for_TO
        repo_type: model
        path: slurm.sh
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: slurm.sh
      size: null
      checksum: null
      large_file: false
  dataset_files: []
  config_files: []
  sample_files:
    - id: preflight_script
      path: scripts/preflight_gp_for_to.py
      role: preflight
      description_zh: 模型运行前检查脚本；默认检查文件、入口参数和无外部数据集约束，可用 --check-imports 检查 OneScience GP 依赖与生成张量 schema。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/GP_for_TO
        repo_type: model
        path: scripts/preflight_gp_for_to.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: scripts/preflight_gp_for_to.py
      size: null
      checksum: null
      large_file: false

relations:
  required_datasets: []
  optional_datasets: []
  compatible_models: []
  data_policy:
    external_dataset_required: false
    reason: 原始任务说明指出数据集未开源；GP_for_TO 运行时通过 onescience.utils.GP_TO.get_data_fluid 生成配点、边界条件和状态变量训练目标，不需要上传或下载外部数据集。

configuration_adaptation:
  - file: main_TO.py
    yaml_path: null
    original_value:
      problem_choices: [doublepipe, diffuser, rugby, pipebend]
      N_train_per_BC: 25
      N_col_domain: 10000
      num_iter: 50000
    current_value:
      problem_choices: [doublepipe, diffuser, rugby, pipebend]
      N_train_per_BC: 25
      N_col_domain: 10000
      num_iter: 50000
    reason: 原始模型没有 YAML 配置，且运行数据由代码生成；标准包未修改训练参数，只在 Manifest 中显式记录关键参数以便网页端大模型预检。

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      required_datasets: []
      required_model_files:
        - main_TO.py
        - train.py
        - slurm.sh
        - scripts/preflight_gp_for_to.py
      required_dataset_files: []
      preconditions:
        - 已下载 OneScience/GP_for_TO 模型包。
        - 当前工作目录为模型包根目录。
      command_refs:
        - commands.preflight.model_preflight
      outputs:
        - 控制台输出 [OK] model preflight completed。
    - name: runtime_dependency_validation
      capability: preflight
      required_datasets: []
      required_model_files:
        - main_TO.py
        - train.py
        - scripts/preflight_gp_for_to.py
      required_dataset_files: []
      preconditions:
        - 已安装 OneScience CFD 依赖、torch、gpytorch、numpy、matplotlib 和 tqdm。
        - 如 OneScience 未安装为 Python 包，设置 ONESCIENCE_SRC 或传入 --onescience-src。
      command_refs:
        - commands.preflight.runtime_import_preflight
      outputs:
        - 控制台输出 runtime imports and generated data schema are valid。
    - name: train_doublepipe
      capability: train
      required_datasets: []
      required_model_files:
        - main_TO.py
        - train.py
      required_dataset_files: []
      preconditions:
        - 已通过 runtime_dependency_validation。
        - 有可用 GPU 或接受 CPU 长时间运行。
      command_refs:
        - commands.train.train_doublepipe
      outputs:
        - 训练日志和 tqdm loss。
        - checkpoint 迭代处生成的损失曲线、密度场、速度场和残差图。
    - name: train_selected_problem
      capability: train
      required_datasets: []
      required_model_files:
        - main_TO.py
        - train.py
      required_dataset_files: []
      preconditions:
        - problem 必须是 doublepipe、diffuser、rugby 或 pipebend。
        - 已安装 OneScience CFD 依赖。
      command_refs:
        - commands.train.train_selected_problem
      outputs:
        - 指定拓扑优化问题的训练日志和可视化图像。

capabilities:
  inference: false
  train: true
  finetune: false
  evaluate: false
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载完整 GP_for_TO 模型标准运行包。
      target: model
      repo_id: OneScience/GP_for_TO
      source: .
      local_path: session_workdir/
      required: true
      required_for: [preflight, train, visualize]
      command: modelscope download --model OneScience/GP_for_TO
  preflight:
    - name: model_preflight
      description: 执行不依赖 torch/gpytorch 的结构预检，确认入口脚本、参数和无外部数据集约束。
      cwd: .
      command: python scripts/preflight_gp_for_to.py --repo-root .
      required_files:
        - main_TO.py
        - train.py
        - slurm.sh
        - scripts/preflight_gp_for_to.py
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
      success_criteria:
        - exit_code == 0
        - stdout_contains: "[OK] model preflight completed"
    - name: runtime_import_preflight
      description: 完整运行依赖预检，导入 torch、gpytorch、OneScience GP 模块并验证生成数据 schema。
      cwd: .
      command: python scripts/preflight_gp_for_to.py --repo-root . --problem doublepipe --check-imports
      required_files:
        - main_TO.py
        - train.py
        - scripts/preflight_gp_for_to.py
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
      success_criteria:
        - exit_code == 0
        - stdout_contains: "runtime imports and generated data schema are valid"
  prepare: []
  inference: []
  train:
    - name: train_doublepipe
      description: 默认 doublepipe 拓扑优化训练。
      cwd: .
      command: python main_TO.py --problem doublepipe --gpu 0
      required_files:
        - main_TO.py
        - train.py
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
        - path: ./*.png
          type: file_group
      success_criteria:
        - exit_code == 0
    - name: train_selected_problem
      description: 对指定问题执行拓扑优化训练；problem 可选 doublepipe、diffuser、rugby、pipebend。
      cwd: .
      command: python main_TO.py --problem <doublepipe|diffuser|rugby|pipebend> --gpu 0
      required_files:
        - main_TO.py
        - train.py
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
        - path: ./*.png
          type: file_group
      success_criteria:
        - exit_code == 0
  finetune: []
  evaluate: []
  visualize:
    - name: visualize_training_checkpoints
      description: 训练过程中在 1000、10000、20000、30000、40000、50000 迭代处生成密度、速度、残差和损失图。
      cwd: .
      command: python main_TO.py --problem doublepipe --gpu 0
      required_files:
        - main_TO.py
        - train.py
      required_env: []
      expected_outputs:
        - path: ./*.png
          type: file_group
      success_criteria:
        - exit_code == 0
        - output_path_exists
  deploy: []

expected_outputs:
  - id: preflight_ok
    path: stdout
    type: text
    description_zh: 结构预检成功时输出 [OK] model preflight completed。
  - id: training_log
    path: stdout
    type: text
    description_zh: 训练过程中 tqdm 输出 loss，结束时输出总耗时。
  - id: training_figures
    path: ./*.png
    type: file_group
    description_zh: 在 checkpoint 迭代处生成的拓扑密度、速度场、残差和损失曲线图，具体文件名由 OneScience GP_TO 可视化函数决定。

diagnostics:
  - error_pattern: "runtime dependency import failed for torch"
    likely_cause: 当前环境未安装 PyTorch 或未激活 OneScience CFD 环境。
    action: 执行 bash install.sh cfd 或激活包含 torch/gpytorch 的环境后重试 --check-imports。
  - error_pattern: "runtime dependency import failed for gpytorch"
    likely_cause: 缺少 GPytorch，高斯过程模型无法构建。
    action: 安装 gpytorch，并确保其与当前 PyTorch 版本兼容。
  - error_pattern: "OneScience GP_for_TO imports failed"
    likely_cause: OneScience 未安装为 Python 包，或 PYTHONPATH 未包含 onescience/src。
    action: 安装 OneScience，或设置 ONESCIENCE_SRC=/path/to/onescience/src 后重试。
  - error_pattern: "unexpected --problem choices"
    likely_cause: main_TO.py 被修改后与标准包 Manifest 记录的问题集合不一致。
    action: 恢复 doublepipe、diffuser、rugby、pipebend 四个问题，或同步更新 README 和 Manifest。
  - error_pattern: "CUDA out of memory"
    likely_cause: GP 训练迭代和配点规模较大，显存不足。
    action: 使用更大显存设备，或在确认科研设置允许后降低 N_col_domain、网络宽度或迭代数，并同步记录 configuration_adaptation。
  - error_pattern: "Matplotlib created a temporary cache directory"
    likely_cause: HOME 下 Matplotlib 缓存目录不可写。
    action: 设置 MPLCONFIGDIR=/tmp/matplotlib-cache-$USER 或其他可写目录。

domain_extension:
  cfd:
    physics:
      - Brinkman equation
      - Stokes flow
      - incompressibility
      - volume_constraint
    geometry_type: 2D unit-square design domain
    problem_choices:
      - doublepipe
      - diffuser
      - rugby
      - pipebend
    variables:
      - velocity_u
      - velocity_v
      - pressure
      - density_rho
    methods:
      - physics-informed Gaussian process
      - meshfree collocation
      - simultaneous topology optimization
    metrics:
      - total_loss
      - PDE_residual_loss
      - dissipated_power
      - volume_constraint_loss

reproducibility:
  level: minimal
  goal: 完成模型结构预检，并在安装 OneScience CFD 依赖后验证生成数据 schema 和运行入口。
  command_ref: commands.preflight.model_preflight
  expected_runtime: seconds
  expected_outputs:
    - stdout
