# conf/graphvit_eagle.yaml
# GraphViT/EagleMeshTransformer 在 Eagle 数据集上的训练与评估配置。

datapipe:
  source:
    # ModelScope 标准包适配：下载 OneScience/eagle 后，将该环境变量指向
    # 数据集仓库中的 data/Eagle_dataset 目录。
    data_dir: "${ONESCIENCE_EAGLE_DATA_DIR}"
    cluster_dir: "${ONESCIENCE_EAGLE_DATA_DIR}"
    splits_dir: "./splits/"

  verbose: true

  data:
    window_length_train: 6
    window_length_val: 25
    window_length_test: 25
    n_cluster: 40
    normalized: true
    type_as_onehot: true
    with_cells: true

  dataloader:
    batch_size: 2
    num_workers: 4

model:
  name: "GraphViT"
  w_size: 512
  state_size: 4

training:
  max_epoch: 1000
  lr: 1e-4
  loss_alpha: 0.1
  patience: 100
  checkpoint_dir: "./checkpoints/eagle_graphvit/"
  gpuid: 0
  max_anim_on_infer: 5
