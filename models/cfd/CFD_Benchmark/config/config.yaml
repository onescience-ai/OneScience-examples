project:
  name: CFD_Benchmark
  package: cfd_benchmark

runtime:
  device: cpu

paths:
  data_dir: ./data/fake_airfoil
  checkpoint_dir: ./checkpoints
  result_dir: ./results
  weight_path: ./checkpoints/transolver_fake.pt

data:
  loader: airfoil
  task: steady
  ntrain: 2
  ntest: 1
  batch_size: 1
  downsamplex: 20
  downsampley: 10
  normalize: false
  norm_type: UnitTransformer
  space_dim: 2
  fun_dim: 0
  out_dim: 1
  geotype: unstructured

model:
  name: Transolver
  n_hidden: 16
  n_layers: 1
  n_heads: 2
  mlp_ratio: 1
  dropout: 0.0
  act: gelu
  slice_num: 4
  unified_pos: 0
  ref: 4

train:
  epochs: 1
  lr: 0.001
  weight_decay: 0.00001
  optimizer: AdamW
  scheduler: CosineAnnealingLR
  pct_start: 0.3
  max_grad_norm: null
  derivloss: false
  use_checkpoint: false
  checkpoint_layers: ""
  save_name: transolver_fake

inference:
  eval: 1
  vis_num: 0
