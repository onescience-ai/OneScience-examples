fno_config:
  datapipe:
    source:
      data_dir: "YOUR_DATASET_DIR_PATH"
      file_name: "3D_Maxwell_10_1.h5"
    verbose: True
    data:
      single_file: False
      reduced_resolution: 1
      reduced_resolution_t: 1
      reduced_batch: 1
      initial_step: 2
      pde_name: "3D_Maxwell"

    dataloader:
      batch_size: 2
      num_workers: 1
      pin_memory: False

  model:
    name: "FNO"
    num_channels: 6
    modes: 12
    width: 20

  training:
    output_dir: "./checkpoint/" 
    if_training: True
    continue_training: False
    model_path: null
    save_period: 20
    seed: 0
    training_type: "autoregressive"
    t_train: 8
    unroll_step: 20
    epochs: 500
    
    optimizer:
      name: 'Adam'
      lr: 1.0e-3
      weight_decay: 1.0e-4
    
    scheduler:
      name: "StepLR"
      step_size: 100
      gamma: 0.5