uno_config:
  datapipe:
    source:
      data_dir: "YOUR_DATASET_DIR_PATH"
      file_name: "2D_CFD_Rand_M0.1_Eta0.1_Zeta0.1_periodic_128_Train.hdf5"
    verbose: True        
    data:
      name: "2D_Compressible_NS"
      single_file: True
      reduced_resolution: 2
      reduced_resolution_t: 1
      reduced_batch: 1
      initial_step: 10
      test_ratio: 0.1
      seed: 0

    dataloader:
      batch_size: 32
      num_workers: 4
      pin_memory: True

  model:
    name: "UNO"
    num_channels: 4
    width: 30

  training:
    pde_name: "2D_Compressible_NS"
    training_type: "autoregressive" 
    t_train: 21
    unroll_step: 20
    
    if_training: True
    continue_training: False
    model_path: null
    output_dir: "./checkpoint/"
    
    epochs: 500
    save_period: 20
    seed: 0
    
    optimizer:
      name: 'Adam'
      lr: 1.0e-3
      weight_decay: 1.0e-4
    
    scheduler:
      name: "StepLR"
      step_size: 100
      gamma: 0.5