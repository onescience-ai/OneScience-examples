uno_config:
  datapipe:
    source:
      data_dir: "YOUR_DATASET_DIR_PATH"
      file_name: "3D_CFD_Rand_M1.0_Eta1e-08_Zeta1e-08_periodic_Train.hdf5"
    verbose: True        
    data:
      name: "3D_Compressible_NS"
      single_file: True
      reduced_resolution: 2
      reduced_resolution_t: 1
      reduced_batch: 1
      initial_step: 10
      test_ratio: 0.1
      seed: 0

    dataloader:
      batch_size: 2
      num_workers: 4
      pin_memory: False

  model:
    name: "UNO"
    num_channels: 5
    width: 20

  training:
    pde_name: "3D_Compressible_NS"
    training_type: "autoregressive" 
    t_train: 101
    unroll_step: 20
    
    if_training: True
    continue_training: False
    model_path: null
    output_dir: "./checkpoint/"
    
    epochs: 500
    save_period: 20
    seed: 0
    
    optimizer:
      name: 'Adam'
      lr: 1.0e-3
      weight_decay: 1.0e-4
    
    scheduler:
      name: "StepLR"
      step_size: 100
      gamma: 0.5