deeponet_config:
  datapipe:
    source:
      # 原 saved_folder 移到这里
      data_dir: "${ONESCIENCE_DATASETS_DIR}/PDENNEval/data/"
      # 原 dataset.file_name
      file_name: "2D_DarcyFlow_beta0.1_Train.hdf5"
    verbose: True    
    data:
      name: "2D_DarcyFlow"
      single_file: True
      reduced_resolution: 1
      reduced_resolution_t: 1
      reduced_batch: 1
      initial_step: 1
      test_ratio: 0.1
      seed: 0 # 数据 shuffle 种子

    dataloader:
      batch_size: 50
      num_workers: 1 # 原配置是1
      pin_memory: False

  model:
    name: "DeepONet"
    base_model: "MLP"
    input_size: 128
    act: "tanh"
    in_channels: 1
    out_channels: 1
    query_dim: 2

  training:
    scenario: "2D_DarcyFlow"
    save_name: "2d_darcy_128"
    training_type: "autoregressive" 
    
    if_training: True
    continue_training: False
    model_path: "./checkpoint/2D_DarcyFlow_beta0.1_Train/2d_darcy_128_lr0.001_bs50-best.pt"
    output_dir: "./checkpoint/"
    
    epochs: 500
    save_period: 20
    seed: 0
    
    optimizer:
      name: 'Adam'
      lr: 1.0e-3
      weight_decay: 1.0e-4
    
    scheduler:
      name: "StepLR"
      step_size: 100
      gamma: 0.5
