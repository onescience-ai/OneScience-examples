# Standard runtime configuration for the Lagrangian MeshGraphNet example.
# Relative paths are resolved from the project root by scripts/common.py.

dim: 2
output: result/train
resume_dir: weight/checkpoints

data:
  data_dir: data/fake_lagrangian
  name: FakeWater
  num_history: 5
  num_node_types: 6
  noise_std: 0.0

  train:
    split: train
    num_sequences: 2
    num_steps: 8
  valid:
    split: valid
    num_sequences: 1
    num_steps: 8
  test:
    split: test
    num_sequences: 1
    num_steps: 8

  fake:
    seed: 42
    num_particles: 12
    num_steps: 8
    connectivity_radius: 0.35
    bounds: [0.0, 1.0]

datapipe:
  source:
    data_dir: ${data.data_dir}
  verbose: true
  data:
    name: ${data.name}
    num_history: ${data.num_history}
    num_node_types: ${data.num_node_types}
    noise_std: ${data.noise_std}
    train: ${data.train}
    valid: ${data.valid}
    test: ${data.test}
  dataloader:
    train: ${train.dataloader}
    valid: ${test.dataloader}
    test: ${test.dataloader}

model:
  _target_: model.meshgraphnet.MeshGraphNet
  _convert_: all
  input_dim_nodes:
  input_dim_edges:
  output_dim:
  processor_size: 2
  aggregation: sum
  hidden_dim_processor: 32
  hidden_dim_node_encoder: 64
  hidden_dim_edge_encoder: 64
  hidden_dim_node_decoder: 64
  num_layers_node_processor: 2
  num_layers_edge_processor: 2
  mlp_activation_fn: relu
  do_concat_trick: false
  num_processor_checkpoint_segments: 0
  recompute_activation: false

loss:
  _target_: torch.nn.MSELoss
  reduction: none

optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4
  weight_decay: 1e-5

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max:
  eta_min: 1e-6

train:
  device: auto
  batch_size: 1
  epochs: 1
  patience: 50
  checkpoint_save_freq: 1
  log_interval: 1
  dataloader:
    batch_size: ${..batch_size}
    shuffle: true
    num_workers: 0
    pin_memory: false
    drop_last: false

test:
  batch_size: 1
  device: auto
  dataloader:
    batch_size: ${..batch_size}
    shuffle: false
    num_workers: 0
    pin_memory: false
    drop_last: false

compile:
  enabled: false
  args:
    backend: inductor

amp:
  enabled: false

inference:
  output_dir: result/inference
  max_sequences: 1
  save_animations: false
  frame_skip: 1
  frame_interval: 100
