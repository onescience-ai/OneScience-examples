onescience_manifest_version: "0.1"
resource_type: model

resource:
  id: OneScience/PINNsformer
  name: PINNsformer
  domain: cfd
  domain_tags:
    - cfd
    - pde
    - physics_informed_neural_network
    - transformer
    - navier_stokes
  task: pde_solution_approximation
  task_tags:
    - train
    - inference
    - evaluation
    - visualization
  modalities:
    - collocation_points
    - initial_conditions
    - boundary_conditions
    - continuous_fields
  input_formats:
    - python_script
    - mat
  output_formats:
    - pt
    - png
    - console_log
  summary: PINNsformer 标准运行包，包含一维反应方程、一维波动方程、对流方程和 Navier-Stokes 示例，以及 PINN、QRes、FLS、NTK 对比脚本。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/PINNsformer
    repo_type: model
    url: https://modelscope.cn/models/OneScience/PINNsformer
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: unknown

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/PINNsformer
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: false
    default_run_goal: minimal_validation
    cwd_note: 如果使用 modelscope download --cache_dir 下载模型，请先 cd 到实际下载后的模型包根目录再执行 commands 中的命令。

runtime:
  enabled: true
  onescience_domain: cfd
  min_onescience_version: null
  supported_execution:
    - local_cpu_preflight
    - local_gpu_training
    - local_slurm
  environment:
    required_env: {}
    optional_env:
      ONESCIENCE_DATASETS_DIR: 指向包含 pinnsformer/convection.mat 和 pinnsformer/cylinder_nektar_wake.mat 的统一数据目录；未设置时 data.sh 使用 /public/share/sugonhpcapp01/onestore/onedatasets。
      MPLCONFIGDIR: Matplotlib 可写缓存目录；集群或只读 HOME 环境建议设置到 /tmp 下。
      MODELSCOPE_CACHE: ModelScope 下载缓存目录。
  dependencies:
    python: ">=3.10"
    python_packages:
      - torch
      - numpy
      - scipy
      - matplotlib
      - pyyaml

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh cfd
  source_paths: []
  compatibility:
    examples_path: onescience/examples/cfd/PINNsformer
    status: examples_compatible
  config_loader: null
  datapipe: null
  model_classes:
    - PINNsformer
    - PINN
    - QRes
    - FLS

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: null
    checkpoint_dir: model
    data_dir: .
    output_dir: result
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - data.sh
    - scripts/preflight_pinnsformer.py
    - 1d_reaction/1d_reaction_pinnsformer.py
    - 1d_wave/1d_wave_pinnsformer.py
    - convection/convection_pinnsformer.py
    - navier_stokes/navier_stoke_pinnsformer.py
  entrypoints:
    preflight: scripts/preflight_pinnsformer.py
    inference: null
    train: 1d_reaction/1d_reaction_pinnsformer.py
    finetune: null
    evaluate: null
    visualize: null
    deploy: null

files:
  model_files:
    - id: reaction_scripts
      path: 1d_reaction/*.py
      role: train_and_visualize
      description_zh: 一维反应方程的 PINNsformer、PINN、QRes 和 FLS 对比训练脚本。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: 1d_reaction/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: 1d_reaction/
      size: null
      checksum: null
      large_file: false
    - id: wave_scripts
      path: 1d_wave/*.py
      role: train_and_visualize
      description_zh: 一维波动方程的 PINNsformer、PINN 和 NTK 对比训练脚本。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: 1d_wave/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: 1d_wave/
      size: null
      checksum: null
      large_file: false
    - id: convection_scripts
      path: convection/*.py
      role: train_and_visualize
      description_zh: 对流方程的 PINNsformer、PINN、QRes 和 FLS 对比训练脚本。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: convection/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: convection/
      size: null
      checksum: null
      large_file: false
    - id: navier_stokes_scripts
      path: navier_stokes/*.py
      role: train_and_visualize
      description_zh: Navier-Stokes 圆柱绕流的 PINNsformer、PINN、QRes 和 FLS 对比训练脚本。
      required: true
      required_for: [train, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: navier_stokes/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: navier_stokes/
      size: null
      checksum: null
      large_file: false
  dataset_files:
    - id: convection_mat
      path: convection/convection.mat
      role: reference_solution
      description_zh: 对流方程示例需要的真实值数据，由 data.sh 按原始 README 从统一数据目录复制。
      required: true
      required_for: [train, evaluate, visualize]
      format: mat
      source:
        platform: local_onescience_dataset_store
        repo_id: null
        repo_type: external_data
        path: ${ONESCIENCE_DATASETS_DIR}/pinnsformer/convection.mat
        revision: null
        url: https://pan.baidu.com/s/1pM4ICc6FJX5pLF7WEoozxQ?pwd=5gha
        download_method: command_ref
        command_ref: commands.prepare.prepare_data
      local_path: convection/convection.mat
      size: null
      checksum: null
      large_file: false
    - id: cylinder_nektar_wake
      path: navier_stokes/cylinder_nektar_wake.mat
      role: reference_solution
      description_zh: Navier-Stokes 圆柱绕流示例需要的真实值数据，由 data.sh 按原始 README 从统一数据目录复制。
      required: true
      required_for: [train, evaluate, visualize]
      format: mat
      source:
        platform: local_onescience_dataset_store
        repo_id: null
        repo_type: external_data
        path: ${ONESCIENCE_DATASETS_DIR}/pinnsformer/cylinder_nektar_wake.mat
        revision: null
        url: https://pan.baidu.com/s/1pM4ICc6FJX5pLF7WEoozxQ?pwd=5gha
        download_method: command_ref
        command_ref: commands.prepare.prepare_data
      local_path: navier_stokes/cylinder_nektar_wake.mat
      size: null
      checksum: null
      large_file: false
  config_files: []
  sample_files:
    - id: preflight_script
      path: scripts/preflight_pinnsformer.py
      role: preflight
      description_zh: 模型运行前检查脚本；检查标准包结构、资源 ID、一致性和可选数据 schema。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: scripts/preflight_pinnsformer.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: scripts/preflight_pinnsformer.py
      size: null
      checksum: null
      large_file: false
    - id: data_script
      path: data.sh
      role: data_prepare
      description_zh: 从 OneScience 统一数据目录复制 PINNsformer 数据文件到对应示例子目录。
      required: true
      required_for: [prepare, train]
      format: sh
      source:
        platform: modelscope
        repo_id: OneScience/PINNsformer
        repo_type: model
        path: data.sh
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: data.sh
      size: null
      checksum: null
      large_file: false

relations:
  required_datasets: []
  optional_datasets: []
  compatible_models: []
  data_policy:
    external_dataset_required: false
    reason: 本次整理按用户要求不生成独立数据集标准仓库；convection 和 navier_stokes 所需 .mat 文件按原始 README 使用 data.sh 从 OneScience 统一数据目录复制，或由用户从原 README 的百度网盘链接手动放置。

configuration_adaptation:
  - file: data.sh
    yaml_path: null
    original_value: source ../../../env.sh; cp ${ONESCIENCE_DATASETS_DIR}/pinnsformer/convection.mat ./convection; cp ${ONESCIENCE_DATASETS_DIR}/pinnsformer/cylinder_nektar_wake.mat ./navier_stokes
    current_value: 使用脚本所在目录定位目标子目录，默认从 ${ONESCIENCE_DATASETS_DIR:-/public/share/sugonhpcapp01/onestore/onedatasets}/pinnsformer 复制数据。
    reason: 标准包下载后不再位于原始 examples 相对路径下，原始 ../../../env.sh 不可靠；改为环境变量优先、统一默认路径兜底，并确保不修改原始模型目录。

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      required_datasets: []
      required_model_files:
        - README.md
        - onescience_run_manifest.yaml
        - manifest.yaml
        - scripts/preflight_pinnsformer.py
        - data.sh
      required_dataset_files: []
      preconditions:
        - 已下载 OneScience/PINNsformer 模型包。
        - 当前工作目录为模型包根目录。
      command_refs:
        - commands.preflight.model_preflight
      outputs:
        - 控制台输出 [OK] model preflight completed。
    - name: prepare_data
      capability: prepare
      required_datasets: []
      required_model_files:
        - data.sh
      required_dataset_files:
        - ${ONESCIENCE_DATASETS_DIR}/pinnsformer/convection.mat
        - ${ONESCIENCE_DATASETS_DIR}/pinnsformer/cylinder_nektar_wake.mat
      preconditions:
        - 统一数据目录存在 PINNsformer 数据，或用户已按原始 README 手动下载。
      command_refs:
        - commands.prepare.prepare_data
      outputs:
        - convection/convection.mat
        - navier_stokes/cylinder_nektar_wake.mat
    - name: data_schema_validation
      capability: preflight
      required_datasets: []
      required_model_files:
        - scripts/preflight_pinnsformer.py
      required_dataset_files:
        - convection/convection.mat
        - navier_stokes/cylinder_nektar_wake.mat
      preconditions:
        - 已执行 bash data.sh 或手动放置 .mat 文件。
        - 当前 Python 环境可导入 scipy。
      command_refs:
        - commands.preflight.data_schema_preflight
      outputs:
        - 控制台输出 .mat 关键变量列表和 [OK] model preflight completed。
    - name: train_reaction_pinnsformer
      capability: train
      required_datasets: []
      required_model_files:
        - 1d_reaction/1d_reaction_pinnsformer.py
      required_dataset_files: []
      preconditions:
        - 已安装 torch、numpy 和 matplotlib。
      command_refs:
        - commands.train.train_reaction_pinnsformer
      outputs:
        - 1d_reaction/model/1dreaction_pinnsformer.pt
        - 1d_reaction/result/1dreaction_pinnsformer.png
    - name: train_wave_pinnsformer
      capability: train
      required_datasets: []
      required_model_files:
        - 1d_wave/1d_wave_pinnsformer.py
      required_dataset_files: []
      preconditions:
        - 已安装 torch、numpy 和 matplotlib。
      command_refs:
        - commands.train.train_wave_pinnsformer
      outputs:
        - 1d_wave/model/1dwave_pinnsformer.pt
        - 1d_wave/result/1dwave_pinnsformer.png
    - name: train_convection_pinnsformer
      capability: train
      required_datasets: []
      required_model_files:
        - convection/convection_pinnsformer.py
      required_dataset_files:
        - convection/convection.mat
      preconditions:
        - 已执行 bash data.sh。
        - 当前 Python 环境可导入 scipy。
      command_refs:
        - commands.train.train_convection_pinnsformer
      outputs:
        - convection/model/convection_pinnsformer.pt
        - convection/result/convection_pinnsformer.png
    - name: train_navier_stokes_pinnsformer
      capability: train
      required_datasets: []
      required_model_files:
        - navier_stokes/navier_stoke_pinnsformer.py
      required_dataset_files:
        - navier_stokes/cylinder_nektar_wake.mat
      preconditions:
        - 已执行 bash data.sh。
        - 当前 Python 环境可导入 scipy。
      command_refs:
        - commands.train.train_navier_stokes_pinnsformer
      outputs:
        - navier_stokes/model/ns_pinnsformer.pt
        - navier_stokes/result/ns_pinnsformer.png

capabilities:
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载完整 PINNsformer 模型标准运行包。
      target: model
      repo_id: OneScience/PINNsformer
      source: .
      local_path: session_workdir/
      required: true
      required_for: [preflight, prepare, train, evaluate, visualize]
      command: modelscope download --model OneScience/PINNsformer
  prepare:
    - name: prepare_data
      description: 按原始 README 逻辑复制 PINNsformer 数据文件。
      cwd: .
      command: bash data.sh
      required_files:
        - data.sh
      required_env: []
      expected_outputs:
        - path: convection/convection.mat
          type: file
        - path: navier_stokes/cylinder_nektar_wake.mat
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  preflight:
    - name: model_preflight
      description: 执行结构预检，确认入口脚本、Manifest 和资源 ID。
      cwd: .
      command: python scripts/preflight_pinnsformer.py --repo-root .
      required_files:
        - scripts/preflight_pinnsformer.py
        - onescience_run_manifest.yaml
        - manifest.yaml
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
      success_criteria:
        - exit_code == 0
        - stdout_contains: "[OK] model preflight completed"
    - name: data_schema_preflight
      description: 加载 .mat 文件并检查关键变量。
      cwd: .
      command: python scripts/preflight_pinnsformer.py --repo-root . --check-data-schema
      required_files:
        - scripts/preflight_pinnsformer.py
        - convection/convection.mat
        - navier_stokes/cylinder_nektar_wake.mat
      required_env: []
      expected_outputs:
        - path: stdout
          type: text
      success_criteria:
        - exit_code == 0
        - stdout_contains: "[OK] model preflight completed"
  inference: []
  train:
    - name: train_reaction_pinnsformer
      description: 训练一维反应方程 PINNsformer，并输出预测图。
      cwd: 1d_reaction
      command: python 1d_reaction_pinnsformer.py
      required_files:
        - 1d_reaction_pinnsformer.py
      required_env: []
      expected_outputs:
        - path: model/1dreaction_pinnsformer.pt
          type: file
        - path: result/1dreaction_pinnsformer.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_wave_pinnsformer
      description: 训练一维波动方程 PINNsformer，并输出预测图。
      cwd: 1d_wave
      command: python 1d_wave_pinnsformer.py
      required_files:
        - 1d_wave_pinnsformer.py
      required_env: []
      expected_outputs:
        - path: model/1dwave_pinnsformer.pt
          type: file
        - path: result/1dwave_pinnsformer.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_convection_pinnsformer
      description: 训练对流方程 PINNsformer，并输出预测图。
      cwd: convection
      command: python convection_pinnsformer.py
      required_files:
        - convection_pinnsformer.py
        - convection.mat
      required_env: []
      expected_outputs:
        - path: model/convection_pinnsformer.pt
          type: file
        - path: result/convection_pinnsformer.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_navier_stokes_pinnsformer
      description: 训练 Navier-Stokes PINNsformer，并输出预测图。
      cwd: navier_stokes
      command: python navier_stoke_pinnsformer.py
      required_files:
        - navier_stoke_pinnsformer.py
        - cylinder_nektar_wake.mat
      required_env: []
      expected_outputs:
        - path: model/ns_pinnsformer.pt
          type: file
        - path: result/ns_pinnsformer.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  finetune: []
  evaluate: []
  visualize: []
  deploy: []

expected_outputs:
  - id: preflight_ok
    path: stdout
    type: text
    description_zh: 结构预检成功时输出 [OK] model preflight completed。
  - id: reaction_checkpoint
    path: 1d_reaction/model/1dreaction_pinnsformer.pt
    type: file
    description_zh: 一维反应方程 PINNsformer 训练权重。
  - id: wave_checkpoint
    path: 1d_wave/model/1dwave_pinnsformer.pt
    type: file
    description_zh: 一维波动方程 PINNsformer 训练权重。
  - id: convection_checkpoint
    path: convection/model/convection_pinnsformer.pt
    type: file
    description_zh: 对流方程 PINNsformer 训练权重。
  - id: navier_stokes_checkpoint
    path: navier_stokes/model/ns_pinnsformer.pt
    type: file
    description_zh: Navier-Stokes PINNsformer 训练权重。
  - id: visualization_png
    path: "*/result/*.png"
    type: file_group
    description_zh: 各示例训练完成后输出的预测和误差可视化图片。

diagnostics:
  - error_pattern: "missing required source file"
    likely_cause: 模型包下载不完整，或当前工作目录不是模型包根目录。
    action: 重新下载 OneScience/PINNsformer，并 cd 到实际下载后的模型包根目录。
  - error_pattern: "source data not found"
    likely_cause: ONESCIENCE_DATASETS_DIR 未设置，或统一数据目录中没有 pinnsformer 数据。
    action: 设置 ONESCIENCE_DATASETS_DIR，或按原始 README 从百度网盘下载后手动放置数据文件。
  - error_pattern: "missing data file"
    likely_cause: 尚未执行 bash data.sh，或手动数据放置路径不正确。
    action: 执行 bash data.sh，并确认 convection/convection.mat 与 navier_stokes/cylinder_nektar_wake.mat 存在。
  - error_pattern: "scipy import failed"
    likely_cause: 当前环境缺少 scipy，无法读取 .mat 数据。
    action: 安装 OneScience CFD 运行环境或补充 scipy。
  - error_pattern: "ModuleNotFoundError"
    likely_cause: 缺少 torch、numpy、scipy 或 matplotlib。
    action: 执行 bash install.sh cfd 或激活包含依赖的环境后重试。
  - error_pattern: "CUDA out of memory"
    likely_cause: GPU 显存不足。
    action: 使用更大显存设备，或在确认实验允许后降低训练脚本中的采样数、网络宽度或迭代数。

domain_extension:
  cfd:
    physics:
      - reaction_equation
      - wave_equation
      - convection_equation
      - Navier-Stokes equation
    geometry_type:
      - one_dimensional_domain
      - two_dimensional_cylinder_wake
    variables:
      - x
      - t
      - u
      - v
      - p
    methods:
      - PINNsformer
      - PINN
      - QRes
      - FLS
      - NTK
    metrics:
      - loss
      - visual_error

reproducibility:
  level: minimal
  goal: 完成模型结构预检，并在数据文件准备后验证 .mat schema；完整训练耗时较长，按具体示例脚本执行。
  command_ref: commands.preflight.model_preflight
  expected_runtime: seconds
  expected_outputs:
    - stdout
