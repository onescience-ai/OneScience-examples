root:
  common:
    device: "auto"
    seed: 0

  datapipe:
    source:
      data_dir: "/public/share/sugonhpcapp01/onestore/onedatasets/CFD_Benchmark/ns"
      file_name: "NavierStokes_V1e-5_N1200_T20.mat"
    data:
      ntrain: 1000
      ntest: 200
      t_in: 10
      t_out: 10
      out_dim: 1
      downsamplex: 1
      downsampley: 1
      normalize: false
    dataloader:
      batch_size: 8
      num_workers: 4
      pin_memory: true

  model:
    name: "KNO2DNavierStokes"
    input_channels: 10
    output_channels: 1
    op_size: 32
    modes_x: 12
    modes_y: 12
    decompose: 6
    linear_type: true
    normalization: false

  training:
    epochs: 500
    lr: 0.001
    weight_decay: 0.00001
    step_size: 100
    gamma: 0.5
    eval_interval: 10
    patience: 100
    teacher_forcing: true
    max_grad_norm: null
    max_train_batches: null
    max_eval_batches: null
    weight_dir: "weight"
    checkpoint_name: "kno_navier_stokes.pt"

  inference:
    result_dir: "result"
    num_samples: 4
