root:
  common:
    device: "auto"
    seed: 0

  datapipe:
    source:
      data_dir: "data"
      file_name: "NavierStokes_V1e-5_N1200_T20.mat"
    data:
      ntrain: 1000
      ntest: 200
      t_in: 10
      t_out: 10
      out_dim: 1
      downsamplex: 1
      downsampley: 1
      normalize: false
    dataloader:
      batch_size: 8
      num_workers: 4
      pin_memory: true

  model:
    in_dim: 10
    out_dim: 1
    hidden_dim: 64
    modes: 12
    space_dim: 2
    include_pos: true
    normtype: "in"
    bilinear: true
    activation: "gelu"
    pad_to_multiple: 16

  training:
    epochs: 500
    lr: 0.001
    weight_decay: 0.00001
    step_size: 100
    gamma: 0.5
    eval_interval: 10
    patience: 100
    teacher_forcing: false
    max_grad_norm: null
    max_train_batches: null
    max_eval_batches: null
    weight_dir: "weight"
    checkpoint_name: "uno_navier_stokes.pt"

  inference:
    result_dir: "result"
    num_samples: 4
