onescience_manifest_version: "0.1"
resource_type: model

resource:
  id: OneScience/DeepCFD
  name: DeepCFD
  domain: cfd
  domain_tags:
    - cfd
    - laminar_flow
    - convolutional_surrogate
  task: steady_laminar_flow_surrogate
  task_tags:
    - train
    - inference
    - evaluation
    - visualization
  modalities:
    - gridded_field
    - signed_distance_field
    - flow_solution
  input_formats:
    - pkl
  output_formats:
    - pt
    - png
  summary: DeepCFD 标准运行包，用 CNN/UNetEx 从几何与符号距离场预测稳态层流速度和压力场。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/DeepCFD
    repo_type: model
    url: https://modelscope.cn/models/OneScience/DeepCFD
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: unknown

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/DeepCFD
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation
    cwd_note: 如果使用 modelscope download --cache_dir 下载模型，请先 cd 到实际下载后的模型包根目录再执行 commands 中的命令。

runtime:
  enabled: true
  onescience_domain: cfd
  min_onescience_version: null
  supported_execution:
    - local_cpu_preflight
    - local_gpu_training
    - distributed_gpu_training
    - local_gpu_inference
  environment:
    required_env:
      ONESCIENCE_DEEPCFD_DATA_DIR: 指向 OneScience/deepcfd 数据集仓库中的 data 目录。
    optional_env:
      MODELSCOPE_CACHE: ModelScope 下载缓存目录。
  dependencies:
    python: ">=3.10"
    python_packages:
      - onescience
      - torch
      - numpy
      - matplotlib
      - tqdm
      - ruamel.yaml
      - pyyaml

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh cfd
  source_paths:
    - onescience/src/onescience/models/deepcfd
    - onescience/src/onescience/datapipes/cfd/deepcfd.py
  compatibility:
    examples_path: onescience/examples/cfd/DeepCFD
    status: examples_compatible
  config_loader: onescience.utils.YParams
  datapipe: onescience.datapipes.cfd.DeepCFDDatapipe
  model_classes:
    - onescience.models.deepcfd.UNetEx.UNetEx
    - onescience.models.deepcfd.UNet.UNet

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: result/deepcfd
    data_dir: external
    output_dir: result/deepcfd
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - train.py
    - inference.py
    - conf/deepcfd.yaml
    - scripts/preflight_check.py
  entrypoints:
    preflight: scripts/preflight_check.py
    inference: inference.py
    train: train.py
    finetune: null
    evaluate: inference.py
    visualize: inference.py
    deploy: null

files:
  model_files:
    - path: train.py
      role: training_entry
      description_zh: DeepCFD 单卡或分布式训练入口，读取 conf/deepcfd.yaml 和 OneScience/deepcfd 数据集。
      required: true
      required_for: [train]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: train.py
    - path: inference.py
      role: inference_evaluate_visualize_entry
      description_zh: DeepCFD 推理、评测和图片生成入口，读取 result/deepcfd/best_model.pt。
      required: true
      required_for: [inference, evaluate, visualize]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: inference.py
  dataset_files: []
  config_files:
    - path: conf/deepcfd.yaml
      role: model_datapipe_training_config
      description_zh: 训练、推理和数据管道配置；已适配为通过 ONESCIENCE_DEEPCFD_DATA_DIR 读取数据集。
      required: true
      required_for: [preflight, train, inference, evaluate]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: conf/deepcfd.yaml
  sample_files:
    - path: scripts/preflight_check.py
      role: preflight
      description_zh: 模型运行前检查脚本，验证配置、数据路径、必需 PKL 文件、shape、dtype、切分和输出目录。
      required: true
      required_for: [preflight]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: scripts/preflight_check.py
    - path: slurm.sh
      role: cluster_example
      description_zh: Slurm 训练示例脚本。
      required: false
      required_for: [train]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: slurm.sh
    - path: run_deepcfd.ipynb
      role: notebook_example
      description_zh: DeepCFD notebook 示例。
      required: false
      required_for: [train, inference]
      source:
        platform: modelscope
        repo_id: OneScience/DeepCFD
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: run_deepcfd.ipynb

relations:
  required_datasets:
    - id: OneScience/deepcfd
      role: train_eval_inference_data
      required_for: [preflight, train, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/deepcfd
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/deepcfd
        revision: main
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: data
      expected_env: ONESCIENCE_DEEPCFD_DATA_DIR
  optional_datasets: []
  compatible_models: []

configuration_adaptation:
  - file: conf/deepcfd.yaml
    yaml_path: root.datapipe.source.data_dir
    original_value: ${ONESCIENCE_DATASETS_DIR}/DeepCFD
    current_value: ${ONESCIENCE_DEEPCFD_DATA_DIR}
    reason: 模型与数据集分仓上传后，网页端或用户下载 OneScience/deepcfd 数据集，再通过 ONESCIENCE_DEEPCFD_DATA_DIR 指向数据集仓库的 data 目录。
  - file: metadata/deepcfd_schema.json
    yaml_path: files[].array_shape
    original_value: README 描述为 (981, 3, 128, 128)
    current_value: [981, 3, 172, 79]
    reason: 原始数据 cfd_dataset/DeepCFD/dataX.pkl 和 dataY.pkl 实测 shape 均为 (981, 3, 172, 79)，标准包按真实数据进行预检和运行。
  - file: conf/deepcfd.yaml
    yaml_path: root.datapipe.data.split_ratio
    original_value: 0.7
    current_value: 0.7
    reason: 当前数据集包含 981 个样本，按原始 split_ratio 可得到 686 个训练样本和 295 个测试样本，无需裁剪。

run_matrix:
  scenarios:
    - name: preflight_deepcfd_pkl
      capability: preflight
      default: true
      required_datasets:
        - id: OneScience/deepcfd
          role: train_eval_inference_data
          local_path: data
      required_model_files:
        - conf/deepcfd.yaml
        - scripts/preflight_check.py
      required_dataset_files:
        - data/dataX.pkl
        - data/dataY.pkl
      preconditions:
        - 已下载 OneScience/deepcfd 数据集。
        - ONESCIENCE_DEEPCFD_DATA_DIR 指向数据集仓库的 data 目录。
      command_refs:
        - commands.preflight.model_preflight
      outputs:
        - 控制台输出 [OK] model preflight completed
    - name: train_deepcfd_unetex
      capability: train
      default: true
      required_datasets:
        - id: OneScience/deepcfd
          role: train_data
          local_path: data
      required_model_files:
        - train.py
        - conf/deepcfd.yaml
      required_dataset_files:
        - data/dataX.pkl
        - data/dataY.pkl
      preconditions:
        - 通过 model_preflight。
        - 已安装 OneScience CFD 依赖和 PyTorch。
      command_refs:
        - commands.train.train_single_gpu
      outputs:
        - result/deepcfd/best_model.pt
    - name: inference_after_training
      capability: inference
      default: true
      required_datasets:
        - id: OneScience/deepcfd
          role: inference_input
          local_path: data
      required_model_files:
        - inference.py
        - conf/deepcfd.yaml
        - result/deepcfd/best_model.pt
      required_dataset_files:
        - data/dataX.pkl
        - data/dataY.pkl
      preconditions:
        - 通过 model_preflight。
        - 已运行 train_deepcfd_unetex 或已放入兼容 checkpoint。
      command_refs:
        - commands.inference.run_inference
      outputs:
        - result/deepcfd/vis_results/*.png

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false
  distributed_training: true

commands:
  download:
    - name: download_model
      command: modelscope download --model OneScience/DeepCFD
      cwd: session_workdir
    - name: download_dataset
      command: modelscope download --dataset OneScience/deepcfd
      cwd: session_workdir
  prepare:
    - name: set_dataset_env
      command: export ONESCIENCE_DEEPCFD_DATA_DIR=/path/to/OneScience_deepcfd/data
      cwd: .
  preflight:
    - name: model_preflight
      command: python scripts/preflight_check.py --skip-checkpoint
      cwd: .
    - name: model_preflight_with_checkpoint
      command: python scripts/preflight_check.py
      cwd: .
  train:
    - name: train_single_gpu
      command: python train.py
      cwd: .
    - name: train_multi_gpu_mpirun
      command: mpirun -np <num_GPUs> --allow-run-as-root python train.py
      cwd: .
    - name: train_multi_gpu_torchrun
      command: torchrun --standalone --nnodes=<num_nodes> --nproc_per_node=<num_GPUs> train.py
      cwd: .
  inference:
    - name: run_inference
      command: python inference.py
      cwd: .
  finetune: []
  evaluate:
    - name: run_evaluation
      command: python inference.py
      cwd: .
  visualize:
    - name: run_visualization
      command: python inference.py
      cwd: .
  deploy: []

expected_outputs:
  - name: model_preflight
    paths: []
    success_criteria:
      - 控制台输出 [OK] model preflight completed
  - name: training
    paths:
      - result/deepcfd/best_model.pt
    success_criteria:
      - 控制台输出 Epoch 指标并保存最佳 checkpoint。
  - name: inference
    paths:
      - result/deepcfd/vis_results/*.png
    success_criteria:
      - 控制台输出 Running Inference on first batch 和 Visualization saved。

diagnostics:
  - name: missing_dataset_env
    symptom: ONESCIENCE_DEEPCFD_DATA_DIR is not set
    action: 下载 OneScience/deepcfd 后，将 ONESCIENCE_DEEPCFD_DATA_DIR 设置为数据集仓库中的 data 目录。
  - name: missing_pkl
    symptom: Data files not found 或 missing required data file
    action: 确认 ONESCIENCE_DEEPCFD_DATA_DIR 指向 data 目录，且存在 dataX.pkl 和 dataY.pkl。
  - name: shape_or_dtype_mismatch
    symptom: shape mismatch 或 dtype mismatch
    action: 确认没有用其他 DeepCFD 数据覆盖当前文件；运行数据集仓库的 python scripts/validate_deepcfd_dataset.py --full-hash。
  - name: missing_dependency
    symptom: ModuleNotFoundError
    action: 安装 OneScience CFD 环境，并确认 torch、numpy、matplotlib、tqdm、ruamel.yaml 可导入。
  - name: missing_checkpoint
    symptom: Checkpoint not found at result/deepcfd/best_model.pt
    action: 先运行 python train.py 生成 best_model.pt，或放入兼容 checkpoint。
  - name: output_not_writable
    symptom: training output_dir is not writable
    action: 检查模型包根目录写权限，或修改 conf/deepcfd.yaml 中的 training.output_dir。

domain_extension:
  cfd:
    physics: steady-state incompressible laminar flow
    geometry: channel flow with obstacles
    model_family: convolutional neural network
    default_model: UNetEx
    samples: 981
    train_samples: 686
    test_samples: 295
    grid_shape: [172, 79]
    input_variables:
      - obstacle_surface_signed_distance
      - fluid_region_label
      - top_bottom_surface_signed_distance
    output_variables:
      - Ux
      - Uy
      - pressure

