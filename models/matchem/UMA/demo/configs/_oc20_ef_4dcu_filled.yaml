name: oc20_ef_4dcu
description: UMA OC20 finetune - 1 node x 4 DCU (energy+forces)
launch:
  launcher: torchrun
  num_nodes: 1
  num_gpus: 4
  omp_num_threads: 1
env:
  conda_env: chem
  modules:
  - sghpc-mpi-gcc/26.3
slurm:
  partition: k100ai
  time: '12:00:00'
  cpus_per_task: 128
job:
  device_type: CUDA
  scheduler:
    mode: LOCAL
    ranks_per_node: 4
    num_nodes: 1
  debug: true
  run_dir: ./uma_finetune_runs/
  run_name: oc20_ef_4dcu_smoke
  logger: null
max_neighbors: 300
epochs: 1
steps: 20
batch_size: 2
lr: 0.0004
weight_decay: 0.001
evaluate_every_n_steps: 100
checkpoint_every_n_steps: 1000
data:
