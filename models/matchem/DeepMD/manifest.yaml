onescience_manifest_version: '0.1'
resource_type: model
resource:
  id: OneScience/DeePMD
  name: DeePMD
  domain: matchem
  domain_tags:
  - matchem
  - deepmd
  - water
  - mlip
  task: deepmd_water_training
  task_tags:
  - energy_prediction
  - force_prediction
  - pytorch_backend
  modalities:
  - atomistic_structure
  input_formats:
  - json
  - deepmd_npy
  output_formats:
  - checkpoint
  - lcurve
  - model
  summary: DeepMD-kit water PyTorch 示例的 OneScience 标准模型运行包。
platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/DeePMD
    repo_type: model
    url: https://modelscope.cn/models/OneScience/DeePMD
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: null
website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/DeePMD
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation
runtime:
  enabled: true
  onescience_domain: matchem
  min_onescience_version: null
  supported_execution:
  - local
  - local_slurm
  - remote_slurm
  - scnet_mcp
environment:
  install_mode: onescience_domain
  python: '3.11'
  hardware:
    cpu: preflight_only
    gpu: optional
    dcu: supported
  extra_dependencies:
  - numpy
  - deepmd-kit
  - torch
onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh matchem && cd upstream && bash dp_install.sh
  source_paths:
  - onescience/examples/matchem/dp
  compatibility:
    examples_path: examples/matchem/dp
    status: examples_compatible
runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: null
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
  - scripts/preflight_deepmd.py
  - conf/input_torch_modelscope.json
  - upstream/dp_install.sh
  - upstream/demo/water_se_e2_a_pt/submit_1card.sh
  entrypoints:
    preflight: scripts/preflight_deepmd.py
    inference: null
    train: conf/input_torch_modelscope.json
    finetune: null
    evaluate: scripts/preflight_deepmd.py
    visualize: null
    deploy: null
configuration_adaptation:
  adapted_from: onescience/examples/matchem/dp/demo/water_se_e2_a_pt/input_torch.json
  reason: 原始 DeepMD 配置使用公共数据目录绝对路径；标准包需要使用 ModelScope 下载后的相对路径。
  changes:
  - file: conf/input_torch_modelscope.json
    yaml_path: training.training_data.systems
    old_value:
    - /public/share/sugonhpcapp01/onestore/onedatasets/matchem/dp/water/data_0
    - /public/share/sugonhpcapp01/onestore/onedatasets/matchem/dp/water/data_1
    - /public/share/sugonhpcapp01/onestore/onedatasets/matchem/dp/water/data_2
    new_value:
    - data/DeePMD/water/data_0
    - data/DeePMD/water/data_1
    - data/DeePMD/water/data_2
    reason: 匹配 OneScience/DeePMD 数据集下载到模型包根目录后的布局。
  - file: conf/input_torch_modelscope.json
    yaml_path: training.validation_data.systems
    old_value:
    - /public/share/sugonhpcapp01/onestore/onedatasets/matchem/dp/water/data_3
    new_value:
    - data/DeePMD/water/data_3
    reason: 匹配 OneScience/DeePMD 数据集下载到模型包根目录后的布局。
files:
  model_files:
  - id: preflight_script
    path: scripts/preflight_deepmd.py
    role: script
    description_zh: DeePMD 标准包预检脚本。
    required: true
    required_for:
    - preflight
    format: py
    source:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: model
      path: scripts/preflight_deepmd.py
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/scripts/preflight_deepmd.py
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  - id: adapted_config
    path: conf/input_torch_modelscope.json
    role: config
    description_zh: ModelScope 下载布局适配后的 PyTorch water 训练配置。
    required: true
    required_for:
    - preflight
    - train
    format: json
    source:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: model
      path: conf/input_torch_modelscope.json
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/conf/input_torch_modelscope.json
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  - id: upstream_dp_code
    path: upstream/
    role: runtime_code
    description_zh: OneScience DeePMD 示例安装脚本、配置和提交脚本。
    required: true
    required_for:
    - train
    format: directory
    source:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: model
      path: upstream/
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/upstream/
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  dataset_files:
  - id: deepmd_dataset
    path: data/DeePMD/
    role: training_data
    description_zh: DeePMD water npy 数据，来自同 ID 数据集仓库。
    required: true
    required_for:
    - preflight
    - train
    - evaluate
    format: deepmd_npy
    source:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: dataset
      path: data/DeePMD/
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_required_dataset
    mirrors: []
    local_path: session_workdir/data/DeePMD/
    size: 1.9M
    checksum: metadata/sha256_manifest.txt
    large_file: false
  config_files:
  - id: checksum_manifest
    path: metadata/sha256_manifest.txt
    role: checksum
    description_zh: 模型包文件 SHA256 清单。
    required: true
    required_for:
    - preflight
    format: txt
    source:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: model
      path: metadata/sha256_manifest.txt
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/metadata/sha256_manifest.txt
    size: null
    checksum: null
    large_file: false
  sample_files: []
relations:
  required_datasets:
  - id: OneScience/DeePMD
    role: training_data
    required_for:
    - preflight
    - train
    - evaluate
    resource_ref:
      platform: modelscope
      repo_id: OneScience/DeePMD
      repo_type: dataset
      url: https://modelscope.cn/datasets/OneScience/DeePMD
      revision: main
      readme_path: README.md
      manifest_path: manifest.yaml
    local_path: data/DeePMD
  optional_datasets: []
  compatible_models: []
run_matrix:
  scenarios:
  - name: minimal_validation
    default: true
    capability: preflight
    required_datasets:
    - id: OneScience/DeePMD
      role: training_data
      local_path: data/DeePMD
    required_model_files:
    - scripts/preflight_deepmd.py
    - conf/input_torch_modelscope.json
    required_data_files:
    - data/DeePMD/water/data_0
    - data/DeePMD/water/data_1
    - data/DeePMD/water/data_2
    - data/DeePMD/water/data_3
    preconditions:
    - OneScience/DeePMD 数据集已下载到模型包根目录 data/DeePMD。
    command_refs:
    - commands.preflight.check_deepmd_package
    outputs:
    - path: stdout
      description_zh: 配置和数据路径检查结果。
capabilities:
  inference: false
  train: true
  finetune: false
  evaluate: true
  visualize: false
  deploy: false
commands:
  download:
  - name: download_model_package
    target: model
    repo_id: OneScience/DeePMD
    source: .
    local_path: session_workdir/
    required: true
    required_for:
    - preflight
    - train
    cwd: .
    command: modelscope download --model OneScience/DeePMD --local_dir session_workdir
    expected_outputs:
    - path: session_workdir/manifest.yaml
      type: file
    success_criteria:
    - exit_code == 0
    - output_path_exists
  - name: download_required_dataset
    target: dataset
    repo_id: OneScience/DeePMD
    source: .
    local_path: session_workdir/
    required: true
    required_for:
    - preflight
    - train
    cwd: .
    command: modelscope download --dataset OneScience/DeePMD --local_dir session_workdir
    expected_outputs:
    - path: session_workdir/data/DeePMD/water/data_0/type.raw
      type: file
    success_criteria:
    - exit_code == 0
    - output_path_exists
  preflight:
  - name: check_deepmd_package
    description: 检查 DeePMD 标准包、配置和 water 数据路径。
    cwd: .
    command: python scripts/preflight_deepmd.py --package-root .
    required_files:
    - scripts/preflight_deepmd.py
    - conf/input_torch_modelscope.json
    - data/DeePMD/water/data_0/type.raw
    required_env:
    - python
    expected_outputs:
    - path: stdout
      type: text
    success_criteria:
    - exit_code == 0
  prepare: []
  inference: []
  train:
  - name: train_water_pt
    description: 使用 DeepMD-kit PyTorch 后端训练 water se_e2_a 示例。
    cwd: .
    command: dp --pt train conf/input_torch_modelscope.json
    required_files:
    - conf/input_torch_modelscope.json
    - data/DeePMD/water/data_0/type.raw
    required_env:
    - dp
    - python
    - torch
    expected_outputs:
    - path: lcurve.out
      type: file
    success_criteria:
    - exit_code == 0
  finetune: []
  evaluate: []
  visualize: []
  deploy: []
expected_outputs:
- path: stdout
  type: text
  description_zh: 预检输出 DeePMD 配置和 water 数据路径 OK。
diagnostics:
- error_pattern: missing directory
  likely_cause: DeePMD 数据集未下载或没有放到 data/DeePMD。
  action: 执行 modelscope download --dataset OneScience/DeePMD --local_dir session_workdir。
- error_pattern: 'dp: command not found'
  likely_cause: DeepMD-kit 未安装或环境未加载。
  action: 执行 bash install.sh matchem 后进入 upstream 运行 bash dp_install.sh。
domain_extension:
  matchem:
    model_family: DeePMD
    dataset_family: DeePMD water
    backend: PyTorch
    data_format: DeepMD npy
reproducibility:
  level: minimal
  goal: 完成 DeePMD PyTorch water 配置和数据路径预检。
  command_ref: commands.preflight.check_deepmd_package
  expected_runtime: 1 minute
  expected_outputs:
  - stdout
