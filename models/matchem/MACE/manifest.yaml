onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/MACE
  name: MACE
  domain: matchem
  domain_tags:
    - matchem
    - molecular_potential
    - atomistic_simulation
  task: mlip_training
  task_tags:
    - mlip
    - energy_prediction
    - force_prediction
    - distributed_training
  modalities:
    - atomistic_structure
  input_formats:
    - hdf5
    - extxyz
  output_formats:
    - pt
    - log
  summary: 面向 ANI-1x 分子构型数据的 MACE 机器学习原子间势训练标准运行包。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/MACE
    repo_type: model
    url: https://modelscope.cn/models/OneScience/MACE
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: null

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/MACE
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: matchem
  min_onescience_version: null
  supported_execution:
    - local
    - local_slurm
    - remote_slurm
    - scnet_mcp

environment:
  install_mode: onescience_domain
  python: "3.11"
  hardware:
    cpu: preflight_only
    gpu: supported
    dcu: supported
  extra_dependencies:
    - pyyaml
    - h5py

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh matchem
  source_paths:
    - onescience/examples/matchem/mace
  compatibility:
    examples_path: examples/matchem/mace
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: configs
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - train.py
    - run.sh
    - _parse_config.py
    - configs/ani1x_8dcu.yaml
    - metadata/sha256_manifest.txt
    - scripts/preflight_mace_ani1x.py
  entrypoints:
    preflight: scripts/preflight_mace_ani1x.py
    inference: null
    train: train.py
    finetune: null
    evaluate: train.py
    visualize: null
    deploy: null

configuration_adaptation:
  adapted_from: onescience/examples/matchem/mace/demo/configs/ani1x_8dcu.yaml
  reason: 原始配置依赖 ONESCIENCE_DATASETS_DIR 下的仓库外数据路径；标准运行包需要下载后在包根目录 data/ani1x 下自洽运行，并与当前 ANI-1x statistics 中的 r_max 一致。
  changes:
    - file: configs/ani1x_8dcu.yaml
      yaml_path: train_args.train_file
      original_value: "${ONESCIENCE_DATASETS_DIR}/matchem/mace/ani1x/ANI1x_cc_DFT_rc5_train"
      current_value: "${MACE_ANI1X_DATA_DIR:-data/ani1x}/ANI1x_cc_DFT_rc5_train"
      reason: 对齐 ModelScope 数据集下载后的标准本地路径。
    - file: configs/ani1x_8dcu.yaml
      yaml_path: train_args.valid_file
      original_value: "${ONESCIENCE_DATASETS_DIR}/matchem/mace/ani1x/ANI1x_cc_DFT_rc5_val"
      current_value: "${MACE_ANI1X_DATA_DIR:-data/ani1x}/ANI1x_cc_DFT_rc5_val"
      reason: 对齐 ModelScope 数据集下载后的标准本地路径。
    - file: configs/ani1x_8dcu.yaml
      yaml_path: train_args.test_file
      original_value: null
      current_value: "${MACE_ANI1X_DATA_DIR:-data/ani1x}/ANI1x_cc_DFT_rc5_test"
      reason: 当前数据集包含 test split，评测场景需要显式声明。
    - file: configs/ani1x_8dcu.yaml
      yaml_path: train_args.statistics_file
      original_value: "${ONESCIENCE_DATASETS_DIR}/matchem/mace/ani1x/ANI1x_cc_DFT_rc5_statistics.json"
      current_value: "${MACE_ANI1X_DATA_DIR:-data/ani1x}/ANI1x_cc_DFT_rc5_statistics.json"
      reason: 对齐 ModelScope 数据集下载后的标准本地路径。
    - file: configs/ani1x_8dcu.yaml
      yaml_path: train_args.r_max
      original_value: 4.5
      current_value: 5.0
      reason: 当前 ANI-1x statistics 文件中 r_max 为 5.0，预检要求训练配置与数据统计一致。

files:
  model_files:
    - id: train_script
      path: train.py
      role: script
      description_zh: MACE 训练主脚本，来自 OneScience examples/matchem/mace。
      required: true
      required_for: [train, evaluate]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: train.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/train.py
      size: null
      checksum: null
      large_file: false
    - id: run_script
      path: run.sh
      role: script
      description_zh: 统一运行入口，支持 dry-run、直接运行和 SLURM 提交。
      required: true
      required_for: [preflight, train]
      format: bash
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: run.sh
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/run.sh
      size: null
      checksum: null
      large_file: false
    - id: parse_config
      path: _parse_config.py
      role: script
      description_zh: 将 YAML 配置转换为训练命令、环境变量和预检文件列表。
      required: true
      required_for: [preflight, train]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: _parse_config.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/_parse_config.py
      size: null
      checksum: null
      large_file: false
  dataset_files:
    - id: ani1x_dataset
      path: data/ani1x/
      role: train_data
      description_zh: MACE ANI-1x 训练、验证和测试数据，来自数据集仓库 OneScience/ani1x。
      required: true
      required_for: [preflight, train, evaluate]
      format: hdf5
      source:
        platform: modelscope
        repo_id: OneScience/ani1x
        repo_type: dataset
        path: data/ani1x/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_required_dataset
      mirrors: []
      local_path: session_workdir/data/ani1x/
      size: 762M
      checksum: metadata/sha256_manifest.txt
      large_file: false
  config_files:
    - id: ani1x_config
      path: configs/ani1x_8dcu.yaml
      role: training_config
      description_zh: ANI-1x 8 DCU 训练配置，已改为标准运行包数据路径并对齐 statistics。
      required: true
      required_for: [preflight, train, evaluate]
      format: yaml
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: configs/ani1x_8dcu.yaml
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/configs/ani1x_8dcu.yaml
      size: null
      checksum: null
      large_file: false
    - id: preflight_script
      path: scripts/preflight_mace_ani1x.py
      role: script
      description_zh: 检查配置、数据路径、HDF5 字段、shape、dtype、statistics 与配置是否匹配。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: scripts/preflight_mace_ani1x.py
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/scripts/preflight_mace_ani1x.py
      size: null
      checksum: null
      large_file: false
    - id: sha256_manifest
      path: metadata/sha256_manifest.txt
      role: checksum
      description_zh: 模型包内 data/ani1x 数据文件的 SHA256 清单，用于上传前校验普通文件拷贝的一致性。
      required: true
      required_for: [preflight]
      format: txt
      source:
        platform: modelscope
        repo_id: OneScience/MACE
        repo_type: model
        path: metadata/sha256_manifest.txt
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: session_workdir/metadata/sha256_manifest.txt
      size: null
      checksum: null
      large_file: false
  sample_files: []

relations:
  required_datasets:
    - id: OneScience/ani1x
      role: train_data
      required_for: [preflight, train, evaluate]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/ani1x
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/ani1x
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      local_path: data/ani1x
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      required_datasets:
        - id: OneScience/ani1x
          role: train_data
          local_path: data/ani1x
      required_model_files:
        - train.py
        - run.sh
        - _parse_config.py
        - configs/ani1x_8dcu.yaml
        - scripts/preflight_mace_ani1x.py
      required_data_files:
        - data/ani1x/ANI1x_cc_DFT_rc5_train/*.h5
        - data/ani1x/ANI1x_cc_DFT_rc5_val/*.h5
        - data/ani1x/ANI1x_cc_DFT_rc5_test/*.h5
        - data/ani1x/ANI1x_cc_DFT_rc5_statistics.json
      preconditions:
        - 已下载模型标准运行包 OneScience/MACE。
        - 已下载数据集 OneScience/ani1x，并将 data/ani1x 放在模型包根目录下。
      command_refs:
        - commands.preflight.check_mace_ani1x
      outputs:
        - path: stdout
          description_zh: 输出配置和数据结构检查结果。
    - name: train_ani1x_8dcu
      default: false
      capability: train
      required_datasets:
        - id: OneScience/ani1x
          role: train_data
          local_path: data/ani1x
      required_model_files:
        - train.py
        - run.sh
        - _parse_config.py
        - configs/ani1x_8dcu.yaml
      required_data_files:
        - data/ani1x/ANI1x_cc_DFT_rc5_train/*.h5
        - data/ani1x/ANI1x_cc_DFT_rc5_val/*.h5
        - data/ani1x/ANI1x_cc_DFT_rc5_statistics.json
      preconditions:
        - OneScience matchem 依赖已安装。
        - 可用 8 张 DCU/GPU 或已按实际硬件修改 configs/ani1x_8dcu.yaml。
        - minimal_validation 已通过。
      command_refs:
        - commands.train.train_ani1x_8dcu
      outputs:
        - path: outputs/
          description_zh: 训练日志、配置快照和 checkpoint 输出目录。

capabilities:
  inference: false
  train: true
  finetune: false
  evaluate: true
  visualize: false
  deploy: false

commands:
  download:
    - name: download_model_package
      target: model
      repo_id: OneScience/MACE
      source: .
      local_path: session_workdir/
      required: true
      required_for: [preflight, train, evaluate]
      cwd: .
      command: modelscope download --model OneScience/MACE --local_dir session_workdir
      expected_outputs:
        - path: session_workdir/manifest.yaml
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: download_required_dataset
      target: dataset
      repo_id: OneScience/ani1x
      source: data/ani1x/
      local_path: session_workdir/data/ani1x/
      required: true
      required_for: [preflight, train, evaluate]
      cwd: .
      command: modelscope download --dataset OneScience/ani1x --local_dir session_workdir
      expected_outputs:
        - path: session_workdir/data/ani1x/ANI1x_cc_DFT_rc5_statistics.json
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  preflight:
    - name: check_mace_ani1x
      description: 检查 MACE 配置与 ANI-1x 数据是否匹配。
      cwd: .
      command: python scripts/preflight_mace_ani1x.py --config configs/ani1x_8dcu.yaml --data-dir data/ani1x
      required_files:
        - configs/ani1x_8dcu.yaml
        - scripts/preflight_mace_ani1x.py
        - data/ani1x/ANI1x_cc_DFT_rc5_statistics.json
      required_env:
        - python
        - pyyaml
        - h5py
      expected_outputs:
        - path: stdout
          type: text
      success_criteria:
        - exit_code == 0
  prepare: []
  inference: []
  train:
    - name: train_ani1x_8dcu
      description: 使用标准化 ANI-1x 配置启动 MACE 训练。
      cwd: .
      command: bash run.sh --config configs/ani1x_8dcu.yaml
      required_files:
        - train.py
        - run.sh
        - _parse_config.py
        - configs/ani1x_8dcu.yaml
        - data/ani1x/ANI1x_cc_DFT_rc5_train
        - data/ani1x/ANI1x_cc_DFT_rc5_val
        - data/ani1x/ANI1x_cc_DFT_rc5_statistics.json
      required_env:
        - onescience
        - matchem
        - torch
      expected_outputs:
        - path: outputs/
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  finetune: []
  evaluate:
    - name: evaluate_during_training
      description: 当前包的评测随训练过程按 eval_interval 在验证集上执行。
      cwd: .
      command: bash run.sh --config configs/ani1x_8dcu.yaml
      required_files:
        - configs/ani1x_8dcu.yaml
        - data/ani1x/ANI1x_cc_DFT_rc5_val
      required_env:
        - onescience
        - matchem
        - torch
      expected_outputs:
        - path: outputs/
          type: directory
      success_criteria:
        - exit_code == 0
        - validation_metrics_logged
  visualize: []
  deploy: []

expected_outputs:
  - path: outputs/<experiment>_<timestamp>/
    type: directory
    description_zh: 训练输出目录，包含配置快照、日志和模型 checkpoint。
  - path: stdout
    type: text
    description_zh: 预检输出 [OK] 表示配置与数据可读性检查通过。

diagnostics:
  - error_pattern: "No such file or directory"
    likely_cause: 缺少模型运行包文件或 ANI-1x 数据未放到 data/ani1x。
    action: 重新执行 modelscope download --model OneScience/MACE 和 modelscope download --dataset OneScience/ani1x，并确认运行 cwd 是模型包根目录。
  - error_pattern: "r_max"
    likely_cause: 配置中的 r_max 与 statistics 文件不一致。
    action: 检查 configs/ani1x_8dcu.yaml 中 train_args.r_max 是否为 5.0，或同步更新 statistics。
  - error_pattern: "ModuleNotFoundError"
    likely_cause: OneScience matchem 依赖或 Python 包未安装。
    action: 在 OneScience 根目录执行 bash install.sh matchem，或安装 pyyaml、h5py、torch 等依赖。
  - error_pattern: "CUDA out of memory"
    likely_cause: batch_size 或模型规模超过设备显存。
    action: 降低 configs/ani1x_8dcu.yaml 中 batch_size、valid_batch_size 或 num_channels。

domain_extension:
  matchem:
    chemical_system:
      elements:
        - H
        - C
        - N
        - O
    properties:
      - energy
      - forces
    units:
      energy: eV
      forces: eV/Angstrom
    structure_format:
      - hdf5
      - extxyz

reproducibility:
  level: minimal
  goal: 完成配置和 ANI-1x 数据可读性预检。
  command_ref: commands.preflight.check_mace_ani1x
  expected_runtime: 1-3 minutes
  expected_outputs:
    - stdout
