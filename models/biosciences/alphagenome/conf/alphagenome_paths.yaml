model:
  repo_id: OneScience/alphagenome/
  checkpoint_dir: checkpoints/alphagenome-all-folds
dataset:
  repo_id: OneScience/alphagenome_dataset
  expected_root: data/alphagenome_dataset
  reference_fasta_human: data/alphagenome_dataset/reference/HOMO_SAPIENS/GRCh38.p13.genome.fa
  reference_fai_human: data/alphagenome_dataset/reference/HOMO_SAPIENS/GRCh38.p13.genome.fa.fai
  train_root: data/alphagenome_dataset/v1/train
defaults:
  organism: HOMO_SAPIENS
  model_version: all_folds
  inference_interval:
    chromosome: chr19
    start: 10587331
    end: 11635907
configuration_adaptation:
  - file: inference.sh
    yaml_path: shell.DATA_ROOT_DIR
    original_value: ${ONESCIENCE_DATASETS_DIR}/AlphaGenome
    current_value: data/alphagenome_dataset
    reason: ModelScope 下载后运行 cwd 为模型包根目录，数据集通过 OneScience/alphagenome_dataset 下载或实体复制到 data/alphagenome_dataset。
  - file: inference.sh
    yaml_path: shell.MODEL_ROOT_DIR
    original_value: ${ONESCIENCE_MODELS_DIR}/AlphaGenome
    current_value: checkpoints
    reason: ModelScope 下载后权重目录位于模型包内 checkpoints/alphagenome-all-folds。
  - file: run_track.sh
    yaml_path: shell.DATA_ROOT_DIR
    original_value: ${ONESCIENCE_DATASETS_DIR}/AlphaGenome
    current_value: data/alphagenome_dataset
    reason: 当前整理数据只包含 v1/train/ALL_FOLDS/HOMO_SAPIENS/VALID 与 reference，评测命令显式指向 data/alphagenome_dataset/v1/train。
  - file: run_variant.sh
    yaml_path: shell.DATA_ROOT_DIR
    original_value: ${ONESCIENCE_DATASETS_DIR}/AlphaGenome
    current_value: data/alphagenome_dataset
    reason: 变异评分需要参考基因组 FASTA 和索引，统一由数据集仓库提供。
