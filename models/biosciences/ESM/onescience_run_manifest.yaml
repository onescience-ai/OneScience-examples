onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/esmfold/
  name: ESMFold
  domain: bio
  domain_tags: [bio, protein, structure_prediction]
  task: protein_structure_prediction
  task_tags: [esmfold, protein_folding, fasta_to_pdb, representation_extraction]
  modalities: [protein_sequence]
  input_formats: [fasta]
  output_formats: [pdb, pytorch_tensor]
  summary: ESMFold 蛋白质结构预测标准运行包，提供 FASTA 输入到 PDB 输出的最小推理和预检流程。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/esmfold/
    repo_type: model
    url: https://modelscope.cn/models/OneScience/esmfold/
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: MIT

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/esmfold/
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]
  environment:
    python: ">=3.9"
    required_packages: [torch, pyyaml, onescience]
    optional_packages: [fairscale]

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh bio
  source_paths:
    - src/onescience/models/esm
    - src/onescience/datapipes/esm
  compatibility:
    examples_path: examples/biosciences/esm
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/config.yaml
    - scripts/preflight.py
    - scripts/fold.py
    - scripts/extract.py
    - data/sample/few_proteins.fasta
    - checkpoints/esmfold_3B_v1.pt
  entrypoints:
    preflight: scripts/preflight.py
    inference: scripts/fold.py
    train: null
    finetune: null
    evaluate: null
    visualize: null
    deploy: null

configuration_adaptation:
  adapted: true
  reason: 原 OneScience examples 通过仓库根目录和 ONESCIENCE_MODELS_DIR 环境变量定位权重；标准包需要在 ModelScope 下载后的包根目录直接运行，并匹配当前数据集只提供 weight 目录、data 为空的资源形态。
  changes:
    - file: conf/config.yaml
      yaml_path: paths.model_dir
      original_value: "$ONESCIENCE_MODELS_DIR/esm_models/"
      current_value: "."
      reason: torch.hub 在包根目录下查找 checkpoints/esmfold_3B_v1.pt。
    - file: conf/config.yaml
      yaml_path: paths.sample_fasta
      original_value: examples/biosciences/esm/data/few_proteins.fasta
      current_value: data/sample/few_proteins.fasta
      reason: 最小验证样例复制到标准包 data/sample 下，避免依赖原始 examples 目录。
    - file: conf/config.yaml
      yaml_path: dataset_expectation.expected_dataset_local_path
      original_value: null
      current_value: ../../dataset/bio_esmfold_dataset
      reason: 显式声明模型包与 OneScience/esmfold_dataset 下载后的本地相对位置。

files:
  model_files:
    - id: esmfold_checkpoint
      path: checkpoints/esmfold_3B_v1.pt
      role: checkpoint
      description_zh: ESMFold v1 3B 推理权重，torch.hub 通过 checkpoints 目录加载。
      required: true
      required_for: [preflight, inference]
      size_bytes: 2771653574
      sha256: e9a52579027e77d2d2e0a18218e755821f395730e86624cab9413dc117f5ca62
      source:
        platform: modelscope
        repo_id: OneScience/esmfold/
        repo_type: model
        path: checkpoints/esmfold_3B_v1.pt
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: checkpoints/esmfold_3B_v1.pt
  dataset_files: []
  config_files:
    - id: runtime_config
      path: conf/config.yaml
      role: config
      description_zh: 标准包运行配置，声明 FASTA、输出目录、权重目录和关联数据集位置。
      required: true
      required_for: [preflight, inference]
      source:
        platform: modelscope
        repo_id: OneScience/esmfold/
        repo_type: model
        path: conf/config.yaml
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: conf/config.yaml
  sample_files:
    - id: sample_fasta
      path: data/sample/few_proteins.fasta
      role: demo_data
      description_zh: 最小 ESMFold 推理 FASTA 样例。
      required: true
      required_for: [preflight, inference]
      size_bytes: 319
      sha256: 910b90110764f0abe23d1378ef4e8bb721917bcb9fa6f2749ef06dcaea3f6e0a
      source:
        platform: modelscope
        repo_id: OneScience/esmfold/
        repo_type: model
        path: data/sample/few_proteins.fasta
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: data/sample/few_proteins.fasta

relations:
  required_datasets:
    - id: OneScience/esmfold_dataset
      role: inference_input
      required_for: [preflight, inference]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/esmfold_dataset
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/esmfold_dataset
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      expected_local_path: ../../dataset/bio_esmfold_dataset
      adapter: null
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_preflight
      default: true
      capability: preflight
      description_zh: 检查配置、样例 FASTA、模型权重、关联数据集权重和摘要是否匹配。
      required_datasets:
        - id: OneScience/esmfold_dataset
          role: inference_input
          local_path: ../../dataset/bio_esmfold_dataset
      required_model_files:
        - checkpoints/esmfold_3B_v1.pt
        - conf/config.yaml
        - data/sample/few_proteins.fasta
      required_dataset_files:
        - weight/esmfold_3B_v1.pt
      command_refs:
        - commands.preflight.model_preflight
      expected_outputs:
        - Model preflight passed.
      prerequisites:
        - 在模型包根目录执行。
        - 已下载 OneScience/esmfold_dataset 到 ../../dataset/bio_esmfold_dataset，或通过 --dataset-root 指定位置。
    - name: esmfold_sample_inference
      default: true
      capability: inference
      description_zh: 使用 data/sample/few_proteins.fasta 生成 PDB 结构文件。
      required_datasets:
        - id: OneScience/esmfold_dataset
          role: inference_input
          local_path: ../../dataset/bio_esmfold_dataset
      required_model_files:
        - checkpoints/esmfold_3B_v1.pt
        - scripts/fold.py
        - data/sample/few_proteins.fasta
      required_dataset_files:
        - weight/esmfold_3B_v1.pt
      command_refs:
        - commands.inference.run_sample_cpu
      expected_outputs:
        - outputs/esmfold_pdb/*.pdb
      prerequisites:
        - 已安装 OneScience bio 环境并可 import onescience.models.esm。
        - CPU 推理很慢；有 GPU 时可去掉 --cpu-only。

capabilities:
  inference: true
  train: false
  finetune: false
  evaluate: false
  visualize: false
  deploy: false

commands:
  download:
    - name: download_model
      cwd: .
      command: modelscope download --model OneScience/esmfold/ --local_dir ./bio_esmfold
      description_zh: 下载模型标准运行包。若网页端使用 --cache_dir，运行 cwd 需切换到实际下载后的模型包根目录。
    - name: download_dataset
      cwd: .
      command: modelscope download --dataset OneScience/esmfold_dataset --local_dir ./bio_esmfold_dataset
      description_zh: 下载关联数据集标准包。
  preflight:
    - name: model_preflight
      cwd: .
      command: python scripts/preflight.py --dataset-root ../../dataset/bio_esmfold_dataset
      required_files:
        - conf/config.yaml
        - manifest.yaml
        - checkpoints/esmfold_3B_v1.pt
        - data/sample/few_proteins.fasta
      expected_outputs:
        - Model preflight passed.
  prepare: []
  inference:
    - name: run_sample_cpu
      cwd: .
      command: python scripts/fold.py -i data/sample/few_proteins.fasta -o outputs/esmfold_pdb --model-dir . --chunk-size 128 --cpu-only
      required_files:
        - scripts/fold.py
        - data/sample/few_proteins.fasta
        - checkpoints/esmfold_3B_v1.pt
      expected_outputs:
        - outputs/esmfold_pdb/*.pdb
  train: []
  finetune: []
  evaluate: []
  visualize: []
  deploy: []

expected_outputs:
  - path: outputs/esmfold_pdb/*.pdb
    type: pdb
    description_zh: 每条 FASTA 记录对应一个预测蛋白质结构文件。
  - path: stdout
    type: log
    description_zh: 包含读取序列数、加载模型、预测进度、pLDDT 和 pTM。

diagnostics:
  - symptom: "No such file or directory: checkpoints/esmfold_3B_v1.pt"
    likely_cause: 模型包未完整下载，或当前工作目录不是模型包根目录。
    action: 重新执行 modelscope download --model OneScience/esmfold/，并 cd 到实际下载后的包根目录。
  - symptom: "Dataset weight not found"
    likely_cause: 未下载 OneScience/esmfold_dataset，或数据集不在 manifest 声明的相对路径。
    action: 执行 modelscope download --dataset OneScience/esmfold_dataset，或运行预检时传入 --dataset-root。
  - symptom: "CUDA out of memory"
    likely_cause: 序列过长、batch token 数过大或 GPU 显存不足。
    action: 降低 --max-tokens-per-batch，设置 --chunk-size 64/32，或使用 --cpu-only。
  - symptom: "ModuleNotFoundError: onescience"
    likely_cause: OneScience bio 环境未加载。
    action: 安装或加载 OneScience 环境，确保 src/onescience 在 PYTHONPATH 中。

domain_extension:
  bio:
    protein_task: monomer_structure_prediction
    sequence_input: fasta
    structure_output: pdb
    checkpoint_family: ESMFold v1
