onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/ProteinMPNN
  name: ProteinMPNN
  chinese_name: ProteinMPNN
  domain: bio
  domain_tags:
    - bio
    - protein
    - protein_design
  task: protein_sequence_design
  task_tags:
    - protein_sequence_design
    - backbone_conditioned_generation
    - protein_scoring
  modalities:
    - protein_structure
    - protein_sequence
  input_formats:
    - pdb
    - jsonl
    - fasta
    - npz
  output_formats:
    - fasta
    - npy
    - npz
  summary: ProteinMPNN 蛋白质骨架到序列设计标准运行包，包含 OneScience 示例代码、辅助脚本、示例输入、训练入口和三类模型权重。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/ProteinMPNN
    repo_type: model
    url: https://modelscope.cn/models/OneScience/ProteinMPNN
    revision: master
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: Apache License 2.0

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/ProteinMPNN
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation
    default_dataset_repo_id: OneScience/proteinmpnn

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution:
    - local
    - local_slurm
    - remote_slurm
    - scnet_mcp
  workdir: .
  environment:
    install_command: bash install.sh bio
    python_dependencies:
      - torch
      - numpy
      - pyyaml
    onescience_imports:
      - onescience.models.proteinmpnn.protein_mpnn_utils

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh bio
  source_paths:
    - examples/biosciences/ProteinMPNN
  compatibility:
    examples_path: examples/biosciences/ProteinMPNN
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: null
    checkpoint_dir: vanilla_model_weights
    data_dir: inputs
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - protein_mpnn_run.py
    - helper_scripts/parse_multiple_chains.py
    - train/training.py
    - tools/preflight_check.py
    - tools/run_minimal_inference.sh
  entrypoints:
    preflight: tools/preflight_check.py
    inference: protein_mpnn_run.py
    train: train/training.py
    finetune: null
    evaluate: protein_mpnn_run.py
    visualize: null
    deploy: null

files:
  model_files:
    - path: vanilla_model_weights/
      role: model_weights
      description_zh: 标准 ProteinMPNN 权重目录，包含四个不同噪声级别的 v_48 模型。
      required: true
      required_for:
        - inference
        - scoring
        - evaluation
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: vanilla_model_weights/
        download_method: command_ref
        command_ref: download_model
      local_path: vanilla_model_weights/
      files:
        - vanilla_model_weights/v_48_002.pt
        - vanilla_model_weights/v_48_010.pt
        - vanilla_model_weights/v_48_020.pt
        - vanilla_model_weights/v_48_030.pt
    - path: soluble_model_weights/
      role: model_weights
      description_zh: 可溶蛋白版本 ProteinMPNN 权重目录。
      required: false
      required_for:
        - inference
        - scoring
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: soluble_model_weights/
        download_method: command_ref
        command_ref: download_model
      local_path: soluble_model_weights/
      files:
        - soluble_model_weights/v_48_002.pt
        - soluble_model_weights/v_48_010.pt
        - soluble_model_weights/v_48_020.pt
        - soluble_model_weights/v_48_030.pt
        - soluble_model_weights/excluded_PDBs.csv
    - path: ca_model_weights/
      role: model_weights
      description_zh: CA-only ProteinMPNN 权重目录。
      required: false
      required_for:
        - ca_only_inference
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: ca_model_weights/
        download_method: command_ref
        command_ref: download_model
      local_path: ca_model_weights/
      files:
        - ca_model_weights/v_48_002.pt
        - ca_model_weights/v_48_010.pt
        - ca_model_weights/v_48_020.pt
  code_files:
    - path: protein_mpnn_run.py
      role: inference_entry
      description_zh: ProteinMPNN 推理、打分和概率输出主入口。
      required: true
      required_for:
        - inference
        - scoring
        - evaluation
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: protein_mpnn_run.py
        download_method: command_ref
        command_ref: download_model
      local_path: protein_mpnn_run.py
    - path: helper_scripts/
      role: preprocessing_scripts
      description_zh: PDB 解析、链选择、固定残基、PSSM 和偏置设置辅助脚本。
      required: true
      required_for:
        - inference_prepare
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: helper_scripts/
        download_method: command_ref
        command_ref: download_model
      local_path: helper_scripts/
    - path: train/
      role: training_entry
      description_zh: ProteinMPNN 训练入口和训练辅助脚本。
      required: false
      required_for:
        - training
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: train/
        download_method: command_ref
        command_ref: download_model
      local_path: train/
  config_files: []
  data_files:
    - path: inputs/PDB_monomers/pdbs/5L33.pdb
      role: minimal_input
      description_zh: 最小推理场景使用的单体 PDB 示例。
      required: true
      required_for:
        - minimal_validation
        - inference
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: inputs/PDB_monomers/pdbs/5L33.pdb
        download_method: command_ref
        command_ref: download_model
      local_path: inputs/PDB_monomers/pdbs/5L33.pdb
    - path: inputs/
      role: sample_inputs
      description_zh: 多种 ProteinMPNN 示例输入，包括 PDB 和 PSSM 示例。
      required: false
      required_for:
        - inference_examples
      source:
        platform: modelscope
        repo_id: OneScience/ProteinMPNN
        repo_type: model
        path: inputs/
        download_method: command_ref
        command_ref: download_model
      local_path: inputs/
  metadata_files:
    - path: README.md
      role: readme
      description_zh: ModelScope 页面说明和大模型运行入口。
      required: true
      required_for:
        - llm_handoff
    - path: manifest.yaml
      role: manifest
      description_zh: 机器可读运行清单。
      required: true
      required_for:
        - llm_handoff
    - path: onescience_run_manifest.yaml
      role: run_manifest
      description_zh: OneScience 网页端运行清单兼容文件。
      required: true
      required_for:
        - llm_handoff
    - path: onescience_relations.yaml
      role: relations
      description_zh: 模型与数据集关系声明。
      required: true
      required_for:
        - relation_resolution
    - path: tools/preflight_check.py
      role: preflight
      description_zh: 标准运行包预检脚本。
      required: true
      required_for:
        - preflight
    - path: tools/run_minimal_inference.sh
      role: inference_wrapper
      description_zh: 最小推理包装脚本。
      required: false
      required_for:
        - inference
    - path: checksums.sha256
      role: checksum
      description_zh: 关键权重和运行元数据的 SHA256 校验文件。
      required: true
      required_for:
        - integrity_check

relations:
  required_datasets:
    - id: OneScience/proteinmpnn
      name: proteinmpnn
      purpose: training_and_evaluation_data
      required_for:
        - training
        - evaluation
        - reproducibility
      optional_for:
        - minimal_validation
        - inference
      resource_ref:
        platform: modelscope
        repo_id: OneScience/proteinmpnn
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/proteinmpnn
        revision: master
        readme_path: README.md
        manifest_path: manifest.yaml
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      description_zh: 解析 Manifest、检查 repo_id、检查 UTF-8 和关键文件是否完整。
      model_files:
        - manifest.yaml
        - README.md
        - vanilla_model_weights/v_48_020.pt
        - inputs/PDB_monomers/pdbs/5L33.pdb
      dataset_files: []
      required_datasets: []
      command_ref: model_preflight
      outputs:
        - stdout:MODEL_PREFLIGHT_OK
      prerequisites:
        - 已下载完整模型运行包 OneScience/ProteinMPNN
    - name: inference_minimal_pdb
      default: false
      capability: inference
      description_zh: 使用内置 5L33 PDB 和 v_48_020 权重生成候选序列。
      model_files:
        - protein_mpnn_run.py
        - vanilla_model_weights/v_48_020.pt
        - inputs/PDB_monomers/pdbs/5L33.pdb
      dataset_files: []
      required_datasets: []
      command_ref: inference_minimal
      outputs:
        - outputs/modelscope_minimal/seqs/*.fa
      prerequisites:
        - Python 环境可以导入 torch、numpy 和 onescience.models.proteinmpnn
    - name: training_with_dataset
      default: false
      capability: train
      description_zh: 使用关联数据集 OneScience/proteinmpnn 启动训练入口。
      model_files:
        - train/training.py
      dataset_files:
        - $PROTEINMPNN_DATA_ROOT
      required_datasets:
        - OneScience/proteinmpnn
      command_ref: train_with_dataset
      outputs:
        - outputs/checkpoints/*.pt
        - training logs
      prerequisites:
        - 已下载并验证 OneScience/proteinmpnn 数据集
        - PROTEINMPNN_DATA_ROOT 指向数据集根目录
    - name: scoring_existing_sequence
      default: false
      capability: evaluate
      description_zh: 对输入骨架和序列组合执行 score_only 打分。
      model_files:
        - protein_mpnn_run.py
        - vanilla_model_weights/v_48_020.pt
      dataset_files: []
      required_datasets: []
      command_ref: score_only_example
      outputs:
        - outputs/modelscope_score/score_only/*.npy
      prerequisites:
        - 提供 PDB 输入和可选 FASTA 输入

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: false
  deploy: false

commands:
  download:
    - name: download_model
      description_zh: 下载完整模型标准运行包。
      repo_id: OneScience/ProteinMPNN
      repo_type: model
      command: modelscope download --model OneScience/ProteinMPNN --local_dir ./ProteinMPNN_model
      cwd: .
      expected_path: ./ProteinMPNN_model
    - name: download_dataset
      description_zh: 下载训练和评测所需的关联数据集。
      repo_id: OneScience/proteinmpnn
      repo_type: dataset
      command: modelscope download --dataset OneScience/proteinmpnn --local_dir ./proteinmpnn_dataset
      cwd: .
      expected_path: ./proteinmpnn_dataset
  preflight:
    - name: model_preflight
      description_zh: 检查标准运行包结构、Manifest、关系、repo_id、UTF-8 和关键文件。
      command: python tools/preflight_proteinmpnn.py --repo-root .
      cwd: .
      required_files:
        - README.md
        - manifest.yaml
        - onescience_run_manifest.yaml
        - onescience_relations.yaml
        - vanilla_model_weights/v_48_020.pt
        - inputs/PDB_monomers/pdbs/5L33.pdb
      expected_outputs:
        - MODEL_PREFLIGHT_OK
  inference:
    - name: inference_minimal
      description_zh: 使用内置示例 PDB 执行最小推理。
      command: bash tools/run_minimal_inference.sh
      cwd: .
      required_files:
        - protein_mpnn_run.py
        - vanilla_model_weights/v_48_020.pt
        - inputs/PDB_monomers/pdbs/5L33.pdb
      expected_outputs:
        - outputs/modelscope_minimal/seqs/*.fa
    - name: score_only_example
      description_zh: 对输入 PDB 执行 score_only 示例。
      command: python protein_mpnn_run.py --pdb_path inputs/PDB_monomers/pdbs/5L33.pdb --pdb_path_chains A --path_to_model_weights vanilla_model_weights --model_name v_48_020 --out_folder outputs/modelscope_score --score_only 1 --seed 37 --batch_size 1
      cwd: .
      required_files:
        - protein_mpnn_run.py
        - vanilla_model_weights/v_48_020.pt
        - inputs/PDB_monomers/pdbs/5L33.pdb
      expected_outputs:
        - outputs/modelscope_score/score_only/*.npy
  train:
    - name: train_with_dataset
      description_zh: 使用外部关联数据集启动训练入口。
      command: python train/training.py --path_for_training_data "$PROTEINMPNN_DATA_ROOT"
      cwd: .
      required_files:
        - train/training.py
      required_datasets:
        - OneScience/proteinmpnn
      expected_outputs:
        - outputs/checkpoints/*.pt

expected_outputs:
  preflight:
    - stdout:MODEL_PREFLIGHT_OK
  inference:
    - path: outputs/modelscope_minimal/seqs/*.fa
      description_zh: 生成的候选蛋白质序列 FASTA 文件。
    - path: outputs/modelscope_minimal/*.npz
      description_zh: 按参数可能生成的概率或打分中间结果。
  train:
    - path: outputs/checkpoints/*.pt
      description_zh: 训练生成的 checkpoint。
  evaluate:
    - path: outputs/modelscope_score/score_only/*.npy
      description_zh: score_only 模式输出的分数数组。

diagnostics:
  - code: missing_weights
    severity: error
    message_zh: 缺少 ProteinMPNN 权重文件。
    check: test -f vanilla_model_weights/v_48_020.pt
    fix_zh: 重新下载模型仓库 OneScience/ProteinMPNN，确认运行目录位于模型包根目录。
  - code: repo_id_mismatch
    severity: error
    message_zh: README、Manifest、下载命令或关系文件中的 repo_id 不一致。
    check: python tools/preflight_proteinmpnn.py --repo-root .
    fix_zh: 模型统一使用 OneScience/ProteinMPNN，数据集统一使用 OneScience/proteinmpnn。
  - code: missing_onescience_import
    severity: error
    message_zh: Python 无法导入 OneScience ProteinMPNN 模块。
    check: python -c "import onescience.models.proteinmpnn.protein_mpnn_utils"
    fix_zh: 安装或加载 OneScience bio 环境，并确认 PYTHONPATH 指向 OneScience 源码。
  - code: missing_dataset
    severity: warning
    message_zh: 训练或评测所需数据集缺失。
    check: test -n "$PROTEINMPNN_DATA_ROOT"
    fix_zh: 下载 OneScience/proteinmpnn 并设置 PROTEINMPNN_DATA_ROOT。
  - code: encoding_corruption
    severity: error
    message_zh: README 或 Manifest 存在乱码、连续问号或替换字符。
    check: python tools/preflight_proteinmpnn.py --repo-root .
    fix_zh: 使用 UTF-8 重新生成并上传 README.md、manifest.yaml 和关系文件。

domain_extension:
  bio:
    molecule_type: protein
    task_family: protein_design
    input_format:
      - pdb
      - jsonl
      - fasta
    output_format:
      - fasta
      - npy
      - npz
    database_dependencies: []
    model_variants:
      - name: vanilla
        weights_dir: vanilla_model_weights
        model_names:
          - v_48_002
          - v_48_010
          - v_48_020
          - v_48_030
      - name: soluble
        weights_dir: soluble_model_weights
        model_names:
          - v_48_002
          - v_48_010
          - v_48_020
          - v_48_030
      - name: ca_only
        weights_dir: ca_model_weights
        model_names:
          - v_48_002
          - v_48_010
          - v_48_020

configuration_adaptation:
  adapted: false
  notes_zh: 本次未修改 ProteinMPNN 原始配置或训练配置。标准化处理只把权重同步到 OneScience 示例目录，并从示例目录生成包含代码、权重、脚本、示例输入和 Manifest 的标准运行包。
