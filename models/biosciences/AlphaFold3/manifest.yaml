onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/AlphaFold3/
  name: AlphaFold3
  domain: bio
  domain_tags: [bio, biosciences, protein_structure, molecular_structure]
  task: biomolecular_structure_prediction
  task_tags: [inference, msa_search, data_pipeline, structure_prediction]
  modalities: [protein_sequence, nucleic_acid_sequence, ligand, msa, template]
  input_formats: [alphafold3_json]
  output_formats: [cif, json, csv]
  summary: AlphaFold3 OneScience 标准运行包，支持使用带 MSA 的输入进行结构预测，也支持通过数据集仓库中的数据库执行 MSA 搜索数据管线。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/AlphaFold3/
    repo_type: model
    url: https://modelscope.cn/models/OneScience/AlphaFold3/
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: AlphaFold3 weights terms and OneScience project licenses

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/AlphaFold3/
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: preflight
    cwd_after_download: 下载后切换到模型包根目录再运行命令；如果使用 --cache_dir，cwd 应为实际下载出的 OneScience/AlphaFold3/ 包根目录。

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]
  hardware:
    gpu_required_for_inference: true
    cpu_ok_for_preflight: true
    notes: AlphaFold3 推理需要可用 GPU 和 JAX 后端；预检不加载权重到 GPU。

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh bio
  source_paths:
    - src/onescience/flax_models/alphafold3
  compatibility:
    examples_path: examples/biosciences/alphafold3
    observed_source_path: /public/home/easyscience2024/liuyx/onescience/examples/biosciences/alphafold3
    requested_source_path: /liuyx/onescience/examples/biosciences/alphafold3
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/alphafold3_paths.yaml
    - run_alphafold.py
    - run_inference_msa.sh
    - run_data_pipeline_mmseqs.sh
    - run_data_pipeline_jackhmmer.sh
    - scripts/preflight.py
  entrypoints:
    preflight: scripts/preflight.py
    inference: run_inference_msa.sh
    train: null
    finetune: null
    evaluate: null
    visualize: null
    deploy: null

configuration_adaptation:
  changed_files:
    - file: conf/alphafold3_paths.yaml
      yaml_path: model.checkpoint_dir
      original_value: "${HOME}/models or ${ONESCIENCE_MODELS_DIR}/AlphaFold3 from run_alphafold.py and infer.sh"
      current_value: checkpoints/AlphaFold3
      reason: ModelScope 模型包下载后应在包内查找权重，不依赖原始共享目录环境变量。
    - file: conf/alphafold3_paths.yaml
      yaml_path: dataset.expected_root
      original_value: "${HOME}/public_databases or ${ONESCIENCE_DATASETS_DIR}/alphafold3 from run_alphafold.py and infer_*.sh"
      current_value: data/alphafold3_dataset
      reason: 数据集由 OneScience/AlphaFold3_dataset 单独下载，并在模型包 data/alphafold3_dataset 下被引用。
    - file: conf/alphafold3_paths.yaml
      yaml_path: runtime.default_msa_input
      original_value: ./inputs/7r6r_data.json
      current_value: inputs/7r6r_data.json
      reason: 当前整理包保留带 MSA 的最小样例，可跳过数据库搜索执行推理 smoke test。
    - file: conf/alphafold3_paths.yaml
      yaml_path: runtime.default_search_input
      original_value: ./inputs/t1119_search.json
      current_value: inputs/t1119_search.json
      reason: 当前数据集包含部分搜索数据库和样例输入，数据管线命令显式匹配该子集。

files:
  model_files:
    - id: alphafold3_weights
      path: checkpoints/AlphaFold3/af3.bin
      role: checkpoint
      format: binary_parameters
      description_zh: AlphaFold3 推理权重文件。
      required: true
      required_for: [preflight, inference]
      source:
        platform: modelscope
        repo_id: OneScience/AlphaFold3/
        repo_type: model
        path: checkpoints/AlphaFold3/af3.bin
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: checkpoints/AlphaFold3/af3.bin
      integrity_manifest: metadata_model_files.yaml
    - id: alphafold3_runtime_libs
      path: checkpoints/AlphaFold3/
      role: runtime_binary
      format: shared_library_and_executable
      description_zh: flash attention 动态库和 mmseqs 可执行文件。
      required: true
      required_for: [preflight, msa_search]
      local_path: checkpoints/AlphaFold3/
      integrity_manifest: metadata_model_files.yaml
  dataset_files:
    - id: alphafold3_dataset
      path: data/alphafold3_dataset/
      role: required_dataset
      description_zh: AlphaFold3 推理输入样例、公共搜索数据库、MMseqs 数据库和 Jackhmmer 分片数据库，通过数据集仓库下载后放入模型包 data/alphafold3_dataset。
      required: true
      required_for: [preflight, msa_search, data_pipeline]
      source:
        platform: modelscope
        repo_id: OneScience/AlphaFold3_dataset
        repo_type: dataset
        path: .
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_dataset
      local_path: data/alphafold3_dataset/
  config_files:
    - id: alphafold3_paths
      path: conf/alphafold3_paths.yaml
      role: runtime_paths
      description_zh: 标准运行包路径配置和配置适配说明。
      required: true
      required_for: [preflight, inference, msa_search]
      local_path: conf/alphafold3_paths.yaml
  sample_files:
    - id: msa_input_7r6r
      path: inputs/7r6r_data.json
      role: inference_input
      description_zh: 已包含 MSA 的 AlphaFold3 JSON 输入，可跳过数据管线。
      required: true
      required_for: [minimal_inference]
    - id: search_input_t1119
      path: inputs/t1119_search.json
      role: data_pipeline_input
      description_zh: 不含 MSA 的 AlphaFold3 JSON 输入，用于 MMseqs 或 Jackhmmer 搜索预检。
      required: true
      required_for: [msa_search]
  script_files:
    - id: run_alphafold
      path: run_alphafold.py
      role: core_runner
      description_zh: OneScience AlphaFold3 主运行脚本。
      required: true
      required_for: [inference, data_pipeline]
    - id: preflight_script
      path: scripts/preflight.py
      role: preflight
      description_zh: 检查配置、权重、样例 JSON、数据库路径和关键文件哈希。
      required: true
      required_for: [preflight]

relations:
  required_datasets:
    - id: OneScience/AlphaFold3_dataset
      role: inference_input_and_database
      required_for: [preflight, data_pipeline, msa_search]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/AlphaFold3_dataset
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/AlphaFold3_dataset
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      expected_local_path: data/alphafold3_dataset
      adapter: null
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: preflight
      default: true
      goal: minimal_validation
      capability: preflight
      required_model_files: [alphafold3_weights, alphafold3_runtime_libs]
      required_dataset_files: [alphafold3_dataset]
      required_config_files: [alphafold3_paths]
      required_datasets:
        - id: OneScience/AlphaFold3_dataset
          role: inference_input_and_database
          local_path: data/alphafold3_dataset
      command_refs: [commands.preflight.preflight_model]
      outputs: [preflight_ok_stdout]
      prerequisites:
        - cwd 为模型包根目录。
        - 数据集已下载并放到 data/alphafold3_dataset，或该路径是指向数据集目录的有效链接。
    - name: minimal_inference_with_existing_msa
      capability: inference
      required_model_files: [alphafold3_weights, alphafold3_runtime_libs]
      required_dataset_files: []
      required_config_files: [alphafold3_paths]
      required_datasets: []
      command_refs: [commands.inference.run_msa_inference]
      outputs: [prediction_output_dir, ranking_scores_csv]
      prerequisites:
        - 输入 inputs/7r6r_data.json 已包含 MSA。
        - 当前环境已安装 OneScience bio 依赖、JAX 后端和 GPU 运行环境。
    - name: mmseqs_data_pipeline
      capability: inference
      required_model_files: [alphafold3_runtime_libs]
      required_dataset_files: [alphafold3_dataset]
      required_config_files: [alphafold3_paths]
      required_datasets:
        - id: OneScience/AlphaFold3_dataset
          role: database
          local_path: data/alphafold3_dataset
      command_refs: [commands.inference.run_mmseqs_pipeline]
      outputs: [processed_fold_input_json]
      prerequisites:
        - mmseqsDB 和 public_databases 已放到 data/alphafold3_dataset。
    - name: jackhmmer_data_pipeline
      capability: inference
      required_model_files: []
      required_dataset_files: [alphafold3_dataset]
      required_config_files: [alphafold3_paths]
      required_datasets:
        - id: OneScience/AlphaFold3_dataset
          role: database
          local_path: data/alphafold3_dataset
      command_refs: [commands.inference.run_jackhmmer_pipeline]
      outputs: [processed_fold_input_json]
      prerequisites:
        - jackhmmer_split 和 public_databases 已放到 data/alphafold3_dataset。

capabilities:
  inference: true
  train: false
  finetune: false
  evaluate: false
  visualize: false
  deploy: false
  preflight: true
  data_pipeline: true

commands:
  download:
    - name: download_model
      cwd: .
      command: "modelscope download --model OneScience/AlphaFold3/"
      description_zh: 下载模型标准仓库。若使用 --cache_dir，下载完成后需切换到实际模型包根目录。
    - name: download_dataset
      cwd: .
      command: "modelscope download --dataset OneScience/AlphaFold3_dataset"
      description_zh: 下载适配数据集仓库，并将内容放到模型包 data/alphafold3_dataset 或建立等价链接。
  prepare:
    - name: link_dataset
      cwd: .
      command: "mkdir -p data && ln -s /path/to/AlphaFold3_dataset/data data/alphafold3_dataset"
      description_zh: 当数据集下载在独立目录时，将数据集包的 data 子目录链接到模型包期望位置。
  preflight:
    - name: preflight_model
      cwd: .
      command: "python scripts/preflight.py --root . --dataset-root data/alphafold3_dataset --model-dir checkpoints/AlphaFold3"
      description_zh: 检查模型配置、权重、运行库、样例 JSON 和数据集关键文件。
  inference:
    - name: run_msa_inference
      cwd: .
      command: "bash run_inference_msa.sh inputs/7r6r_data.json outputs/msa_inference"
      description_zh: 使用带 MSA 的输入跳过数据库搜索并执行结构预测。
    - name: run_mmseqs_pipeline
      cwd: .
      command: "bash run_data_pipeline_mmseqs.sh inputs/t1119_search.json outputs/mmseqs_pipeline"
      description_zh: 使用 MMseqs 数据库执行数据管线，默认不进行模型推理。
    - name: run_jackhmmer_pipeline
      cwd: .
      command: "bash run_data_pipeline_jackhmmer.sh inputs/t1119_search.json outputs/jackhmmer_pipeline"
      description_zh: 使用 Jackhmmer 分片数据库执行数据管线，默认不进行模型推理。
  train: []
  finetune: []
  evaluate: []
  visualize: []
  deploy: []

expected_outputs:
  - id: preflight_ok_stdout
    path: stdout
    description_zh: "输出 model_preflight_ok: true。"
  - id: prediction_output_dir
    path: outputs/msa_inference/
    description_zh: AlphaFold3 结构预测输出目录，包含每个 fold job 的结果文件。
  - id: ranking_scores_csv
    path: outputs/msa_inference/*/*_ranking_scores.csv
    description_zh: 推理样本 ranking scores 表。
  - id: processed_fold_input_json
    path: outputs/*/*/*_data.json
    description_zh: 数据管线处理后的 AlphaFold3 JSON 输入。

diagnostics:
  - symptom: manifest_yaml_parse_error
    cause_zh: manifest.yaml 格式错误或缩进错误。
    action_zh: 先运行 python -c 解析 YAML，修复后再让大模型继续自动运行。
  - symptom: model_id_mismatch
    cause_zh: README、manifest 或下载命令中的模型 ID 与 OneScience/AlphaFold3/ 不一致。
    action_zh: 统一改为 OneScience/AlphaFold3/，包括尾部斜杠。
  - symptom: missing_af3_bin
    cause_zh: 模型仓库未下载完整，或 cwd 不是模型包根目录。
    action_zh: 重新执行 modelscope download --model OneScience/AlphaFold3/，并切换到下载后的模型包根目录。
  - symptom: missing_dataset_database
    cause_zh: 数据集未下载到 data/alphafold3_dataset，或链接指向错误。
    action_zh: 执行 modelscope download --dataset OneScience/AlphaFold3_dataset，并把数据目录放到 data/alphafold3_dataset。
  - symptom: jax_gpu_not_found
    cause_zh: 当前环境没有可用 GPU 或 JAX 后端未正确安装。
    action_zh: 先运行预检；推理需切换到具备 GPU 的 OneScience bio 环境。
  - symptom: mmseqs_not_found
    cause_zh: PATH 未包含 checkpoints/AlphaFold3/mmseqs/bin。
    action_zh: 使用 run_data_pipeline_mmseqs.sh 包装脚本，或手动导出 PATH 和 LD_LIBRARY_PATH。

domain_extension:
  bio:
    molecule_types: [protein, rna, dna, ligand]
    structure_prediction: true
    msa_search: [mmseqs, jackhmmer]
    template_search: true
    default_template_cutoff: "2021-09-30"
