# conf/deepcfd.yaml - DeepCFD standardized runtime configuration

root:
  datapipe:
    verbose: False
    source:
      data_dir: "${ONESCIENCE_DEEPCFD_DATA_DIR}"
      data_x_name: "dataX.pkl"
      data_y_name: "dataY.pkl"

    data:
      split_ratio: 0.7
      seed: 0

    dataloader:
      batch_size: 32
      num_workers: 4

  model:
    name: "UNetEx"
    in_channels: 3
    out_channels: 3
    base_channels: 8
    num_stages: 3
    kernel_size: 5
    bilinear: true
    normtype: "none"

  training:
    output_dir: "./result/deepcfd"

    num_epochs: 1000
    lr: 0.001
    weight_decay: 0.005
    patience: 300

    log_interval: 10
    eval_interval: 10
    save_interval: 50
