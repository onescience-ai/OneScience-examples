onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: "OneScience/FuXi/"
  name: FuXi
  display_name_zh: FuXi 伏羲全球天气预报模型
  domain: earth
  domain_tags:
    - weather_forecast
    - era5
    - global_forecasting
    - cascade_forecasting
  task: weather_forecasting
  task_tags:
    - train
    - inference
    - evaluate
    - visualize
  modalities:
    - gridded_weather
  input_formats:
    - hdf5
  output_formats:
    - npy
    - png
    - pth
  summary_zh: FuXi 是三阶段级联全球天气预报模型，依赖 OneScience/ERA5 数据集完成 short、medium、long 阶段训练、推理和评测。

platform_resource:
  primary:
    platform: modelscope
    repo_id: "OneScience/FuXi/"
    repo_type: model
    url: "https://modelscope.cn/models/OneScience/FuXi/"
    revision: master
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  aliases:
    - manifest_path: manifest.yaml
      description_zh: 与 onescience_run_manifest.yaml 内容一致的兼容副本，便于按标准默认路径发现。

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: "https://modelscope.cn/models/OneScience/FuXi/"
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    resolve_related_models: false
    selected_resource_id: "OneScience/FuXi/"
    selected_resource_type: model
    default_run_goal: minimal_validation
    default_manifest_path: onescience_run_manifest.yaml
    fallback_manifest_paths:
      - manifest.yaml
    run_instruction_zh: 先读取 README.md，再解析 onescience_run_manifest.yaml；默认只执行模型配置预检，真实训练、推理和评测前必须准备 OneScience/ERA5。

runtime:
  enabled: true
  onescience_domain: earth
  min_onescience_version: null
  supported_execution:
    - local_single_gpu
    - local_multi_gpu
    - slurm_dcu
  default_execution: local_single_gpu
  requires_gpu: true
  requires_distributed: false
  notes_zh:
    - 训练脚本使用 Apex FusedAdam，环境中需提供兼容 Apex。
    - 推理脚本默认使用 cuda:0。
    - medium 和 long 阶段依赖前一阶段 checkpoint 与推理输出。

environment:
  install_mode: onescience_domain
  python: "3.11"
  hardware:
    cpu: preflight_only
    gpu: supported
    dcu: supported
  extra_dependencies:
    - torch
    - onescience
    - h5py
    - numpy
    - xarray
    - matplotlib
    - tqdm
    - pyyaml
    - apex

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  install:
    domain: earth
    command: bash install.sh earth
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  source_paths: []
  compatibility:
    examples_path: null
    status: standard_first
    notes_zh: 当前仓库作为 OneScience 标准运行包直接运行，不要求复制到 OneScience examples 目录。

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: data/checkpoints
    data_dir: data
    output_dir: result
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/config.yaml
    - scripts/preflight_model.py
    - train_short.py
    - train_medium.py
    - train_long.py
    - inference.py
    - result.py
  entrypoints:
    preflight: scripts/preflight_model.py
    inference: inference.py
    train: train_short.py
    finetune: null
    evaluate: result.py
    visualize: result.py
    deploy: null

configuration_adaptation:
  status: adapted_for_minimal_model_validation
  source_config: fuxi/conf/config.yaml
  adapted_config: conf/config.yaml
  reason_zh: 原始配置面向完整训练流程；本次模型标准包不整理真实数据，默认配置调整为可快速预检和 smoke test 的最小设置，并保持数据目录为模型包内 ./data/。
  changes:
    - file: conf/config.yaml
      yaml_path: model.max_epoch
      original_value: 100
      current_value: 1
      reason_zh: 降低默认训练成本，便于下载模型包后执行最小训练验证。
    - file: conf/config.yaml
      yaml_path: model.finetune_step
      original_value: 100
      current_value: 1
      reason_zh: FuXi README 明确快速验证时需将 finetune_step 设为 1。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.train_time
      original_value: [1951, 1952]
      current_value: [1951]
      reason_zh: 最小训练验证只需要一个训练年份；真实训练可按 OneScience/ERA5 可用年份扩展。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.val_time
      original_value: [1953]
      current_value: [1952]
      reason_zh: 与最小年份集合对齐，减少本地 smoke test 需要的数据文件数量。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.test_time
      original_value: [1954]
      current_value: [1953]
      reason_zh: 与最小年份集合对齐，减少推理和评测验证需要的数据文件数量。
    - file: conf/config.yaml
      yaml_path: datapipe.distributed.enabled
      original_value: true
      current_value: false
      reason_zh: 默认运行采用单进程，避免大模型自动运行时误触发分布式环境要求。
    - file: conf/config.yaml
      yaml_path: datapipe.distributed.world_size
      original_value: 4
      current_value: 1
      reason_zh: 与默认单进程预检和训练命令一致。

files:
  model_files:
    - id: train_short_script
      path: train_short.py
      role: script
      description_zh: FuXi short 阶段训练入口，从 ERA5 数据训练起始阶段 checkpoint。
      required: true
      required_for: [train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: train_short.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/train_short.py
      large_file: false
    - id: train_medium_script
      path: train_medium.py
      role: script
      description_zh: FuXi medium 阶段训练入口，依赖 short checkpoint 与 short 推理输出。
      required: true
      required_for: [train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: train_medium.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/train_medium.py
      large_file: false
    - id: train_long_script
      path: train_long.py
      role: script
      description_zh: FuXi long 阶段训练入口，依赖 medium checkpoint 与 medium 推理输出。
      required: true
      required_for: [train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: train_long.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/train_long.py
      large_file: false
    - id: inference_script
      path: inference.py
      role: script
      description_zh: FuXi 推理入口，按 short、medium、long 参数加载对应 checkpoint 并输出 result/<stage>/data/*.npy。
      required: true
      required_for: [inference]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: inference.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/inference.py
      large_file: false
    - id: data_loader_script
      path: data_loader.py
      role: script
      description_zh: medium 和 long 阶段读取前一阶段 npy 输出与 ERA5 标签的 DataLoader。
      required: true
      required_for: [train, inference]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: data_loader.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/data_loader.py
      large_file: false
    - id: result_script
      path: result.py
      role: script
      description_zh: 评测与可视化入口，计算 RMSE/ACC 并绘制预测、真值和误差图。
      required: true
      required_for: [evaluate, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: result.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/result.py
      large_file: false
    - id: fake_data_script
      path: fake_data.py
      role: example_input
      description_zh: 生成本地虚拟 HDF5 和阶段输出的辅助脚本，仅用于模型流程 smoke test。
      required: false
      required_for: [minimal_validation, train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: fake_data.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/fake_data.py
      large_file: false
    - id: slurm_script
      path: work_slurm.sh
      role: script
      description_zh: Slurm/DCU 集群训练提交脚本，需要按实际集群环境修改。
      required: false
      required_for: [train]
      format: shell
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: work_slurm.sh
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/work_slurm.sh
      large_file: false
    - id: preflight_script
      path: scripts/preflight_model.py
      role: preflight
      description_zh: 检查配置、数据路径、年份、变量、HDF5 schema 和归一化统计量。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: scripts/preflight_model.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/scripts/preflight_model.py
      large_file: false
    - id: package_validation_script
      path: scripts/validate_standard_package.py
      role: validation
      description_zh: 上传前校验 README、Manifest、ID、relations 和 command_refs。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: scripts/validate_standard_package.py
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/scripts/validate_standard_package.py
      large_file: false
  dataset_files:
    - id: era5_hdf5_years
      path: data/data/*.h5
      role: train_data
      description_zh: OneScience/ERA5 提供的年度 HDF5 文件，包含 fields、global_means、global_stds 和 variables/time_step 属性。
      required: true
      required_for: [train, inference, evaluate]
      format: hdf5
      source:
        platform: modelscope
        repo_id: "OneScience/ERA5"
        repo_type: dataset
        path: data/*.h5
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_era5_dataset
      local_path: session_workdir/data/data/*.h5
      large_file: true
      skipped_in_this_standardization: true
      notes_zh: 按用户要求不整理真实数据文件，仅声明数据集 ID 与期望放置位置。
  config_files:
    - id: model_config
      path: conf/config.yaml
      role: config
      description_zh: FuXi 模型、数据路径、年份、变量、分布式和 checkpoint 配置。
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      format: yaml
      source:
        platform: modelscope
        repo_id: "OneScience/FuXi/"
        repo_type: model
        path: conf/config.yaml
        revision: master
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/conf/config.yaml
      large_file: false
  sample_files: []

relations:
  required_datasets:
    - id: "OneScience/ERA5"
      role: train_data
      required_for: [train, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: "OneScience/ERA5"
        repo_type: dataset
        url: "https://modelscope.cn/datasets/OneScience/ERA5"
        revision: master
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: data/
      notes_zh: 本次只整理模型仓库；数据集使用 OneScience/ERA5，不复制、不重打包 ERA5 数据文件。
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_config_preflight
      display_name_zh: 最小模型配置预检
      default: true
      capability: preflight
      required_datasets: []
      required_model_files:
        - conf/config.yaml
        - scripts/preflight_model.py
      required_dataset_files: []
      command_refs:
        - commands.preflight.check_model_config
      expected_outputs:
        - preflight_config_ok
      preconditions:
        - 已下载模型标准包并切换到包根目录。
    - name: era5_data_preflight
      display_name_zh: ERA5 数据结构预检
      default: false
      capability: preflight
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - scripts/preflight_model.py
      required_dataset_files:
        - data/data/*.h5
      command_refs:
        - commands.download.download_era5_dataset
        - commands.preflight.check_model_and_data
      expected_outputs:
        - preflight_data_ok
      preconditions:
        - OneScience/ERA5 已下载或挂载到 conf/config.yaml 中 datapipe.dataset.data_dir 指向的目录。
    - name: train_short
      display_name_zh: 训练 short 阶段
      default: false
      capability: train
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - train_short.py
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
      command_refs:
        - commands.preflight.check_model_and_data
        - commands.train.train_short_single_gpu
      expected_outputs:
        - checkpoint_short
        - train_short_loss
        - valid_short_loss
      preconditions:
        - OneScience earth 环境已激活。
        - GPU 或 DCU 训练环境可用。
    - name: infer_short
      display_name_zh: short 阶段推理并生成 medium 输入
      default: false
      capability: inference
      required_datasets:
        - id: "OneScience/ERA5"
          role: inference_input
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - inference.py
        - data/checkpoints/model_short_bak.pth
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
        - data/data/1953.h5
      command_refs:
        - commands.preflight.check_model_and_data
        - commands.inference.infer_short
      expected_outputs:
        - short_inference_outputs
      preconditions:
        - short checkpoint 已由训练生成或由用户放置。
    - name: train_medium
      display_name_zh: 训练 medium 阶段
      default: false
      capability: train
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - train_medium.py
        - data_loader.py
        - data/checkpoints/model_short_bak.pth
        - result/short/data/
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
      command_refs:
        - commands.train.train_medium_single_gpu
      expected_outputs:
        - checkpoint_medium
        - train_medium_loss
        - valid_medium_loss
      preconditions:
        - 已完成 train_short 和 infer_short。
    - name: infer_medium
      display_name_zh: medium 阶段推理并生成 long 输入
      default: false
      capability: inference
      required_datasets:
        - id: "OneScience/ERA5"
          role: inference_input
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - inference.py
        - data_loader.py
        - data/checkpoints/model_medium_bak.pth
        - result/short/data/
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
        - data/data/1953.h5
      command_refs:
        - commands.inference.infer_medium
      expected_outputs:
        - medium_inference_outputs
      preconditions:
        - 已完成 train_medium。
    - name: train_long
      display_name_zh: 训练 long 阶段
      default: false
      capability: train
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - train_long.py
        - data_loader.py
        - data/checkpoints/model_medium_bak.pth
        - result/medium/data/
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
      command_refs:
        - commands.train.train_long_single_gpu
      expected_outputs:
        - checkpoint_long
        - train_long_loss
        - valid_long_loss
      preconditions:
        - 已完成 train_medium 和 infer_medium。
    - name: infer_long
      display_name_zh: long 阶段推理
      default: false
      capability: inference
      required_datasets:
        - id: "OneScience/ERA5"
          role: inference_input
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - inference.py
        - data_loader.py
        - data/checkpoints/model_long_bak.pth
        - result/medium/data/
      required_dataset_files:
        - data/data/1953.h5
      command_refs:
        - commands.inference.infer_long
      expected_outputs:
        - long_inference_outputs
      preconditions:
        - 已完成 train_long。
    - name: evaluate_and_visualize
      display_name_zh: 评测与可视化
      default: false
      capability: evaluate
      required_datasets:
        - id: "OneScience/ERA5"
          role: eval_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - result.py
        - data/checkpoints/tr_long_loss.npy
        - data/checkpoints/va_long_loss.npy
        - result/long/data/
      required_dataset_files:
        - data/data/1953.h5
      command_refs:
        - commands.evaluate.evaluate_long
      expected_outputs:
        - long_rmse_metrics
        - long_acc_metrics
        - visualization_png
      preconditions:
        - 已完成 infer_long。

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载 FuXi 模型标准运行包。
      target: model
      repo_id: "OneScience/FuXi/"
      source: .
      local_path: ./earth_fuxi
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      cwd: .
      command: "modelscope download --model OneScience/FuXi/ --local_dir ./earth_fuxi"
      expected_outputs:
        - path: ./earth_fuxi/onescience_run_manifest.yaml
          type: file
        - path: ./earth_fuxi/conf/config.yaml
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: download_era5_dataset
      description: 下载模型运行所需 ERA5 数据集到模型包 data 目录。
      target: dataset
      repo_id: "OneScience/ERA5"
      source: .
      local_path: ./data
      required: true
      required_for: [train, inference, evaluate]
      cwd: .
      command: "modelscope download --dataset OneScience/ERA5 --local_dir ./data"
      expected_outputs:
        - path: ./data
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  preflight:
    - name: check_environment
      description: 检查基础 Python 与 OneScience 依赖是否可导入。
      cwd: .
      command: "python -c \"import torch, h5py, yaml; import onescience; print('environment ok')\""
      required_files: []
      required_env:
        - python
        - onescience
      expected_outputs:
        - path: stdout
          type: text
          contains: environment ok
      success_criteria:
        - exit_code == 0
    - name: check_model_config
      description: 不读取数据，只检查模型配置、年份、变量、路径和 checkpoint 设置。
      cwd: .
      command: "python scripts/preflight_model.py --config conf/config.yaml"
      required_files:
        - conf/config.yaml
        - scripts/preflight_model.py
      required_env:
        - python
        - pyyaml
        - h5py
      expected_outputs:
        - path: stdout
          type: text
          contains: "[OK] 配置可解析"
      success_criteria:
        - exit_code == 0
    - name: check_model_and_data
      description: 检查模型配置以及 ERA5 HDF5 文件结构、变量和归一化统计量。
      cwd: .
      command: "python scripts/preflight_model.py --config conf/config.yaml --check-data"
      required_files:
        - conf/config.yaml
        - scripts/preflight_model.py
        - data/data/*.h5
      required_env:
        - python
        - pyyaml
        - h5py
      expected_outputs:
        - path: stdout
          type: text
          contains: "[OK] HDF5 数据结构可读"
      success_criteria:
        - exit_code == 0
  prepare:
    - name: generate_fake_data_for_smoke_test
      description: 可选，生成虚拟 HDF5 和阶段输出用于模型流程 smoke test；不属于数据集整理结果。
      cwd: .
      command: "python fake_data.py"
      required_files:
        - fake_data.py
        - conf/config.yaml
      required_env:
        - python
        - h5py
        - xarray
        - onescience
      expected_outputs:
        - path: data/data/1951.h5
          type: file
        - path: result/short/data/1951/
          type: directory
        - path: result/medium/data/1951/
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  train:
    - name: train_short_single_gpu
      description: 单卡训练 FuXi short 阶段，默认 max_epoch=1、finetune_step=1。
      cwd: .
      command: "python train_short.py"
      required_files:
        - train_short.py
        - conf/config.yaml
        - data/data/1951.h5
        - data/data/1952.h5
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_short_bak.pth
          type: file
        - path: data/checkpoints/tr_short_loss.npy
          type: file
        - path: data/checkpoints/va_short_loss.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_medium_single_gpu
      description: 单卡训练 FuXi medium 阶段，需要 short checkpoint 和 short 推理输出。
      cwd: .
      command: "python train_medium.py"
      required_files:
        - train_medium.py
        - data_loader.py
        - conf/config.yaml
        - data/checkpoints/model_short_bak.pth
        - result/short/data/
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_medium_bak.pth
          type: file
        - path: data/checkpoints/tr_medium_loss.npy
          type: file
        - path: data/checkpoints/va_medium_loss.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_long_single_gpu
      description: 单卡训练 FuXi long 阶段，需要 medium checkpoint 和 medium 推理输出。
      cwd: .
      command: "python train_long.py"
      required_files:
        - train_long.py
        - data_loader.py
        - conf/config.yaml
        - data/checkpoints/model_medium_bak.pth
        - result/medium/data/
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_long_bak.pth
          type: file
        - path: data/checkpoints/tr_long_loss.npy
          type: file
        - path: data/checkpoints/va_long_loss.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_slurm
      description: Slurm/DCU 分布式训练，需要先按集群环境修改 work_slurm.sh。
      cwd: .
      command: "sbatch work_slurm.sh"
      required_files:
        - work_slurm.sh
        - train_short.py
        - conf/config.yaml
      required_env:
        - slurm
        - onescience
      expected_outputs:
        - path: logs/
          type: directory
      success_criteria:
        - exit_code == 0
  inference:
    - name: infer_short
      description: 使用 short checkpoint 对训练、验证和测试年份推理，生成 medium 阶段输入。
      cwd: .
      command: "python inference.py short"
      required_files:
        - inference.py
        - conf/config.yaml
        - data/checkpoints/model_short_bak.pth
        - data/data/1951.h5
        - data/data/1952.h5
        - data/data/1953.h5
      required_env:
        - python
        - onescience
        - torch
        - h5py
      expected_outputs:
        - path: result/short/data/
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: infer_medium
      description: 使用 medium checkpoint 推理，生成 long 阶段输入。
      cwd: .
      command: "python inference.py medium"
      required_files:
        - inference.py
        - data_loader.py
        - conf/config.yaml
        - data/checkpoints/model_medium_bak.pth
        - result/short/data/
      required_env:
        - python
        - onescience
        - torch
        - h5py
      expected_outputs:
        - path: result/medium/data/
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: infer_long
      description: 使用 long checkpoint 生成最终预报结果。
      cwd: .
      command: "python inference.py long"
      required_files:
        - inference.py
        - data_loader.py
        - conf/config.yaml
        - data/checkpoints/model_long_bak.pth
        - result/medium/data/
      required_env:
        - python
        - onescience
        - torch
        - h5py
      expected_outputs:
        - path: result/long/data/
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  evaluate:
    - name: evaluate_short
      description: 计算 short 阶段 RMSE/ACC 并绘制结果图。
      cwd: .
      command: "python result.py short"
      required_files:
        - result.py
        - conf/config.yaml
        - result/short/data/
      required_env:
        - python
        - numpy
        - h5py
        - matplotlib
      expected_outputs:
        - path: result/short_rmse.npy
          type: file
        - path: result/short_acc.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: evaluate_medium
      description: 计算 medium 阶段 RMSE/ACC 并绘制结果图。
      cwd: .
      command: "python result.py medium"
      required_files:
        - result.py
        - conf/config.yaml
        - result/medium/data/
      required_env:
        - python
        - numpy
        - h5py
        - matplotlib
      expected_outputs:
        - path: result/medium_rmse.npy
          type: file
        - path: result/medium_acc.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: evaluate_long
      description: 计算 long 阶段 RMSE/ACC 并绘制结果图。
      cwd: .
      command: "python result.py long"
      required_files:
        - result.py
        - conf/config.yaml
        - result/long/data/
      required_env:
        - python
        - numpy
        - h5py
        - matplotlib
      expected_outputs:
        - path: result/long_rmse.npy
          type: file
        - path: result/long_acc.npy
          type: file
        - path: result/loss.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  visualize:
    - name: visualize_long
      description: result.py 在评测后同时生成可视化 PNG。
      cwd: .
      command: "python result.py long"
      required_files:
        - result.py
        - conf/config.yaml
        - result/long/data/
      required_env:
        - python
        - matplotlib
      expected_outputs:
        - path: result/loss.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  finetune: []
  deploy: []

