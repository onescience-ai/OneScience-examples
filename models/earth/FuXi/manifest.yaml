diagnostics:
  - error_pattern: "ModuleNotFoundError"
    likely_cause: OneScience earth 环境或 Python 依赖未安装。
    action: 执行 bash install.sh earth，或切换到网站提供的 OneScience 环境。
  - error_pattern: "No module named 'apex'"
    likely_cause: 训练依赖 Apex 不存在。
    action: 安装与 PyTorch/硬件匹配的 Apex，或使用已配置 Apex 的 OneScience earth 环境。
  - error_pattern: "未找到数据文件"
    likely_cause: OneScience/ERA5 未下载到 conf/config.yaml 指定目录。
    action: 执行 modelscope download --dataset OneScience/ERA5 --local_dir ./data，或修改 datapipe.dataset.data_dir 指向实际挂载目录。
  - error_pattern: "Variables not found"
    likely_cause: ERA5 HDF5 variables 与 conf/config.yaml 中 channels 不匹配。
    action: 使用适配 FuXi 的 OneScience/ERA5 数据，或同步修改配置和 configuration_adaptation。
  - error_pattern: "No npy files found"
    likely_cause: medium 或 long 阶段缺少前一阶段推理输出。
    action: 按 short -> infer short -> medium -> infer medium -> long 的顺序执行。
  - error_pattern: "model_short_bak.pth"
    likely_cause: medium 阶段训练或 short 推理前缺少 short checkpoint。
    action: 先执行 python train_short.py，或把兼容 checkpoint 放到 data/checkpoints/model_short_bak.pth。
  - error_pattern: "model_medium_bak.pth"
    likely_cause: long 阶段训练或 medium 推理前缺少 medium checkpoint。
    action: 先执行 python train_medium.py，或把兼容 checkpoint 放到 data/checkpoints/model_medium_bak.pth。
  - error_pattern: "model_long_bak.pth"
    likely_cause: long 推理前缺少 long checkpoint。
    action: 先执行 python train_long.py，或把兼容 checkpoint 放到 data/checkpoints/model_long_bak.pth。
  - error_pattern: "CUDA out of memory"
    likely_cause: 显存不足或 batch size 过大。
    action: 降低 datapipe.dataloader.batch_size，或切换到更大显存设备。
  - error_pattern: "modelscope: command not found"
    likely_cause: ModelScope CLI 未安装。
    action: 安装 ModelScope CLI，或通过网页下载模型和数据后保持 Manifest 声明的目录结构。

reproducibility:
  level: minimal
  goal: 完成一次模型配置预检；如需要端到端 smoke test，可先运行 fake_data.py 再按三阶段顺序训练和推理。
  command_ref: commands.preflight.check_model_config
  expected_runtime: less_than_1_minute
  expected_outputs:
    - preflight_config_ok

large_resource:
  enabled: true
  scope: related_dataset
  dataset_id: "OneScience/ERA5"
  download_policy: on_demand
  default_download: none_for_model_preflight
  minimal_files:
    - data/data/1951.h5
    - data/data/1952.h5
    - data/data/1953.h5
  full_download:
    command_ref: commands.download.download_era5_dataset
  notes_zh: 本模型仓库不上传 ERA5 数据；大文件策略由 OneScience/ERA5 数据集仓库承担。

domain_extension:
  earth:
    variables:
      - 10m_u_component_of_wind
      - 10m_v_component_of_wind
      - 2m_temperature
      - mean_sea_level_pressure
      - total_precipitation
      - geopotential_500
      - relative_humidity_500
      - u_component_of_wind_500
      - v_component_of_wind_500
      - temperature_500
      - temperature_850
      - u_component_of_wind_850
      - v_component_of_wind_850
      - geopotential_850
      - relative_humidity_850
    grid:
      type: lat_lon
      img_size: [2, 721, 1440]
      spatial_resolution: [0.25, 0.25]
      lat_range: [-90, 90]
      lon_range: [0, 360]
    forecast_system:
      stages:
        - short
        - medium
        - long
      total_forecast_days: 15
    normalization_files:
      - data/data/<year>.h5:global_means
      - data/data/<year>.h5:global_stds
    metrics:
      - RMSE
      - ACC
