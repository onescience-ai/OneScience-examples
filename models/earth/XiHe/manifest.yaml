onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/XiHe
  name: XiHe
  domain: earth
  domain_tags: [earth, ocean, cmems, forecasting]
  task: ocean_forecasting
  task_tags: [ocean_forecast, spatiotemporal_forecast, transformer]
  modalities: [gridded_field]
  input_formats: [hdf5]
  output_formats: [npy, png]
  summary: XiHe 是面向高分辨率全球海洋预报的 OneScience 标准运行包。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/XiHe
    repo_type: model
    url: https://modelscope.cn/models/OneScience/XiHe
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: Apache-2.0

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/XiHe
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: earth
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh earth
  source_paths: []
  compatibility:
    examples_path: null
    status: standard_first

environment:
  install_mode: onescience_domain
  python: "3.11"
  hardware:
    cpu: preflight_only
    gpu: supported
    dcu: supported
  extra_dependencies: [h5py, numpy, pyyaml, torch, matplotlib, tqdm]

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: data/checkpoints
    data_dir: data
    output_dir: result
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/config.yaml
    - scripts/prepare_runtime_data.py
    - scripts/preflight.py
    - train.py
    - inference.py
    - result.py
  entrypoints:
    preflight: scripts/preflight.py
    inference: inference.py
    train: train.py
    finetune: null
    evaluate: result.py
    visualize: result.py
    deploy: null

configuration_adaptation:
  source_config: xihe/conf/config.yaml
  adapted_config: conf/config.yaml
  reason: 原始配置面向 2010、2013、2014 年数据，当前待上传 CMEMS 数据只包含 1993-1999 年 7 个 HDF5 文件。
  changes:
    - yaml_path: datapipe.dataset.train_time
      original_value: [2010]
      current_value: [1993, 1994, 1995, 1996, 1997]
      reason: 将训练年份改为当前数据集中存在的年份。
    - yaml_path: datapipe.dataset.val_time
      original_value: [2013]
      current_value: [1998]
      reason: 将验证年份改为当前数据集中存在的年份。
    - yaml_path: datapipe.dataset.test_time
      original_value: [2014]
      current_value: [1999]
      reason: 将测试年份改为当前数据集中存在的年份。
    - yaml_path: datapipe.dataset.time_range
      original_value: ["2010-01-01", "2014-12-31"]
      current_value: ["1993-01-01", "1999-12-31"]
      reason: 与当前数据覆盖时间保持一致。
    - yaml_path: model.mask
      original_value: ./data/land_mask.npy
      current_value: ./data/land_mask.npy
      reason: 路径不变；标准包通过 scripts/prepare_runtime_data.py 在运行目录生成该文件。
    - yaml_path: datapipe.dataset.stats_dir
      original_value: ./data/stats/
      current_value: ./data/stats/
      reason: 路径不变；标准包从 CMEMS HDF5 内置 global_means/global_stds 提取为 .npy 文件。

files:
  model_files:
    - id: xihe_runtime_code
      path: .
      role: runtime_package
      description_zh: XiHe 训练、推理、评测和预检脚本组成的标准运行包。
      required: true
      required_for: [preflight, prepare, train, inference, evaluate, visualize]
      format: python
      source:
        platform: modelscope
        repo_id: OneScience/XiHe
        repo_type: model
        path: .
        revision: main
        url: https://modelscope.cn/models/OneScience/XiHe
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: XiHe/
      size: null
      checksum: null
      large_file: false
  dataset_files:
    - id: cmems_hdf5_years
      path: data/*.h5
      role: train_data
      description_zh: CMEMS 1993-1999 年 HDF5 数据，运行前由准备脚本放入 XiHe 的 ./data/data/。
      required: true
      required_for: [preflight, train, inference, evaluate]
      format: hdf5
      source:
        platform: modelscope
        repo_id: OneScience/CMEMS
        repo_type: dataset
        path: data/*.h5
        revision: main
        url: https://modelscope.cn/datasets/OneScience/CMEMS
        download_method: command_ref
        command_ref: commands.download.download_required_dataset
      mirrors: []
      local_path: data/data/*.h5
      size: 71.1GB
      checksum: metadata/file_checksums.sha256
      large_file: true
  config_files:
    - id: xihe_config
      path: conf/config.yaml
      role: config
      description_zh: 已按当前 CMEMS 数据年份改写的 XiHe 配置文件。
      required: true
      required_for: [preflight, prepare, train, inference, evaluate, visualize]
      format: yaml
      source:
        platform: modelscope
        repo_id: OneScience/XiHe
        repo_type: model
        path: conf/config.yaml
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      mirrors: []
      local_path: conf/config.yaml
      size: null
      checksum: null
      large_file: false
  sample_files: []

relations:
  required_datasets:
    - id: OneScience/CMEMS
      role: train_data
      required_for: [preflight, train, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/CMEMS
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/CMEMS
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      local_path: data/data
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_validation
      capability: preflight
      default: true
      description_zh: 下载模型和数据集后，整理数据布局并验证配置、年份、变量、shape、统计量和掩码。
      required_datasets:
        - id: OneScience/CMEMS
          role: train_data
          local_path: data/data
      required_model_files: [conf/config.yaml, scripts/prepare_runtime_data.py, scripts/preflight.py]
      required_data_files: [data/1993.h5, data/1994.h5, data/1995.h5, data/1996.h5, data/1997.h5, data/1998.h5, data/1999.h5]
      preconditions:
        - 已下载 OneScience/XiHe 到 ./XiHe，并将 cwd 切换到 ./XiHe。
        - 已下载 OneScience/CMEMS 到与 XiHe 同级的 ./CMEMS。
      command_refs:
        - commands.prepare.prepare_runtime_data
        - commands.preflight.xihe_preflight
      outputs:
        - data/data/*.h5
        - data/stats/global_means.npy
        - data/stats/global_stds.npy
        - data/land_mask.npy
    - name: train_from_scratch
      capability: train
      description_zh: 使用 1993-1997 年训练数据和 1998 年验证数据训练 XiHe，并输出 checkpoint。
      required_datasets:
        - id: OneScience/CMEMS
          role: train_data
          local_path: data/data
      required_model_files: [conf/config.yaml, train.py]
      required_data_files: [data/data/1993.h5, data/data/1994.h5, data/data/1995.h5, data/data/1996.h5, data/data/1997.h5, data/data/1998.h5]
      preconditions:
        - commands.prepare.prepare_runtime_data 已成功执行。
        - OneScience earth 环境和 GPU/DCU 运行环境可用。
      command_refs:
        - commands.train.train_single_process
      outputs:
        - data/checkpoints/model_bak.pth
        - data/checkpoints/trloss.npy
        - data/checkpoints/valoss.npy
    - name: inference_after_training
      capability: inference
      description_zh: 使用训练产生的 checkpoint 对 1999 年测试数据推理。
      required_datasets:
        - id: OneScience/CMEMS
          role: inference_input
          local_path: data/data
      required_model_files: [conf/config.yaml, inference.py, data/checkpoints/model_bak.pth]
      required_data_files: [data/data/1999.h5, data/stats/global_means.npy, data/stats/global_stds.npy]
      preconditions:
        - 已存在 data/checkpoints/model_bak.pth。
      command_refs:
        - commands.inference.run_inference
      outputs:
        - result/output/*.npy
    - name: evaluate_and_visualize
      capability: evaluate
      description_zh: 对推理输出计算 RMSE/ACC，并生成结果图和训练 loss 图。
      required_datasets:
        - id: OneScience/CMEMS
          role: eval_data
          local_path: data/data
      required_model_files: [conf/config.yaml, result.py]
      required_data_files: [data/data/1999.h5, result/output/*.npy]
      preconditions:
        - commands.inference.run_inference 已成功执行。
      command_refs:
        - commands.evaluate.run_result
      outputs:
        - result/rmse.npy
        - result/acc.npy
        - result/loss.png
        - result/*.png

capabilities:
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载 XiHe 模型标准运行包。
      target: model
      repo_id: OneScience/XiHe
      source: .
      local_path: ./XiHe
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      command: modelscope download --model OneScience/XiHe --local_dir ./XiHe
    - name: download_required_dataset
      description: 下载适配 XiHe 的 CMEMS 数据集。
      target: dataset
      repo_id: OneScience/CMEMS
      source: .
      local_path: ./CMEMS
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      command: modelscope download --dataset OneScience/CMEMS --local_dir ./CMEMS
  prepare:
    - name: prepare_runtime_data
      description: 将同级 CMEMS 数据集整理到 XiHe 运行目录，并提取统计量、生成掩码。
      cwd: .
      command: python scripts/prepare_runtime_data.py --dataset-root ../CMEMS --runtime-data-dir ./data
      required_files: [../CMEMS/data/1993.h5, ../CMEMS/data/1999.h5, conf/config.yaml]
      required_env: [python, h5py, numpy]
      expected_outputs:
        - path: data/data/1993.h5
          type: file
        - path: data/stats/global_means.npy
          type: file
        - path: data/land_mask.npy
          type: file
      success_criteria: [exit_code == 0, output_path_exists]
  preflight:
    - name: xihe_preflight
      description: 检查 XiHe 配置与 CMEMS 数据是否匹配。
      cwd: .
      command: python scripts/preflight.py --config conf/config.yaml
      required_files: [conf/config.yaml, data/data/1993.h5, data/stats/global_means.npy, data/land_mask.npy]
      required_env: [python, h5py, numpy, pyyaml]
      expected_outputs: []
      success_criteria: [exit_code == 0]
  train:
    - name: train_single_process
      description: 单进程训练 XiHe。
      cwd: .
      command: python train.py
      required_files: [conf/config.yaml, data/data/1993.h5, data/data/1998.h5]
      required_env: [onescience, torch]
      expected_outputs:
        - path: data/checkpoints/model_bak.pth
          type: file
        - path: data/checkpoints/trloss.npy
          type: file
        - path: data/checkpoints/valoss.npy
          type: file
      success_criteria: [exit_code == 0, output_path_exists]
    - name: train_slurm
      description: SLURM/DCU 集群训练入口。
      cwd: .
      command: sbatch work_slurm.sh
      required_files: [work_slurm.sh, conf/config.yaml]
      required_env: [slurm, onescience, torch]
      expected_outputs:
        - path: logs/
          type: directory
      success_criteria: [job_submitted]
  inference:
    - name: run_inference
      description: 使用 data/checkpoints/model_bak.pth 对测试集推理。
      cwd: .
      command: python inference.py
      required_files: [conf/config.yaml, data/checkpoints/model_bak.pth, data/data/1999.h5, data/stats/global_means.npy, data/stats/global_stds.npy]
      required_env: [onescience, torch, h5py, numpy]
      expected_outputs:
        - path: result/output/
          type: directory
      success_criteria: [exit_code == 0, output_path_exists]
  finetune: []
  evaluate:
    - name: run_result
      description: 计算 RMSE/ACC 并输出可视化图片。
      cwd: .
      command: python result.py
      required_files: [conf/config.yaml, result/output/, data/checkpoints/trloss.npy, data/checkpoints/valoss.npy]
      required_env: [onescience, h5py, numpy, matplotlib]
      expected_outputs:
        - path: result/rmse.npy
          type: file
        - path: result/acc.npy
          type: file
      success_criteria: [exit_code == 0, output_path_exists]
  visualize:
    - name: visualize_result
      description: result.py 同时生成可视化图片。
      cwd: .
      command: python result.py
      required_files: [result/output/]
      required_env: [onescience, matplotlib]
      expected_outputs:
        - path: result/loss.png
          type: file
      success_criteria: [exit_code == 0, output_path_exists]
  deploy: []

expected_outputs:
  - path: data/stats/global_means.npy
    type: file
    produced_by: commands.prepare.prepare_runtime_data
  - path: data/checkpoints/model_bak.pth
    type: file
    produced_by: commands.train.train_single_process
  - path: result/output/
    type: directory
    produced_by: commands.inference.run_inference
  - path: result/rmse.npy
    type: file
    produced_by: commands.evaluate.run_result

diagnostics:
  - name: missing_dataset
    match: "missing yearly HDF5 file"
    explanation_zh: CMEMS 数据未下载，或未执行 prepare_runtime_data.py。
    fix_zh: 先执行 modelscope download --dataset OneScience/CMEMS --local_dir ./CMEMS，再在 XiHe 目录执行准备命令。
  - name: missing_stats
    match: "missing extracted stats file"
    explanation_zh: XiHe 推理脚本需要 global_means.npy 和 global_stds.npy。
    fix_zh: 执行 python scripts/prepare_runtime_data.py --dataset-root ../CMEMS --runtime-data-dir ./data。
  - name: missing_checkpoint
    match: "model_bak.pth"
    explanation_zh: 当前模型包不包含预训练 checkpoint，推理前需要先训练或放入已有 checkpoint。
    fix_zh: 运行 python train.py 生成 data/checkpoints/model_bak.pth，或将兼容 checkpoint 放到该路径。
  - name: cuda_unavailable
    match: "cuda"
    explanation_zh: inference.py 默认使用 cuda:0。
    fix_zh: 在具备 GPU/DCU 的 OneScience earth 环境中运行，或按本地设备修改脚本。

domain_extension:
  earth:
    subdomain: ocean
    dataset_family: CMEMS
    grid:
      lat_size: 2041
      lon_size: 4320
      spatial_resolution: [0.0833333333, 0.0833333333]
    variables_count: 96
    forecast_time_step_hours: 24
