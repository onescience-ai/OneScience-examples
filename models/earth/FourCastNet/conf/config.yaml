# ERA5数据集配置示例
model:
  start_epoch: 0
  max_epoch: 1
  lr: 1E-3
  num_blocks: 8
  patch_size: [8, 8]
  patience: 50 
  checkpoint_dir: "./data/checkpoints"

 # 整个数据读取流程
datapipe:
  name: "ERA5"
  task: "weather_forecasting"

  # dataset设定
  dataset:
    type: "hdf5"
    data_dir: './data/' # "$ONESCIENCE_DATASETS_DIR/ERA5/newh5/" 
    
    train_time: [1951]
    val_time: [1952]
    test_time: [1953]
    img_size: [721, 1440]
    verbose: true
    cache: false
    # 气象变量

    channels: ['10m_u_component_of_wind', '10m_v_component_of_wind', '2m_temperature', 'surface_pressure',
               'mean_sea_level_pressure', 'total_column_water_vapour', # 6 surface
               'u_component_of_wind_1000',
               'v_component_of_wind_1000',

               'temperature_850',
               'u_component_of_wind_850',
               'v_component_of_wind_850',
               'geopotential_850',
               'relative_humidity_850',

               'temperature_500',
               'u_component_of_wind_500',
               'v_component_of_wind_500',
               'geopotential_500',
               'relative_humidity_500',
               
               'geopotential_50',
               ]

    variables:
      - "u10"        # 10m U wind component
      - "v10"        # 10m V wind component
      - "t2m"        # 2m temperature
      - "msl"        # Mean sea level pressure
      - "z500"       # Geopotential at 500 hPa
      - "t850"       # Temperature at 850 hPa
    
    # 时间配置
    time_range: ["2000-01-01", "2020-12-31"]
    time_steps: 1
    time_res: 6
    
    # 空间配置
    spatial_resolution: [0.25, 0.25]
    
    # 采样配置
    num_samples: -1  # -1 表示使用全部数据
    shuffle: true
    random_seed: 42
    
    # 领域特定配置
    extra:
      levels: [500, 850, 1000]
      lat_range: [-90, 90]
      lon_range: [0, 360]
  
  # 数据转换配置
  transforms:
    - type: "Normalize"
      params:
        mean: [0.0, 0.0, 288.0, 101325.0, 50000.0, 270.0]
        std: [5.0, 5.0, 15.0, 1000.0, 5000.0, 10.0]
        keys: ["input", "target"]
    
    - type: "ToTensor"
      params:
        keys: null  # null表示转换所有numpy数组
  
  # 其他配置


  # DataLoader配置
  dataloader:
    mask_dtype: "float32"
    batch_size: 4
    num_workers: 1
    pin_memory: true
    drop_last: true
    shuffle: false  # 使用sampler时设为false
    prefetch_factor: 2
    persistent_workers: true
  
  # 分布式配置
  distributed:
    enabled: false
    sampler: "DistributedSampler"
    rank: 0
    world_size: 1
    shuffle: true
    seed: 42
    drop_last: true
