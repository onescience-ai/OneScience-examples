onescience_manifest_version: "0.1"
resource_type: model

resource:
  id: OneScience/PINNsformer
  name: PINNsformer
  domain: cfd
  domain_tags:
    - cfd
    - pde
    - physics_informed_neural_network
    - transformer
  task: pde_solution_approximation
  task_tags:
    - train
    - inference
    - evaluation
    - visualization
  summary: 兼容入口；完整机器可读运行协议见 onescience_run_manifest.yaml。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/PINNsformer
    repo_type: model
    url: https://modelscope.cn/models/OneScience/PINNsformer
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml

website_integration:
  enabled: true
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: false

runtime:
  enabled: true
  onescience_domain: cfd

onescience:
  compatibility:
    examples_path: onescience/examples/cfd/PINNsformer
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
  entrypoints:
    preflight: scripts/preflight_pinnsformer.py
    train: 1d_reaction/1d_reaction_pinnsformer.py

files:
  model_files:
    - id: runtime_manifest
      path: onescience_run_manifest.yaml
      role: canonical_manifest
      required: true
      required_for: [preflight, train]
  dataset_files: []
  config_files: []
  sample_files: []

relations:
  required_datasets: []
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      command_refs:
        - commands.preflight.model_preflight

capabilities:
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      command: modelscope download --model OneScience/PINNsformer
  preflight:
    - name: model_preflight
      cwd: .
      command: python scripts/preflight_pinnsformer.py --repo-root .
  prepare:
    - name: prepare_data
      cwd: .
      command: bash data.sh
  train:
    - name: train_reaction_pinnsformer
      cwd: 1d_reaction
      command: python 1d_reaction_pinnsformer.py

expected_outputs:
  - id: preflight_ok
    path: stdout
    type: text
    description_zh: 结构预检成功时输出 [OK] model preflight completed。

diagnostics:
  - error_pattern: "missing required source file"
    likely_cause: 模型包下载不完整或当前目录错误。
    action: 重新下载并 cd 到模型包根目录。

domain_extension:
  cfd:
    methods:
      - PINNsformer
