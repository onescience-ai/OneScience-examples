mpnn_config:
  datapipe:
    source:
      data_dir: "YOUR_DATASET_DIR_PATH"
      file_name: "2D_CFD_Rand_M0.1_Eta0.1_Zeta0.1_periodic_128_Train.hdf5"
    verbose: True
    data:
      pde_name: "2D_Compressible_NS"
      single_file: True
      reduced_resolution: 2
      reduced_resolution_t: 1
      reduced_batch: 1
      test_ratio: 0.1
      
      # MPNN 特有的图构建参数
      time_window: 10
      neighbors: 1
      
      # PDE 元数据 (用于 GraphCreator)
      temporal_domain: [0, 1]
      resolution_t: 21
      spatial_domain: [[0, 1], [0, 1]]
      resolution: [128, 128]
      variables: 
        m: 0.1
        eta: 0.1
        zeta: 0.1

    dataloader:
      batch_size: 16
      num_workers: 2
      pin_memory: True

  model:
    name: "MPNN"
    hidden_features: 128
    hidden_layer: 6
    num_outputs: 4

  training:
    if_training: True
    continue_training: False
    model_path: null
    output_dir: "./checkpoint/"
    save_period: 20
    seed: 0
    tensorboard: False
    log_dir: "./logs/tensorboard/"
    
    # MPNN Training Params
    unrolling: 0
    unroll_step: 20
    epochs: 500
    
    optimizer:
      name: 'Adam'
      lr: 1.0e-4
      weight_decay: 1.0e-8
    
    scheduler:
      name: "StepLR"
      step_size: 100
      gamma: 0.5