onescience_manifest_version: '0.1'
resource_type: model
resource:
  id: OneScience/UMA
  name: UMA
  domain: matchem
  domain_tags:
  - matchem
  - uma
  - mlip
  - catalysis
  task: oc20_energy_force_finetuning
  task_tags:
  - oc20
  - energy_prediction
  - force_prediction
  - finetune
  modalities:
  - atomistic_structure
  input_formats:
  - yaml
  - ase_lmdb
  - extxyz
  output_formats:
  - energy
  - forces
  - checkpoint
  - logs
  summary: UMA OC20 energy+forces 微调示例的 OneScience 标准模型运行包。
platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/UMA
    repo_type: model
    url: https://modelscope.cn/models/OneScience/UMA
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: null
website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/UMA
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation
runtime:
  enabled: true
  onescience_domain: matchem
  min_onescience_version: null
  supported_execution:
  - local
  - local_slurm
  - remote_slurm
  - scnet_mcp
environment:
  install_mode: onescience_domain
  python: '3.11'
  hardware:
    cpu: preflight_only
    gpu: supported
    dcu: supported
  extra_dependencies:
  - torch
  - ase
  - pyyaml
  - hydra-core
onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh matchem
  source_paths:
  - onescience/examples/matchem/uma
  compatibility:
    examples_path: examples/matchem/uma
    status: examples_compatible
runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: upstream/demo/outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
  - scripts/preflight_uma.py
  - conf/oc20_ef_4dcu_modelscope.yaml
  - upstream/train.py
  - upstream/demo/run.sh
  - upstream/demo/_parse_config.py
  - upstream/models/pretrained_models.json
  entrypoints:
    preflight: scripts/preflight_uma.py
    inference: upstream/inference/relax_adsorbate_on_slab.py
    train: upstream/demo/run.sh
    finetune: upstream/demo/run.sh
    evaluate: scripts/preflight_uma.py
    visualize: null
    deploy: null
configuration_adaptation:
  adapted_from: onescience/examples/matchem/uma/demo/configs/oc20_ef_4dcu.yaml
  reason: 原始 UMA 配置依赖 ONESCIENCE_DATASETS_DIR 和 ONESCIENCE_MODELS_DIR；标准包需要使用 ModelScope 下载后的相对路径。
  changes:
  - file: conf/oc20_ef_4dcu_modelscope.yaml
    yaml_path: data.train_dataset.splits.train.src
    old_value: ${ONESCIENCE_DATASETS_DIR}/matchem/oc20/uma_oc20_finetune/train
    new_value: data/oc20/uma_oc20_finetune/train
    reason: 匹配 OneScience/oc20 下载到模型包根目录后的布局。
  - file: conf/oc20_ef_4dcu_modelscope.yaml
    yaml_path: data.val_dataset.splits.val.src
    old_value: ${ONESCIENCE_DATASETS_DIR}/matchem/oc20/uma_oc20_finetune/val
    new_value: data/oc20/uma_oc20_finetune/val
    reason: 匹配 OneScience/oc20 下载到模型包根目录后的布局。
  - file: conf/oc20_ef_4dcu_modelscope.yaml
    yaml_path: runner.train_eval_unit.model.checkpoint_location
    old_value: ${ONESCIENCE_MODELS_DIR}/UMA/checkpoint/uma-s-1p1_converted.pt
    new_value: checkpoints/uma-s-1p1_converted.pt
    reason: 当前本地 UMA 源目录没有 checkpoint，标准包显式声明权重放置位置。
  - file: upstream/demo/_parse_config.py
    yaml_path: null
    old_value: 根据 config_path 反推 UMA/train.py，要求配置位于 upstream/demo/configs。
    new_value: 根据 _parse_config.py 自身位置定位 upstream/train.py。
    reason: 标准包适配配置位于 conf/，继续用 config_path 会生成错误 train.py 路径。
files:
  model_files:
  - id: preflight_script
    path: scripts/preflight_uma.py
    role: script
    description_zh: UMA 标准包预检脚本。
    required: true
    required_for:
    - preflight
    format: py
    source:
      platform: modelscope
      repo_id: OneScience/UMA
      repo_type: model
      path: scripts/preflight_uma.py
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/scripts/preflight_uma.py
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  - id: adapted_config
    path: conf/oc20_ef_4dcu_modelscope.yaml
    role: config
    description_zh: ModelScope 下载布局适配后的 UMA OC20 微调配置。
    required: true
    required_for:
    - preflight
    - train
    format: yaml
    source:
      platform: modelscope
      repo_id: OneScience/UMA
      repo_type: model
      path: conf/oc20_ef_4dcu_modelscope.yaml
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/conf/oc20_ef_4dcu_modelscope.yaml
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  - id: upstream_uma_code
    path: upstream/
    role: runtime_code
    description_zh: OneScience UMA 示例训练、推理、转换脚本。
    required: true
    required_for:
    - train
    - inference
    format: directory
    source:
      platform: modelscope
      repo_id: OneScience/UMA
      repo_type: model
      path: upstream/
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/upstream/
    size: null
    checksum: metadata/sha256_manifest.txt
    large_file: false
  dataset_files:
  - id: oc20_dataset
    path: data/oc20/
    role: finetune_data
    description_zh: UMA OC20 微调所需数据，来自 OneScience/oc20 数据集仓库。
    required: true
    required_for:
    - preflight
    - train
    - evaluate
    format: extxyz_and_ase_lmdb
    source:
      platform: modelscope
      repo_id: OneScience/oc20
      repo_type: dataset
      path: data/oc20/
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_required_dataset
    mirrors: []
    local_path: session_workdir/data/oc20/
    size: 11G
    checksum: metadata/sha256_manifest.txt
    large_file: true
  config_files:
  - id: checksum_manifest
    path: metadata/sha256_manifest.txt
    role: checksum
    description_zh: 模型包文件 SHA256 清单。
    required: true
    required_for:
    - preflight
    format: txt
    source:
      platform: modelscope
      repo_id: OneScience/UMA
      repo_type: model
      path: metadata/sha256_manifest.txt
      revision: main
      url: null
      download_method: command_ref
      command_ref: commands.download.download_model_package
    mirrors: []
    local_path: session_workdir/metadata/sha256_manifest.txt
    size: null
    checksum: null
    large_file: false
  sample_files: []
relations:
  required_datasets:
  - id: OneScience/oc20
    role: finetune_data
    required_for:
    - preflight
    - train
    - evaluate
    resource_ref:
      platform: modelscope
      repo_id: OneScience/oc20
      repo_type: dataset
      url: https://modelscope.cn/datasets/OneScience/oc20
      revision: main
      readme_path: README.md
      manifest_path: manifest.yaml
    local_path: data/oc20
  optional_datasets: []
  compatible_models: []
run_matrix:
  scenarios:
  - name: minimal_validation
    default: true
    capability: preflight
    required_datasets:
    - id: OneScience/oc20
      role: finetune_data
      local_path: data/oc20
    required_model_files:
    - scripts/preflight_uma.py
    - conf/oc20_ef_4dcu_modelscope.yaml
    - upstream/demo/run.sh
    required_data_files:
    - data/oc20/uma_oc20_finetune/train
    - data/oc20/uma_oc20_finetune/val
    preconditions:
    - OneScience/oc20 已下载到模型包根目录 data/oc20。
    command_refs:
    - commands.preflight.check_uma_package
    outputs:
    - path: stdout
      description_zh: 配置、数据路径和可选 checkpoint 检查结果。
  - name: train_dry_run
    default: false
    capability: train
    required_datasets:
    - id: OneScience/oc20
      role: finetune_data
      local_path: data/oc20
    required_model_files:
    - upstream/demo/run.sh
    - conf/oc20_ef_4dcu_modelscope.yaml
    required_data_files:
    - data/oc20/uma_oc20_finetune/train
    - data/oc20/uma_oc20_finetune/val
    preconditions:
    - 运行 cwd 为模型包根目录。
    command_refs:
    - commands.train.dry_run_oc20
    outputs:
    - path: stdout
      description_zh: torchrun 命令和 Hydra 配置预览。
capabilities:
  inference: true
  train: true
  finetune: true
  evaluate: true
  visualize: false
  deploy: false
commands:
  download:
  - name: download_model_package
    target: model
    repo_id: OneScience/UMA
    source: .
    local_path: session_workdir/
    required: true
    required_for:
    - preflight
    - train
    cwd: .
    command: modelscope download --model OneScience/UMA --local_dir session_workdir
    expected_outputs:
    - path: session_workdir/manifest.yaml
      type: file
    success_criteria:
    - exit_code == 0
    - output_path_exists
  - name: download_required_dataset
    target: dataset
    repo_id: OneScience/oc20
    source: .
    local_path: session_workdir/
    required: true
    required_for:
    - preflight
    - train
    cwd: .
    command: modelscope download --dataset OneScience/oc20 --local_dir session_workdir
    expected_outputs:
    - path: session_workdir/data/oc20/uma_oc20_finetune/train
      type: directory
    success_criteria:
    - exit_code == 0
    - output_path_exists
  preflight:
  - name: check_uma_package
    description: 检查 UMA 标准包、OC20 数据路径和适配配置。
    cwd: .
    command: python scripts/preflight_uma.py --package-root .
    required_files:
    - scripts/preflight_uma.py
    - conf/oc20_ef_4dcu_modelscope.yaml
    - data/oc20/uma_oc20_finetune/train
    - data/oc20/uma_oc20_finetune/val
    required_env:
    - python
    - pyyaml
    expected_outputs:
    - path: stdout
      type: text
    success_criteria:
    - exit_code == 0
  prepare: []
  inference: []
  train:
  - name: dry_run_oc20
    description: 生成 UMA OC20 微调命令预览，不启动训练。
    cwd: .
    command: cd upstream/demo && bash run.sh --config ../../conf/oc20_ef_4dcu_modelscope.yaml --dry-run
    required_files:
    - upstream/demo/run.sh
    - conf/oc20_ef_4dcu_modelscope.yaml
    required_env:
    - python
    - pyyaml
    expected_outputs:
    - path: stdout
      type: text
    success_criteria:
    - exit_code == 0
  finetune: []
  evaluate: []
  visualize: []
  deploy: []
expected_outputs:
- path: stdout
  type: text
  description_zh: 预检输出 UMA 配置和 OC20 数据路径 OK。
diagnostics:
- error_pattern: missing directory
  likely_cause: OC20 数据集未下载或没有放到 data/oc20。
  action: 执行 modelscope download --dataset OneScience/oc20 --local_dir session_workdir。
- error_pattern: checkpoint not present
  likely_cause: 当前本地源目录没有 UMA checkpoint。
  action: 将 uma-s-1p1_converted.pt 放到 checkpoints/ 后再做真实训练。
- error_pattern: ModuleNotFoundError
  likely_cause: 缺少 OneScience matchem、torch、ASE 或 Hydra 依赖。
  action: 执行 bash install.sh matchem，或按 OneScience UMA 示例安装环境。
domain_extension:
  matchem:
    model_family: UMA
    dataset_family: OC20
    tasks:
    - energy
    - forces
    data_format:
    - ase_lmdb
    - extxyz
    checkpoint_required_for_training: true
reproducibility:
  level: minimal
  goal: 完成 UMA 配置和 OC20 数据路径预检；具备 checkpoint 和完整依赖后可运行 dry-run 或训练。
  command_ref: commands.preflight.check_uma_package
  expected_runtime: 1-3 minutes
  expected_outputs:
  - stdout
