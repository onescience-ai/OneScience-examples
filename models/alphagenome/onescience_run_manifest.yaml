onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/alphagenome/
  name: AlphaGenome
  domain: bio
  domain_tags: [bio, genomics, regulatory_genomics]
  task: regulatory_variant_effect_prediction
  task_tags: [inference, variant_scoring, track_prediction, evaluation, finetuning]
  modalities: [dna_sequence, functional_genomics_tracks, variants]
  input_formats: [fasta, fai, vcf, tfrecord]
  output_formats: [npy, csv]
  summary: AlphaGenome OneScience 标准运行包，支持基因组区间预测、变异效应评分、轨迹预测评测和微调入口。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/alphagenome/
    repo_type: model
    url: https://modelscope.cn/models/OneScience/alphagenome/
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: alphagenome-non-commercial

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/alphagenome/
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: preflight
    cwd_after_download: 下载后切换到模型包根目录再运行命令；如果使用 --cache_dir，cwd 应为实际下载出的 OneScience/alphagenome/ 包根目录。

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh bio
  source_paths:
    - src/onescience/flax_models/alphagenome
  compatibility:
    examples_path: examples/biosciences/alphagenome
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/alphagenome_paths.yaml
    - scripts/preflight.py
    - run_inference.py
    - run_variant_scoring.py
    - run_track_prediction_eval.py
    - run_finetuning.py
    - inference.sh
    - run_variant.sh
    - run_track.sh
  entrypoints:
    preflight: scripts/preflight.py
    inference: run_inference.py
    train: null
    finetune: run_finetuning.py
    evaluate: run_track_prediction_eval.py
    visualize: null
    deploy: null

configuration_adaptation:
  changed_files:
    - file: conf/alphagenome_paths.yaml
      yaml_path: model.checkpoint_dir
      original_value: ${ONESCIENCE_MODELS_DIR}/AlphaGenome/alphagenome-all-folds
      current_value: checkpoints/alphagenome-all-folds
      reason: ModelScope 模型包下载后应在包内查找权重，不依赖原始共享目录环境变量。
    - file: conf/alphagenome_paths.yaml
      yaml_path: dataset.expected_root
      original_value: ${ONESCIENCE_DATASETS_DIR}/AlphaGenome
      current_value: data/alphagenome_dataset
      reason: 数据集由 OneScience/alphagenome_dataset 单独下载，并在模型包 data/alphagenome_dataset 下被引用。
    - file: conf/alphagenome_paths.yaml
      yaml_path: dataset.train_root
      original_value: ${ONESCIENCE_DATASETS_DIR}/AlphaGenome/v1/train
      current_value: data/alphagenome_dataset/v1/train
      reason: 当前原始数据路径只包含 ALL_FOLDS/HOMO_SAPIENS/VALID 训练树，评测命令显式匹配该子集。

files:
  model_files:
    - id: alphagenome_all_folds_checkpoint
      path: checkpoints/alphagenome-all-folds/
      role: checkpoint
      format: orbax_ocdbt
      description_zh: AlphaGenome all_folds Orbax checkpoint 权重目录。
      required: true
      required_for: [preflight, inference, variant_scoring, evaluate]
      source:
        platform: modelscope
        repo_id: OneScience/alphagenome/
        repo_type: model
        path: checkpoints/alphagenome-all-folds/
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: checkpoints/alphagenome-all-folds/
      integrity_manifest: metadata_model_files.yaml
  dataset_files:
    - id: alphagenome_dataset
      path: data/alphagenome_dataset/
      role: required_dataset
      description_zh: AlphaGenome 参考基因组和 VALID TFRecord 数据，通过数据集仓库下载后放入模型包 data/alphagenome_dataset。
      required: true
      required_for: [preflight, inference, variant_scoring, evaluate]
      source:
        platform: modelscope
        repo_id: OneScience/alphagenome_dataset
        repo_type: dataset
        path: .
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_dataset
      local_path: data/alphagenome_dataset/
  config_files:
    - id: alphagenome_paths
      path: conf/alphagenome_paths.yaml
      role: runtime_paths
      description_zh: 记录模型权重、数据集和参考基因组在标准运行包内的默认路径及配置适配说明。
      required: true
      required_for: [preflight, inference, variant_scoring, evaluate]
      local_path: conf/alphagenome_paths.yaml
  sample_files: []
  script_files:
    - id: preflight_script
      path: scripts/preflight.py
      role: preflight
      description_zh: 检查权重目录、参考基因组、FAI、关键 TFRecord 分片和 gzip 可读性。
      required: true
      required_for: [preflight]
    - id: inference_script
      path: run_inference.py
      role: inference
      description_zh: 运行基因组区间多模态预测并输出 npy 文件。
      required: true
      required_for: [inference]
    - id: variant_script
      path: run_variant_scoring.py
      role: inference
      description_zh: 对内置或 VCF 输入变异进行变异效应评分并输出 CSV。
      required: true
      required_for: [variant_scoring]
    - id: eval_script
      path: run_track_prediction_eval.py
      role: evaluate
      description_zh: 读取 TFRecord VALID 数据并计算轨迹预测指标。
      required: true
      required_for: [evaluate]

relations:
  required_datasets:
    - id: OneScience/alphagenome_dataset
      role: reference_and_eval_data
      required_for: [preflight, inference, variant_scoring, evaluate]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/alphagenome_dataset
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/alphagenome_dataset
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      expected_local_path: data/alphagenome_dataset
      adapter: null
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: preflight
      default: true
      goal: minimal_validation
      required_model_files: [alphagenome_all_folds_checkpoint]
      required_dataset_files: [alphagenome_dataset]
      required_config_files: [alphagenome_paths]
      required_datasets: [OneScience/alphagenome_dataset]
      command_refs: [commands.preflight.preflight_model]
      outputs: [preflight_ok_stdout]
      prerequisites:
        - cwd 为模型包根目录。
        - 数据集已下载或实体复制到 data/alphagenome_dataset。
    - name: interval_inference
      goal: inference
      required_model_files: [alphagenome_all_folds_checkpoint]
      required_dataset_files: [alphagenome_dataset]
      required_config_files: [alphagenome_paths]
      required_datasets: [OneScience/alphagenome_dataset]
      command_refs: [commands.inference.interval_inference]
      outputs: [npy_track_outputs]
      prerequisites:
        - 已通过 preflight。
    - name: variant_scoring
      goal: inference
      required_model_files: [alphagenome_all_folds_checkpoint]
      required_dataset_files: [alphagenome_dataset]
      required_config_files: [alphagenome_paths]
      required_datasets: [OneScience/alphagenome_dataset]
      command_refs: [commands.inference.variant_scoring]
      outputs: [variant_csv_outputs]
      prerequisites:
        - 已通过 preflight。
    - name: track_prediction_eval
      goal: evaluate
      required_model_files: [alphagenome_all_folds_checkpoint]
      required_dataset_files: [alphagenome_dataset]
      required_config_files: [alphagenome_paths]
      required_datasets: [OneScience/alphagenome_dataset]
      command_refs: [commands.evaluate.track_prediction_eval]
      outputs: [eval_csv_output]
      prerequisites:
        - 已通过 preflight。
        - VALID TFRecord 数据完整可读。

capabilities:
  inference: true
  train: false
  finetune: true
  evaluate: true
  visualize: false
  deploy: false

commands:
  download:
    - name: download_model
      cwd: .
      command: modelscope download --model OneScience/alphagenome/ --local_dir .
      description_zh: 下载模型标准运行包；若使用 --cache_dir，下载后需切换到实际模型包根目录运行。
    - name: download_dataset
      cwd: .
      command: modelscope download --dataset OneScience/alphagenome_dataset --local_dir data/alphagenome_dataset
      description_zh: 下载适配数据集到模型包 data/alphagenome_dataset。
  preflight:
    - name: preflight_model
      cwd: .
      command: python scripts/preflight.py --root . --dataset-root data/alphagenome_dataset --checkpoint-dir checkpoints/alphagenome-all-folds
      description_zh: 检查模型权重、配置、参考基因组、关键数据文件和 gzip 可读性。
  prepare: []
  inference:
    - name: interval_inference
      cwd: .
      command: bash inference.sh
      description_zh: 使用 human GRCh38 参考基因组对 chr19 示例区间生成多模态预测。
    - name: variant_scoring
      cwd: .
      command: bash run_variant.sh
      description_zh: 使用内置 demo variants 生成变异效应评分 CSV。
  train: []
  finetune:
    - name: custom_finetune
      cwd: .
      command: python run_finetuning.py --fasta_path <FASTA> --regions_csv <CSV> --bigwig_paths <BW1,BW2> --model_dir checkpoints/alphagenome-all-folds --output_dir ./finetuned_model --num_steps 1000 --batch_size 2
      description_zh: 用户自备 FASTA、区间 CSV 和 BigWig 后执行微调。
  evaluate:
    - name: track_prediction_eval
      cwd: .
      command: bash run_track.sh
      description_zh: 在 ALL_FOLDS/HOMO_SAPIENS/VALID TFRecord 上运行轨迹预测评测。
  visualize: []
  deploy: []

expected_outputs:
  - id: preflight_ok_stdout
    path: stdout
    description_zh: "输出 preflight_ok: true、checkpoint_dir、dataset_root 和参考基因组头部 SHA256。"
  - id: npy_track_outputs
    path: outputs/*.npy
    description_zh: 区间预测得到的 ATAC、DNASE、CAGE、RNA_SEQ 等 numpy 数组。
  - id: variant_csv_outputs
    path: outputs_variant/*.csv
    description_zh: 变异评分摘要和每个 scorer 的 CSV 表。
  - id: eval_csv_output
    path: outputs_track/eval_results.csv
    description_zh: 轨迹预测评测指标表。

diagnostics:
  - id: missing_checkpoint
    match: "_CHECKPOINT_METADATA"
    severity: error
    message_zh: 权重目录不是完整 Orbax checkpoint。
    fix_zh: 重新执行 modelscope download --model OneScience/alphagenome/，确认 checkpoints/alphagenome-all-folds 存在。
  - id: missing_dataset
    match: "dataset file missing"
    severity: error
    message_zh: 模型包没有找到必需数据集文件。
    fix_zh: 执行 modelscope download --dataset OneScience/alphagenome_dataset --local_dir data/alphagenome_dataset。
  - id: missing_fasta_index
    match: ".fa.fai"
    severity: error
    message_zh: 参考基因组索引缺失。
    fix_zh: 确认数据集 reference/HOMO_SAPIENS/GRCh38.p13.genome.fa.fai 已下载。
  - id: oom_or_device
    match: "RESOURCE_EXHAUSTED|out of memory|CUDA"
    severity: warning
    message_zh: AlphaGenome 推理/评测显存需求较高。
    fix_zh: 降低 batch size，仅运行预检或换用更大显存设备。

domain_extension:
  bio:
    organisms: [HOMO_SAPIENS, MUS_MUSCULUS]
    genome_builds:
      HOMO_SAPIENS: GRCh38.p13
      MUS_MUSCULUS: GRCm38.p6
    supported_outputs:
      - ATAC
      - DNASE
      - CAGE
      - RNA_SEQ
      - CHIP_TF
      - CHIP_HISTONE
      - CONTACT_MAPS
      - PROCAP
      - SPLICE_SITES
      - SPLICE_SITE_USAGE
      - SPLICE_JUNCTIONS
      - SPLICE_SITE_POSITIONS
