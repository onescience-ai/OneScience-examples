onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/AlphaGenome
  name: AlphaGenome
  domain: bio
  domain_tags:
    - bio
    - genomics
    - dna
    - regulatory_genomics
  task: genomic_sequence_function_prediction
  task_tags:
    - sequence_function_prediction
    - variant_effect_prediction
    - track_prediction_evaluation
  modalities:
    - dna_sequence
    - genomic_interval
    - variant
    - genomic_tracks
  input_formats:
    - fasta
    - fai
    - vcf
    - tfrecord
  output_formats:
    - npy
    - csv
  summary: "AlphaGenome 是用于 DNA 序列调控功能预测、变异效应评分和轨迹预测评估的 OneScience 标准运行包。"

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/AlphaGenome
    repo_type: model
    url: https://modelscope.cn/models/OneScience/AlphaGenome
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: Apache-2.0

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/AlphaGenome
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: false
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution:
    - local
    - local_slurm
    - remote_slurm
    - scnet_mcp
  environment:
    python: ">=3.10"
    requires_onescience: true
    install_command: bash install.sh bio

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh bio
  source_paths:
    - onescience/flax_models/alphagenome
  compatibility:
    examples_path: examples/biosciences/alphagenome
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: null
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - preflight_alphagenome.py
    - validate_modelscope_package.py
    - run_inference.py
    - run_variant_scoring.py
    - run_track_prediction_eval.py
    - run_finetuning.py
    - checkpoints/alphagenome-all-folds/_CHECKPOINT_METADATA
    - checkpoints/alphagenome-all-folds/manifest.ocdbt
  entrypoints:
    preflight: preflight_alphagenome.py
    inference: run_inference.py
    train: null
    finetune: run_finetuning.py
    evaluate: run_track_prediction_eval.py
    visualize: null
    deploy: null
    variant_scoring: run_variant_scoring.py
  configuration_adaptation:
    applied: false
    notes: "未修改原始配置。AlphaGenome 示例脚本通过命令行参数接收参考基因组、VCF 和评测数据路径。"

files:
  manifests:
    - path: manifest.yaml
      role: runtime_manifest
      required: true
      description_zh: "OneScience ModelScope 标准 Manifest。"
  documentation:
    - path: README.md
      role: readme
      required: true
      description_zh: "中文 README 和运行入口说明。"
  scripts:
    - path: preflight_alphagenome.py
      role: preflight
      required: true
      capabilities:
        - preflight
      description_zh: "轻量预检脚本，检查模型包结构和依赖。"
    - path: validate_modelscope_package.py
      role: package_validation
      required: true
      capabilities:
        - preflight
      description_zh: "检查 README、Manifest、repo_id、command_ref、relations 和编码。"
    - path: run_inference.py
      role: inference_entrypoint
      required: true
      capabilities:
        - inference
      description_zh: "AlphaGenome 基因组区间推理入口。"
    - path: run_variant_scoring.py
      role: variant_scoring_entrypoint
      required: true
      capabilities:
        - variant_scoring
      description_zh: "AlphaGenome SNV 变异效应评分入口。"
    - path: run_track_prediction_eval.py
      role: evaluation_entrypoint
      required: true
      capabilities:
        - evaluate
      description_zh: "AlphaGenome 轨迹预测评估入口。"
    - path: run_finetuning.py
      role: finetune_entrypoint
      required: false
      capabilities:
        - finetune
      description_zh: "AlphaGenome 微调入口，需要用户自备训练数据。"
    - path: inference.sh
      role: shell_example
      required: false
      capabilities:
        - inference
      description_zh: "推理命令示例。"
    - path: run_variant.sh
      role: shell_example
      required: false
      capabilities:
        - variant_scoring
      description_zh: "变异评分命令示例。"
    - path: run_track.sh
      role: shell_example
      required: false
      capabilities:
        - evaluate
      description_zh: "轨迹评估命令示例。"
  model_files:
    - path: checkpoints/alphagenome-all-folds/
      role: model_checkpoint
      format: orbax_ocdbt
      required: true
      size_hint: "701M"
      local_path: checkpoints/alphagenome-all-folds/
      description_zh: "AlphaGenome all-folds 本地模型权重目录。"
      source:
        platform: modelscope
        repo_id: OneScience/AlphaGenome
        repo_type: model
        download_method: command_ref
        command_ref: download_model_package
    - path: checkpoints/alphagenome-all-folds/_CHECKPOINT_METADATA
      role: checkpoint_metadata
      format: text
      required: true
      local_path: checkpoints/alphagenome-all-folds/_CHECKPOINT_METADATA
      description_zh: "Orbax checkpoint 元数据。"
      source:
        platform: modelscope
        repo_id: OneScience/AlphaGenome
        repo_type: model
        download_method: command_ref
        command_ref: download_model_package
    - path: checkpoints/alphagenome-all-folds/manifest.ocdbt
      role: ocdbt_manifest
      format: ocdbt
      required: true
      local_path: checkpoints/alphagenome-all-folds/manifest.ocdbt
      description_zh: "OCDBT manifest 文件。"
      source:
        platform: modelscope
        repo_id: OneScience/AlphaGenome
        repo_type: model
        download_method: command_ref
        command_ref: download_model_package
  user_inputs:
    - path: /path/to/GRCh38.fa
      role: reference_genome
      format: fasta
      required_for:
        - inference
        - variant_scoring
      provided_by: user
      description_zh: "用户提供的人类或小鼠参考基因组 FASTA。"
    - path: /path/to/GRCh38.fa.fai
      role: reference_genome_index
      format: fai
      required_for:
        - inference
        - variant_scoring
      provided_by: user
      description_zh: "FASTA 索引文件。"
    - path: /path/to/variants.vcf
      role: variants
      format: vcf
      required_for:
        - variant_scoring
      provided_by: user
      description_zh: "可选 VCF 变异输入。"
    - path: /path/to/alphagenome_tfrecords
      role: evaluation_data
      format: tfrecord
      required_for:
        - evaluate
      provided_by: user
      description_zh: "可选 AlphaGenome TFRecord 评测数据目录。"

relations:
  required_datasets: []
  optional_datasets: []
  user_provided_inputs:
    - reference_genome_fasta
    - reference_genome_fai
    - optional_vcf
    - optional_evaluation_tfrecords
  notes_zh: "没有固定 ModelScope 数据集依赖；输入文件由用户按任务提供。"

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      description_zh: "检查标准包结构、checkpoint 文件和可选依赖，不加载完整模型。"
      cwd: .
      required_model_files:
        - checkpoints/alphagenome-all-folds/_CHECKPOINT_METADATA
        - checkpoints/alphagenome-all-folds/manifest.ocdbt
        - checkpoints/alphagenome-all-folds/ocdbt.process_0
      required_user_inputs: []
      required_datasets: []
      command_ref: preflight
      expected_outputs:
        - stdout 包含 "PREFLIGHT OK"
    - name: interval_inference
      capability: inference
      description_zh: "对参考基因组指定区间运行 AlphaGenome 推理。"
      cwd: .
      required_model_files:
        - checkpoints/alphagenome-all-folds/
      required_user_inputs:
        - /path/to/GRCh38.fa
        - /path/to/GRCh38.fa.fai
      required_datasets: []
      command_ref: inference
      expected_outputs:
        - outputs/inference/*.npy
    - name: variant_scoring
      capability: variant_scoring
      description_zh: "对内置示例变异或用户 VCF 运行 SNV 变异效应评分。"
      cwd: .
      required_model_files:
        - checkpoints/alphagenome-all-folds/
      required_user_inputs:
        - /path/to/GRCh38.fa
        - /path/to/GRCh38.fa.fai
      optional_user_inputs:
        - /path/to/variants.vcf
      required_datasets: []
      command_ref: variant_scoring
      expected_outputs:
        - outputs/variant/variant_scoring_summary.csv
    - name: track_prediction_eval
      capability: evaluate
      description_zh: "使用用户提供的 AlphaGenome TFRecord 数据运行轨迹预测评估。"
      cwd: .
      required_model_files:
        - checkpoints/alphagenome-all-folds/
      required_user_inputs:
        - /path/to/alphagenome_tfrecords
      required_datasets: []
      command_ref: evaluate
      expected_outputs:
        - outputs/track/eval_results.csv

capabilities:
  preflight: true
  inference: true
  train: false
  finetune: true
  evaluate: true
  visualize: false
  deploy: false
  variant_scoring: true

commands:
  download:
    - name: download_model_package
      description_zh: "下载完整 AlphaGenome 标准运行包。"
      cwd: .
      command: modelscope download --model OneScience/AlphaGenome --local_dir ./AlphaGenome
      repo_id: OneScience/AlphaGenome
      repo_type: model
      expected_path: ./AlphaGenome
  preflight:
    name: preflight
    cwd: .
    command: python preflight_alphagenome.py --model_dir checkpoints/alphagenome-all-folds
    required_files:
      - preflight_alphagenome.py
      - checkpoints/alphagenome-all-folds/_CHECKPOINT_METADATA
      - checkpoints/alphagenome-all-folds/manifest.ocdbt
    expected_outputs:
      - stdout:PREFLIGHT OK
  inference:
    name: inference
    cwd: .
    command: python run_inference.py --model_dir checkpoints/alphagenome-all-folds --fasta_path /path/to/GRCh38.fa --chromosome chr19 --start 10587331 --end 11635907 --output_dir outputs/inference
    required_files:
      - run_inference.py
      - checkpoints/alphagenome-all-folds/
      - /path/to/GRCh38.fa
      - /path/to/GRCh38.fa.fai
    expected_outputs:
      - outputs/inference/*.npy
  variant_scoring:
    name: variant_scoring
    cwd: .
    command: python run_variant_scoring.py --model_dir checkpoints/alphagenome-all-folds --fasta_path /path/to/GRCh38.fa --output_dir outputs/variant
    required_files:
      - run_variant_scoring.py
      - checkpoints/alphagenome-all-folds/
      - /path/to/GRCh38.fa
      - /path/to/GRCh38.fa.fai
    expected_outputs:
      - outputs/variant/variant_scoring_summary.csv
  evaluate:
    name: evaluate
    cwd: .
    command: python run_track_prediction_eval.py --model_dir checkpoints/alphagenome-all-folds --data_dir /path/to/alphagenome_tfrecords --output_path outputs/track/eval_results.csv
    required_files:
      - run_track_prediction_eval.py
      - checkpoints/alphagenome-all-folds/
      - /path/to/alphagenome_tfrecords
    expected_outputs:
      - outputs/track/eval_results.csv

expected_outputs:
  preflight:
    - stdout:PREFLIGHT OK
  inference:
    - path: outputs/inference/*.npy
      description_zh: "每类预测输出一个 NumPy 数组文件。"
  variant_scoring:
    - path: outputs/variant/variant_scoring_summary.csv
      description_zh: "变异评分汇总表。"
  evaluate:
    - path: outputs/track/eval_results.csv
      description_zh: "轨迹预测评估指标表。"

diagnostics:
  common_errors:
    - id: missing_checkpoint_metadata
      match: "_CHECKPOINT_METADATA"
      cause_zh: "模型权重目录不完整或当前工作目录不正确。"
      fix_zh: "确认已下载 OneScience/AlphaGenome 完整仓库，并在仓库根目录运行。"
    - id: missing_fasta
      match: "fasta_path"
      cause_zh: "本地 checkpoint 推理需要用户提供参考基因组 FASTA。"
      fix_zh: "传入 --fasta_path，并确保同目录存在 .fai 索引。"
    - id: missing_onescience
      match: "ModuleNotFoundError: No module named 'onescience'"
      cause_zh: "当前 Python 环境没有安装或激活 OneScience。"
      fix_zh: "安装或激活 OneScience bio 环境后重试。"
    - id: missing_eval_data
      match: "tfrecord"
      cause_zh: "轨迹预测评估缺少用户提供的数据目录。"
      fix_zh: "使用 --data_dir 指向 AlphaGenome TFRecord 评测数据。"

domain_extension:
  bio:
    molecule_type: dna
    organisms:
      - HOMO_SAPIENS
      - MUS_MUSCULUS
    input_format:
      - fasta
      - vcf
      - tfrecord
    output_format:
      - npy
      - csv
    database_dependencies: []
    model_family: AlphaGenome
    checkpoint_format: orbax_ocdbt
