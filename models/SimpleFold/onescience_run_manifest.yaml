onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: "OneScience/simplefold/"
  name: "SimpleFold"
  domain: bio
  domain_tags:
    - bio
    - biosciences
    - protein_folding
  task: protein_structure_prediction
  task_tags:
    - protein_folding
    - structure_prediction
    - flow_matching
  modalities:
    - protein_sequence
    - protein_structure
  input_formats:
    - fasta
  output_formats:
    - mmcif
    - pdb
  summary: "SimpleFold 蛋白质结构预测 OneScience 标准运行包。"

platform_resource:
  primary:
    platform: modelscope
    repo_id: "OneScience/simplefold/"
    repo_type: model
    url: "https://modelscope.cn/models/OneScience/simplefold/"
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: MIT

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: "https://modelscope.cn/models/OneScience/simplefold/"
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution:
    - local
    - local_slurm
    - remote_slurm
    - scnet_mcp
  notes_zh:
    - "推理需要 OneScience bio 环境、PyTorch 或 MLX 后端，并可能需要 ESM-2 3B 权重。"

onescience:
  repo: "https://gitee.com/onescience-ai/onescience"
  official_links:
    gitee:
      doc: "https://gitee.com/onescience-ai/onescience-doc"
      onescience: "https://gitee.com/onescience-ai/onescience"
      skills: "https://gitee.com/onescience-ai/oneskills"
    github:
      doc: "https://github.com/onescience-ai/OneScience-doc"
      onescience: "https://github.com/onescience-ai/OneScience"
      skills: "https://github.com/onescience-ai/oneskills"
  install:
    required_by_default: false
    command: "bash install.sh bio"
  source_paths:
    - "src/onescience/models/simplefold"
    - "src/onescience/datapipes/simplefold"
    - "src/onescience/utils/simplefold"
  compatibility:
    examples_path: "examples/biosciences/simplefold"
    status: examples_compatible
    observed_source_path: "/public/home/easyscience2024/liuyx/onescience/examples/biosciences/simplefold"
    requested_source_path: "/liuyx/onescience/examples/biosciences/simplefold"
    note_zh: "任务文件中的 requested_source_path 在当前环境不可访问，整理时使用同名可读实现 observed_source_path。"

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: configs
    checkpoint_dir: checkpoints
    data_dir: datasets
    output_dir: outputs
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - onescience_run_manifest.yaml
    - manifest.yaml
    - run_inference.py
    - inference.py
    - train.py
    - train_fsdp.py
    - configs/train.yaml
    - configs/data/pdb_sp.yaml
    - scripts/preflight.py
  entrypoints:
    preflight: scripts/preflight.py
    inference: run_inference.py
    train: train.py
    finetune: null
    evaluate: null
    visualize: null
    deploy: null

environment:
  install_mode: onescience_domain
  python: "3.11"
  hardware:
    cpu: preflight_only
    gpu: recommended
    dcu: supported_by_onescience_environment
  extra_dependencies:
    - torch
    - lightning
    - hydra-core
    - omegaconf
    - biopython

files:
  model_files:
    - id: simplefold_100m_checkpoint
      path: checkpoints/simplefold_100M.ckpt
      role: checkpoint
      description_zh: "SimpleFold 100M 折叠模型权重，最小推理默认使用。"
      required: true
      required_for: [inference, evaluate]
      format: ckpt
      source:
        platform: modelscope
        repo_id: "OneScience/simplefold/"
        repo_type: model
        path: checkpoints/simplefold_100M.ckpt
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: checkpoints/simplefold_100M.ckpt
      size: "386772550"
      checksum:
        sha256: "4cd0b8a0b317a6ab8634444fffd78ce84cfd49c20fe927b83c76c36fda5f54bd"
      large_file: true
    - id: simplefold_all_checkpoints
      path: checkpoints/
      role: checkpoint
      description_zh: "SimpleFold 多尺度权重、pLDDT 权重、CCD 辅助文件。"
      required: true
      required_for: [inference, train, evaluate]
      format: directory
      source:
        platform: modelscope
        repo_id: "OneScience/simplefold/"
        repo_type: model
        path: checkpoints/
        revision: main
        url: null
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: checkpoints/
      size: "31403575090"
      checksum:
        manifest: MODEL_FILE_MANIFEST.tsv
      large_file: true
  dataset_files:
    - id: related_empty_dataset_metadata
      path: null
      role: metadata
      description_zh: "本模型关联的数据集仓库为显式关系和训练数据接口占位；原始数据路径为无。"
      required: true
      required_for: [train, evaluate]
      format: yaml
      source:
        platform: modelscope
        repo_id: "OneScience/simplefold_dataset"
        repo_type: dataset
        path: metadata/schema.yaml
        revision: main
        url: "https://modelscope.cn/datasets/OneScience/simplefold_dataset"
        download_method: command_ref
        command_ref: commands.download.download_dataset_metadata
      local_path: datasets/simplefold_dataset/metadata/schema.yaml
      size: null
      checksum: null
      large_file: false
  config_files:
    - id: train_config
      path: configs/train.yaml
      role: training_config
      description_zh: "Hydra 训练主配置，默认引用 configs/data/pdb_sp.yaml 和 100M 架构。"
      required: true
      required_for: [train, preflight]
      format: yaml
      local_path: configs/train.yaml
    - id: data_config
      path: configs/data/pdb_sp.yaml
      role: training_config
      description_zh: "训练数据配置，保留 SimpleFold 数据接口路径 ./datasets、./datasets/tokenized 和 ./datasets/manifest.json。"
      required: true
      required_for: [train, preflight]
      format: yaml
      local_path: configs/data/pdb_sp.yaml
  sample_files:
    - id: minimal_fasta
      path: examples/minimal.fasta
      role: example_input
      description_zh: "最小 FASTA 推理输入。"
      required: true
      required_for: [inference]
      format: fasta
      local_path: examples/minimal.fasta

relations:
  required_datasets:
    - id: "OneScience/simplefold_dataset"
      role: train_data
      required_for: [train, evaluate]
      resource_ref:
        platform: modelscope
        repo_id: "OneScience/simplefold_dataset"
        repo_type: dataset
        url: "https://modelscope.cn/datasets/OneScience/simplefold_dataset"
        revision: main
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: datasets/simplefold_dataset
      note_zh: "本次原始数据路径为无；推理不需要该数据集，训练/评测需要用户按 schema 补充实际数据。"
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_preflight
      default: true
      capability: preflight
      required_datasets: []
      required_model_files:
        - checkpoints/simplefold_100M.ckpt
        - checkpoints/plddt.ckpt
        - checkpoints/ccd.pkl
      required_config_files:
        - configs/train.yaml
        - configs/data/pdb_sp.yaml
      command_refs:
        - commands.preflight.check_model_package
      expected_outputs:
        - "终端输出 SimpleFold model package preflight passed"
      preconditions:
        - "在模型包根目录执行。"
    - name: minimal_inference
      default: false
      capability: inference
      required_datasets: []
      required_model_files:
        - checkpoints/simplefold_100M.ckpt
        - checkpoints/ccd.pkl
      required_config_files:
        - configs/model/architecture/foldingdit_100M.yaml
      required_input_files:
        - examples/minimal.fasta
      command_refs:
        - commands.inference.run_minimal_inference
      expected_outputs:
        - outputs/minimal_inference/predictions_simplefold_100M/
      preconditions:
        - "已安装 OneScience bio 环境。"
        - "ESM-2 3B 权重位于 $SIMPLEFOLD_ESM2_MODEL_PATH 或 $ONESCIENCE_MODELS_DIR/esm_models/esm2_t36_3B_UR50D.pt；否则运行时可能尝试联网下载。"
    - name: train_with_user_prepared_data
      default: false
      capability: train
      required_datasets:
        - id: "OneScience/simplefold_dataset"
          role: train_data
          local_path: datasets/simplefold_dataset
      required_model_files: []
      required_config_files:
        - configs/train.yaml
        - configs/data/pdb_sp.yaml
      command_refs:
        - commands.train.train_default
      expected_outputs:
        - logs/train/
      preconditions:
        - "用户已按 SimpleFold schema 准备 ./datasets、./datasets/tokenized 和 ./datasets/manifest.json。"

capabilities:
  inference: true
  train: true
  finetune: false
  evaluate: false
  visualize: false
  deploy: false

commands:
  download:
    - name: download_model_package
      description: "下载 SimpleFold 模型标准运行包。使用 --cache_dir 时，下载后 cwd 必须切换到实际模型包根目录。"
      target: model
      repo_id: "OneScience/simplefold/"
      command: "modelscope download --model OneScience/simplefold/"
      local_path: "."
      required: true
      required_for: [preflight, inference, train, evaluate]
    - name: download_dataset_metadata
      description: "下载 SimpleFold 空数据集元信息仓库。"
      target: dataset
      repo_id: "OneScience/simplefold_dataset"
      command: "modelscope download --dataset OneScience/simplefold_dataset"
      local_path: "datasets/simplefold_dataset"
      required: true
      required_for: [train, evaluate]
  preflight:
    - name: check_model_package
      description: "检查 Manifest、配置、脚本、权重、样例和训练数据接口。"
      cwd: "."
      command: "python scripts/preflight.py"
      required_files:
        - scripts/preflight.py
        - onescience_run_manifest.yaml
        - checkpoints/simplefold_100M.ckpt
        - configs/data/pdb_sp.yaml
      required_env: []
      expected_outputs:
        - path: null
          type: stdout
          description: "SimpleFold model package preflight passed"
      success_criteria:
        - "exit_code == 0"
  prepare: []
  inference:
    - name: run_minimal_inference
      description: "使用 100M 权重和示例 FASTA 执行最小推理。"
      cwd: "."
      command: "python run_inference.py --simplefold_model simplefold_100M --ckpt_dir checkpoints --fasta_path examples/minimal.fasta --output_dir outputs/minimal_inference --num_steps 10 --tau 0.01 --nsample_per_protein 1 --backend torch"
      required_files:
        - run_inference.py
        - inference.py
        - examples/minimal.fasta
        - checkpoints/simplefold_100M.ckpt
        - checkpoints/ccd.pkl
      required_env:
        - onescience_bio
      expected_outputs:
        - path: outputs/minimal_inference/predictions_simplefold_100M/
          type: directory
      success_criteria:
        - "exit_code == 0"
        - "output_path_exists"
  train:
    - name: train_default
      description: "使用用户准备的数据执行默认单机训练。"
      cwd: "."
      command: "python train.py"
      required_files:
        - train.py
        - configs/train.yaml
        - configs/data/pdb_sp.yaml
        - datasets/manifest.json
      required_env:
        - onescience_bio
      expected_outputs:
        - path: logs/train/
          type: directory
      success_criteria:
        - "exit_code == 0"
  finetune: []
  evaluate: []
  visualize: []
  deploy: []

expected_outputs:
  - path: outputs/minimal_inference/predictions_simplefold_100M/
    type: directory
    produced_by: commands.inference.run_minimal_inference
    description_zh: "预测结构输出目录，包含 mmCIF 或 PDB 文件。"
  - path: logs/train/
    type: directory
    produced_by: commands.train.train_default
    description_zh: "Lightning/Hydra 训练日志、checkpoint 和 TensorBoard 文件。"

diagnostics:
  - error_pattern: "ModuleNotFoundError"
    likely_cause: "OneScience bio 环境或依赖未安装。"
    action: "在 OneScience 根目录执行 bash install.sh bio，或确认当前 Python 环境可 import onescience。"
  - error_pattern: "No such file or directory"
    likely_cause: "模型权重、FASTA、CCD 文件或用户训练数据缺失。"
    action: "运行 python scripts/preflight.py，并按 files 与 commands.download 补齐文件。"
  - error_pattern: "Local ESM-2 3B weights not found"
    likely_cause: "ESM-2 3B 权重不在默认路径。"
    action: "设置 SIMPLEFOLD_ESM2_MODEL_PATH，或把权重放到 $ONESCIENCE_MODELS_DIR/esm_models/esm2_t36_3B_UR50D.pt。"
  - error_pattern: "CUDA out of memory"
    likely_cause: "模型规模、序列长度或采样步数超出显存。"
    action: "先使用 simplefold_100M，减少 num_steps、nsample_per_protein，或切换更大显存设备。"

configuration_adaptation:
  status: no_data_adaptation_applied
  reason_zh: "本次任务原始数据路径为无。为避免破坏模型训练接口，整理包未改写原始 Hydra 数据配置；训练数据路径仍保持 ./datasets、./datasets/tokenized 和 ./datasets/manifest.json。"
  checked_configs:
    - file: configs/data/pdb_sp.yaml
      yaml_paths:
        - datasets[0].tokenized_dir
        - datasets[0].target_dir
        - datasets[0].manifest_path
      original_values:
        datasets[0].tokenized_dir: "./datasets/tokenized"
        datasets[0].target_dir: "./datasets"
        datasets[0].manifest_path: "./datasets/manifest.json"
      current_values:
        datasets[0].tokenized_dir: "./datasets/tokenized"
        datasets[0].target_dir: "./datasets"
        datasets[0].manifest_path: "./datasets/manifest.json"
      reason: "无原始数据可适配；保留接口供用户后续放入兼容数据。"

large_resource:
  enabled: true
  total_size: "31403575090 bytes"
  file_count: 10
  download_policy: on_demand
  default_download: minimal
  minimal_files:
    - checkpoints/simplefold_100M.ckpt
    - checkpoints/ccd.pkl
  full_download:
    command: "modelscope download --model OneScience/simplefold/"
  partial_download:
    command: "modelscope download --model OneScience/simplefold/ --include checkpoints/simplefold_100M.ckpt checkpoints/ccd.pkl"

reproducibility:
  level: minimal
  goal: "完成一次 FASTA 到结构文件的最小推理。"
  command_ref: commands.inference.run_minimal_inference
  expected_runtime: "取决于 GPU/ESM 权重缓存和序列长度"

domain_extension:
  bio:
    subdomain: protein_structure
    model_family: SimpleFold
    architecture: "Transformer + flow matching"
    default_model_scale: simplefold_100M
    available_model_scales:
      - simplefold_100M
      - simplefold_360M
      - simplefold_700M
      - simplefold_1.1B
      - simplefold_1.6B
      - simplefold_3B
    training_data_interface:
      original_data_path: "无"
      user_expected_layout:
        target_dir: "./datasets"
        tokenized_dir: "./datasets/tokenized"
        manifest_path: "./datasets/manifest.json"
