onescience_manifest_version: "0.1"
resource_type: model

resource:
  id: OneScience/MeshGraphNet
  name: MeshGraphNet
  domain: cfd
  domain_tags:
    - cfd
    - vortex_shedding
    - cylinder_flow
    - mesh_graph_network
  task: transient_cylinder_flow_surrogate
  task_tags:
    - train
    - inference
    - evaluation
    - visualization
  modalities:
    - unstructured_mesh
    - graph
    - transient_flow_field
  input_formats:
    - tfrecord
    - yaml
  output_formats:
    - pth
    - gif
  summary: MeshGraphNet 标准运行包，用 OneScience MeshGraphNet 在 DeepMind CylinderFlow 数据上训练和推理二维圆柱绕流瞬态速度、压力场。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/MeshGraphNet
    repo_type: model
    url: https://modelscope.cn/models/OneScience/MeshGraphNet
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: unknown

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/MeshGraphNet
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation
    cwd_note: 如果使用 modelscope download --cache_dir 下载模型，请先 cd 到实际下载后的模型包根目录再执行 commands 中的命令。

runtime:
  enabled: true
  onescience_domain: cfd
  min_onescience_version: null
  supported_execution:
    - local_cpu_preflight
    - local_gpu_training
    - distributed_gpu_training
    - local_gpu_inference
  environment:
    required_env: {}
    optional_env:
      ONESCIENCE_CYLINDER_FLOW_DATA_DIR: 指向 OneScience/cylinder_flow 数据集仓库中的 data/cylinder_flow 目录；未设置时使用模型包根目录下的 data/cylinder_flow。
      MODELSCOPE_CACHE: ModelScope 下载缓存目录。
  dependencies:
    python: ">=3.10"
    python_packages:
      - onescience
      - torch
      - dgl
      - tensorflow
      - numpy
      - matplotlib
      - tqdm
      - ruamel.yaml
      - pyyaml

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: true
    command: bash install.sh cfd
  source_paths:
    - onescience/src/onescience/models/meshgraphnet
    - onescience/src/onescience/datapipes/cfd/deepmind_cylinderflow.py
  compatibility:
    examples_path: onescience/examples/cfd/Vortex_shedding_mgn
    status: examples_compatible
  config_loader: onescience.utils.YParams
  datapipe: onescience.datapipes.cfd.DeepMind_CylinderFlowDatapipe
  model_classes:
    - onescience.models.meshgraphnet.MeshGraphNet

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: checkpoints
    data_dir: data
    output_dir: animations
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - train.py
    - inference.py
    - conf/mgn_cylinderflow.yaml
    - scripts/preflight_vortex_shedding_mgn.py
  entrypoints:
    preflight: scripts/preflight_vortex_shedding_mgn.py
    inference: inference.py
    train: train.py
    finetune: null
    evaluate: inference.py
    visualize: inference.py
    deploy: null

files:
  model_files:
    - path: train.py
      role: training_entry
      description_zh: MeshGraphNet 训练入口，读取 conf/mgn_cylinderflow.yaml 和 OneScience/cylinder_flow 数据集。
      required: true
      required_for: [train]
      source:
        platform: modelscope
        repo_id: OneScience/MeshGraphNet
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: train.py
    - path: inference.py
      role: inference_evaluate_visualize_entry
      description_zh: MeshGraphNet 推理、评测和 GIF 可视化入口，读取 checkpoints 下训练得到的 checkpoint。
      required: true
      required_for: [inference, evaluate, visualize]
      source:
        platform: modelscope
        repo_id: OneScience/MeshGraphNet
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: inference.py
  dataset_files: []
  config_files:
    - path: conf/mgn_cylinderflow.yaml
      role: model_datapipe_training_config
      description_zh: 训练、推理和数据管道配置；已适配为默认读取模型包根目录下 data/cylinder_flow。
      required: true
      required_for: [preflight, train, inference, evaluate]
      source:
        platform: modelscope
        repo_id: OneScience/MeshGraphNet
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: conf/mgn_cylinderflow.yaml
  sample_files:
    - path: scripts/preflight_vortex_shedding_mgn.py
      role: preflight
      description_zh: 模型运行前检查脚本，验证配置、数据路径、TFRecord、meta.json、stats 和 schema。
      required: true
      required_for: [preflight]
      source:
        platform: modelscope
        repo_id: OneScience/MeshGraphNet
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: scripts/preflight_vortex_shedding_mgn.py
    - path: slurm.sh
      role: cluster_example
      description_zh: Slurm 训练示例脚本。
      required: false
      required_for: [train]
      source:
        platform: modelscope
        repo_id: OneScience/MeshGraphNet
        repo_type: model
        download_method: command_ref
        command_ref: commands.download.download_model
      local_path: slurm.sh

relations:
  required_datasets:
    - id: OneScience/cylinder_flow
      role: train_eval_inference_data
      required_for: [preflight, train, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/cylinder_flow
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/cylinder_flow
        revision: main
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: data/cylinder_flow
      expected_env: ONESCIENCE_CYLINDER_FLOW_DATA_DIR
  optional_datasets: []
  compatible_models: []

configuration_adaptation:
  - file: conf/mgn_cylinderflow.yaml
    yaml_path: datapipe.source.data_dir
    original_value: ${ONESCIENCE_DATASETS_DIR}/vortex_shedding_mgn/cylinder_flow
    current_value: data/cylinder_flow
    reason: 模型和数据集分仓上传后，网页端可将 OneScience/cylinder_flow 数据集中的 data/cylinder_flow 放到模型包根目录 data/cylinder_flow；也可用 ONESCIENCE_CYLINDER_FLOW_DATA_DIR 传给预检脚本。
  - file: conf/mgn_cylinderflow.yaml
    yaml_path: datapipe.source.stats_dir
    original_value: ${ONESCIENCE_DATASETS_DIR}/vortex_shedding_mgn/cylinder_flow/stats
    current_value: data/cylinder_flow/stats
    reason: 归一化统计量随数据集仓库上传，标准包默认按数据集相对路径读取 stats。
  - file: conf/mgn_cylinderflow.yaml
    yaml_path: datapipe.data.train_samples
    original_value: 400
    current_value: 400
    reason: 当前 train.tfrecord 足以覆盖 400 条训练轨迹，未裁剪样本数。
  - file: conf/mgn_cylinderflow.yaml
    yaml_path: datapipe.data.train_steps
    original_value: 300
    current_value: 300
    reason: meta.json trajectory_length 为 600，当前配置使用前 300 步，未超过数据可用范围。

run_matrix:
  scenarios:
    - name: preflight_cylinder_flow_tfrecord
      capability: preflight
      default: true
      required_datasets:
        - id: OneScience/cylinder_flow
          role: train_eval_inference_data
          local_path: data/cylinder_flow
      required_model_files:
        - conf/mgn_cylinderflow.yaml
        - scripts/preflight_vortex_shedding_mgn.py
      required_dataset_files:
        - data/cylinder_flow/meta.json
        - data/cylinder_flow/train.tfrecord
        - data/cylinder_flow/valid.tfrecord
        - data/cylinder_flow/test.tfrecord
        - data/cylinder_flow/stats/edge_stats.json
        - data/cylinder_flow/stats/node_stats.json
      preconditions:
        - 已下载 OneScience/cylinder_flow 数据集。
        - 数据集 data/cylinder_flow 位于模型包根目录 data/cylinder_flow，或运行预检时通过 --data-dir 指向该目录。
      command_refs:
        - commands.preflight.model_preflight
      outputs:
        - 控制台输出 [OK] Vortex shedding MGN model preflight passed
    - name: train_meshgraphnet_cylinder_flow
      capability: train
      default: true
      required_datasets:
        - id: OneScience/cylinder_flow
          role: train_data
          local_path: data/cylinder_flow
      required_model_files:
        - train.py
        - conf/mgn_cylinderflow.yaml
      required_dataset_files:
        - data/cylinder_flow/train.tfrecord
        - data/cylinder_flow/valid.tfrecord
        - data/cylinder_flow/stats/edge_stats.json
        - data/cylinder_flow/stats/node_stats.json
      preconditions:
        - 通过 model_preflight。
        - 已安装 OneScience CFD、PyTorch、DGL 和 TensorFlow。
      command_refs:
        - commands.train.train_single_gpu
      outputs:
        - checkpoints 下保存训练 checkpoint。
    - name: inference_after_training
      capability: inference
      default: true
      required_datasets:
        - id: OneScience/cylinder_flow
          role: inference_input
          local_path: data/cylinder_flow
      required_model_files:
        - inference.py
        - conf/mgn_cylinderflow.yaml
        - checkpoints
      required_dataset_files:
        - data/cylinder_flow/test.tfrecord
        - data/cylinder_flow/stats/edge_stats.json
        - data/cylinder_flow/stats/node_stats.json
      preconditions:
        - 通过 model_preflight。
        - 已运行 train_meshgraphnet_cylinder_flow 或 checkpoints 中已有兼容 checkpoint。
      command_refs:
        - commands.inference.run_inference
      outputs:
        - animations/animation_u.gif
        - animations/animation_v.gif
        - animations/animation_p.gif

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false
  distributed_training: true

commands:
  download:
    - name: download_model
      command: modelscope download --model OneScience/MeshGraphNet
      cwd: session_workdir
    - name: download_dataset
      command: modelscope download --dataset OneScience/cylinder_flow
      cwd: session_workdir
  prepare:
    - name: place_dataset_under_model_root
      command: mkdir -p data && cp -a /path/to/OneScience_cylinder_flow/data/cylinder_flow data/cylinder_flow
      cwd: .
    - name: set_dataset_env_for_preflight
      command: export ONESCIENCE_CYLINDER_FLOW_DATA_DIR=/path/to/OneScience_cylinder_flow/data/cylinder_flow
      cwd: .
  preflight:
    - name: model_preflight
      command: python scripts/preflight_vortex_shedding_mgn.py --repo-root . --data-dir data/cylinder_flow
      cwd: .
    - name: model_preflight_fast
      command: python scripts/preflight_vortex_shedding_mgn.py --repo-root . --data-dir data/cylinder_flow --skip-tfrecord-read
      cwd: .
  train:
    - name: train_single_gpu
      command: python train.py
      cwd: .
    - name: train_multi_gpu_mpirun
      command: mpirun -np <num_GPUs> python train.py
      cwd: .
  inference:
    - name: run_inference
      command: python inference.py
      cwd: .
  finetune: []
  evaluate:
    - name: run_evaluation
      command: python inference.py
      cwd: .
  visualize:
    - name: run_visualization
      command: python inference.py
      cwd: .
  deploy: []

expected_outputs:
  - name: model_preflight
    paths: []
    success_criteria:
      - 控制台输出 [OK] Vortex shedding MGN model preflight passed
  - name: training
    paths:
      - checkpoints
    success_criteria:
      - 控制台输出 Epoch 指标并保存 checkpoint。
  - name: inference
    paths:
      - animations/animation_u.gif
      - animations/animation_v.gif
      - animations/animation_p.gif
    success_criteria:
      - 控制台输出 Inference complete 并生成 GIF。

diagnostics:
  - name: missing_dataset
    symptom: missing data directory 或 TFRecord file not found
    action: 下载 OneScience/cylinder_flow，并将 data/cylinder_flow 放到模型包根目录 data/cylinder_flow。
  - name: missing_stats
    symptom: Normalization stats not found 或 missing stats file
    action: 确认数据集仓库包含 data/cylinder_flow/stats/edge_stats.json 和 node_stats.json。
  - name: missing_tensorflow
    symptom: TensorFlow is required for reading .tfrecord files
    action: 安装 OneScience CFD 环境或安装 tensorflow。
  - name: missing_dgl
    symptom: 此 DGL 版本的 Datapipe 需要 DGL 库
    action: 安装与当前 PyTorch/CUDA 匹配的 DGL。
  - name: missing_checkpoint
    symptom: Loading checkpoint from ./checkpoints 后未找到可加载 checkpoint
    action: 先运行 python train.py，或将兼容 checkpoint 放入 checkpoints。
  - name: config_data_path_wrong
    symptom: data/cylinder_flow 不存在，但数据集已下载到其他路径
    action: 将数据复制到模型包 data/cylinder_flow，或修改标准包副本 conf/mgn_cylinderflow.yaml 中 datapipe.source.data_dir 和 stats_dir。

domain_extension:
  cfd:
    physics: transient incompressible cylinder wake / vortex shedding
    simulator: comsol
    model_family: MeshGraphNet
    graph_backend: DGL
    trajectory_length: 600
    default_train_samples: 400
    default_val_samples: 10
    default_test_samples: 10
    default_steps_per_split: 300
    node_input_features:
      - velocity_u
      - velocity_v
      - node_type_one_hot_4
    edge_features:
      - relative_x
      - relative_y
      - relative_l2_distance
    output_variables:
      - velocity_u_next_or_diff
      - velocity_v_next_or_diff
      - pressure
