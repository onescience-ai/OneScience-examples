  - id: graphcast_time_diff_std
    path: time_diff_std.npy
    type: file
    produced_by: commands.prepare.generate_time_diff_std
    description_zh: GraphCast 时间差标准差。
  - id: checkpoint_model_bak
    path: data/checkpoints/model_bak.pth
    type: file
    produced_by: commands.train.train_single_gpu
    description_zh: 基础训练 checkpoint。
  - id: checkpoint_model_finetune_bak
    path: data/checkpoints/model_finetune_bak.pth
    type: file
    produced_by: commands.finetune.finetune_single_gpu
    description_zh: 微调 checkpoint。
  - id: train_loss
    path: data/checkpoints/trloss.npy
