diagnostics:
  - id: missing_onescience
    symptom: "ModuleNotFoundError: No module named 'onescience'"
    cause_zh: OneScience earth 环境未安装或未激活。
    action_zh: 在 OneScience 主仓库执行 bash install.sh earth，或切换到网站提供的 OneScience 环境。
  - id: missing_apex
    symptom: "ModuleNotFoundError: No module named 'apex'"
    cause_zh: 训练依赖 Apex 不存在。
    action_zh: 安装与当前 PyTorch/硬件匹配的 Apex，或按 OneScience earth 环境重新部署。
  - id: missing_era5_hdf5
    symptom: "未找到数据文件: ./data/data/*.h5"
    cause_zh: OneScience/ERA5 未下载或未挂载到配置指定目录。
    action_zh: 执行 modelscope download --dataset OneScience/ERA5 --local_dir ./data，或修改 conf/config.yaml 的 datapipe.dataset.data_dir。
  - id: missing_static
    symptom: "GraphCast 静态文件目录不存在"
    cause_zh: 缺少 data/static/ 静态地理场。
    action_zh: 从 OneScience/ERA5 下载静态文件，或运行 python fake_data.py 做 smoke test。
  - id: missing_metadata_json
    symptom: "GraphCast 变量元数据文件不存在"
    cause_zh: 尚未运行 get_data_json.py。
    action_zh: 在模型包根目录执行 python get_data_json.py。
  - id: missing_time_diff_std
    symptom: "GraphCast time_diff_std 文件不存在"
    cause_zh: 尚未运行 compute_time_diff_std.py。
    action_zh: 准备训练年份 ERA5 后执行 python compute_time_diff_std.py。
  - id: channel_mismatch
    symptom: "HDF5 variables 缺少配置通道"
    cause_zh: HDF5 fields.attrs.variables 与 conf/config.yaml 中 channels 不匹配。
    action_zh: 使用与 GraphCast 配置匹配的 ERA5 数据，或同步修改配置和 Manifest 的 configuration_adaptation。
  - id: missing_base_checkpoint
    symptom: "Please train the model first"
    cause_zh: finetune.py 需要 data/checkpoints/model_bak.pth。
    action_zh: 先执行 python train.py，或放置兼容 checkpoint。
  - id: missing_finetune_checkpoint
    symptom: "No such file or directory: ./data/checkpoints/model_finetune_bak.pth"
    cause_zh: inference.py 默认加载微调 checkpoint。
    action_zh: 先执行 python finetune.py，或放置兼容 checkpoint 到 data/checkpoints/model_finetune_bak.pth。
  - id: cuda_oom
    symptom: "CUDA out of memory"
    cause_zh: 显存不足或 batch size 过大。
    action_zh: 降低 conf/config.yaml 中 datapipe.dataloader.batch_size，或切换更大显存设备。

domain_extension:
  earth:
    model_family: graphcast
    forecast_type: medium_range_weather_forecast
    grid:
      spatial_resolution_degree: 0.25
      img_size:
        - 721
        - 1440
    data_source: ERA5
    dataset_id: "OneScience/ERA5"
    channel_count: 227
    default_years:
      train:
        - 1951
      validation:
        - 1952
      test:
        - 1953
    static_files_required:
      - land_mask.npy
      - soil_type.npy
      - topography.npy
      - geopotential.nc
      - land_sea_mask.nc
    notes_zh:
      - 本次任务跳过数据整理，仅在模型 Manifest 中引用 OneScience/ERA5。
      - GraphCast 训练前必须生成 data.json 和 time_diff_std.npy。
