onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: "OneScience/GraphCast/"
  name: GraphCast
  display_name_zh: GraphCast 全球天气预报模型
  domain: earth
  domain_tags:
    - weather_forecast
    - era5
    - graph_neural_network
    - global_forecasting
  task: weather_forecasting
  task_tags:
    - train
    - finetune
    - inference
    - evaluate
    - visualize
  modalities:
    - gridded_weather
  input_formats:
    - hdf5
  output_formats:
    - npy
    - png
  summary_zh: 基于图神经网络的全球中期天气预报模型标准运行包，依赖 OneScience/ERA5 数据集。

platform_resource:
  primary:
    platform: modelscope
    repo_id: "OneScience/GraphCast/"
    repo_type: model
    url: "https://modelscope.cn/models/OneScience/GraphCast/"
    revision: master
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  aliases:
    - manifest_path: manifest.yaml
      description_zh: 与 onescience_run_manifest.yaml 内容一致的兼容副本

website_integration:
  llm_handoff:
    manifest_required: true
    download_readme_first: true
    resource_url: "https://modelscope.cn/models/OneScience/GraphCast/"
    selected_resource_id: "OneScience/GraphCast/"
    selected_resource_type: model
    default_run_goal: minimal_validation
    resolve_related_datasets: true
    resolve_related_models: false
    default_manifest_path: onescience_run_manifest.yaml
    fallback_manifest_paths:
      - manifest.yaml
    run_instruction_zh: 先读取 README.md，再解析 onescience_run_manifest.yaml；默认只执行模型配置预检，训练、微调、推理和评测前必须解析并准备 OneScience/ERA5。

runtime:
  enabled: true
  supported_execution:
    - local_single_gpu
    - local_multi_gpu
    - slurm_dcu
  default_execution: local_single_gpu
  requires_gpu: true
  requires_distributed: false
  notes_zh:
    - 训练和微调脚本使用 Apex FusedAdam，环境中需提供兼容 Apex。
    - 推理脚本默认使用 cuda:0，并加载 data/checkpoints/model_finetune_bak.pth。

environment:
  install_mode: onescience_domain
  python: "3.11"
  hardware:
    cpu: preflight_only
    gpu: supported
    dcu: supported
  extra_dependencies:
    - torch
    - onescience
    - h5py
    - numpy
    - xarray
    - matplotlib
    - tqdm
    - pyyaml
    - ruamel.yaml
    - apex

onescience:
  install:
    domain: earth
    command: bash install.sh earth
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  compatibility:
    examples_path: null
    status: standard_first
    notes_zh: 当前仓库作为标准运行包直接运行，不要求复制到 OneScience examples 目录。

runtime_package:
  kind: standard_runtime_package
  package_root: .
  apply_policy: copy_to_session_workdir
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: data/checkpoints
    data_dir: data
    output_dir: result
  entrypoints:
    preflight: scripts/preflight_model.py
    inference: inference.py
    train: train.py
    finetune: finetune.py
    evaluate: result.py
    visualize: result.py
    deploy: null

configuration_adaptation:
  status: adapted_for_minimal_model_validation
  source_config: graphcast/conf/config.yaml
  adapted_config: conf/config.yaml
  reason_zh: 原始配置面向长周期全量训练且默认启用分布式；本次模型标准包不整理数据文件，默认配置调整为可快速预检和 smoke test 的最小设置，并保持数据目录为模型包内 ./data/。
  changes:
    - file: conf/config.yaml
      yaml_path: model.max_epoch
      original_value: 9999
      current_value: 1
      reason_zh: 降低默认训练成本，便于下载模型包后执行最小训练验证。
    - file: conf/config.yaml
      yaml_path: model.num_iters_step1
      original_value: 1000
      current_value: 1
      reason_zh: 缩短学习率 warmup 阶段，匹配最小验证运行。
    - file: conf/config.yaml
      yaml_path: model.num_iters_step2
      original_value: 299000
      current_value: 1
      reason_zh: 缩短余弦退火阶段，匹配最小验证运行。
    - file: conf/config.yaml
      yaml_path: model.num_iters_step3
      original_value: 11000
      current_value: 1
      reason_zh: 缩短微调阶段，便于 smoke test。
    - file: conf/config.yaml
      yaml_path: model.val_freq
      original_value: 5
      current_value: 1
      reason_zh: 最小训练时每个 batch 后即可触发验证和 checkpoint 写入。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.static_dir
      original_value: null
      current_value: ./data/static
      reason_zh: 原始脚本 train.py、finetune.py、inference.py 会读取 cfg_data.dataset.static_dir，标准包显式补齐该路径。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.train_time
      original_value:
        - 1951
        - 1952
      current_value:
        - 1951
      reason_zh: 最小训练验证只需要一个训练年份；真实训练可按 OneScience/ERA5 可用年份扩展。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.val_time
      original_value:
        - 1953
      current_value:
        - 1952
      reason_zh: 与最小年份集合对齐，减少本地 smoke test 需要的数据文件数量。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.test_time
      original_value:
        - 1954
      current_value:
        - 1953
      reason_zh: 与最小年份集合对齐，减少本地推理和评测验证需要的数据文件数量。
    - file: conf/config.yaml
      yaml_path: datapipe.distributed.enabled
      original_value: true
      current_value: false
      reason_zh: 默认运行采用单进程，避免大模型自动运行时误触发分布式环境要求。
    - file: conf/config.yaml
      yaml_path: datapipe.distributed.world_size
      original_value: 4
      current_value: 1
      reason_zh: 与默认单进程预检和训练命令一致。

files:
  model_files:
    - id: train_script
      path: train.py
      role: script
      description_zh: GraphCast 训练入口，读取 ERA5 训练/验证年份并生成基础 checkpoint。
      required: true
      required_for: [train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: train.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/train.py
      large_file: false
    - id: finetune_script
      path: finetune.py
      role: script
      description_zh: GraphCast 微调入口，基于 model_bak.pth 执行多步 rollout 微调。
      required: true
      required_for: [finetune]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: finetune.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/finetune.py
      large_file: false
    - id: inference_script
      path: inference.py
      role: script
      description_zh: GraphCast 推理入口，加载 data/checkpoints/model_finetune_bak.pth 并输出 result/output/*.npy。
      required: true
      required_for: [inference]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: inference.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/inference.py
      large_file: false
    - id: result_script
      path: result.py
      role: script
      description_zh: 评测和可视化入口，计算 RMSE/ACC 并绘制结果图。
      required: true
      required_for: [evaluate, visualize]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: result.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/result.py
      large_file: false
    - id: compute_time_diff_std_script
      path: compute_time_diff_std.py
      role: script
      description_zh: 从训练数据计算 GraphCast 损失函数需要的 time_diff_std.npy。
      required: true
      required_for: [prepare, train, finetune]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: compute_time_diff_std.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/compute_time_diff_std.py
      large_file: false
    - id: get_data_json_script
      path: get_data_json.py
      role: script
      description_zh: 根据配置通道生成 GraphCast 变量元数据 data.json。
      required: true
      required_for: [prepare, train, finetune]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: get_data_json.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/get_data_json.py
      large_file: false
    - id: fake_data_script
      path: fake_data.py
      role: example_input
      description_zh: 生成本地虚拟 HDF5 和静态文件的辅助脚本，仅用于模型流程 smoke test。
      required: false
      required_for: [minimal_validation, train]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: fake_data.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/fake_data.py
      large_file: false
    - id: slurm_script
      path: work_slurm.sh
      role: script
      description_zh: Slurm/DCU 集群训练提交脚本，需要按实际集群环境修改。
      required: false
      required_for: [train]
      format: shell
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: work_slurm.sh
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/work_slurm.sh
      large_file: false
    - id: preflight_script
      path: scripts/preflight_model.py
      role: script
      description_zh: 模型配置、ERA5 HDF5 schema、静态文件和 GraphCast 派生统计文件预检脚本。
      required: true
      required_for: [preflight, train, finetune, inference, evaluate]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: scripts/preflight_model.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/scripts/preflight_model.py
      large_file: false
    - id: standard_validation_script
      path: scripts/validate_standard_package.py
      role: script
      description_zh: 本地标准包校验脚本，检查 README 章节、Manifest YAML、ID 一致性、relations 和 command_refs。
      required: true
      required_for: [preflight]
      format: py
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: scripts/validate_standard_package.py
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/scripts/validate_standard_package.py
      large_file: false
  config_files:
    - id: runtime_config
      path: conf/config.yaml
      role: model_config
      description_zh: GraphCast 模型、ERA5 数据路径、静态文件路径、年份、通道和训练参数配置。
      required: true
      required_for: [preflight, train, finetune, inference, evaluate, visualize]
      format: yaml
      source:
        platform: modelscope
        repo_id: "OneScience/GraphCast/"
        repo_type: model
        path: conf/config.yaml
        revision: master
        url: "https://modelscope.cn/models/OneScience/GraphCast/"
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: session_workdir/conf/config.yaml
      large_file: false
  dataset_files:
    - id: era5_hdf5_data
      path: data/
      role: train_eval_data
      description_zh: 从 OneScience/ERA5 下载或挂载的 ERA5 HDF5 数据目录，包含 data/<year>.h5、global_means、global_stds 和变量元数据。
      required: true
      required_for: [train, finetune, inference, evaluate]
      format: hdf5
      source:
        platform: modelscope
        repo_id: "OneScience/ERA5"
        repo_type: dataset
        path: .
        revision: master
        url: "https://modelscope.cn/datasets/OneScience/ERA5"
        download_method: command_ref
        command_ref: commands.download.download_era5_dataset
      local_path: session_workdir/data/
      large_file: true
    - id: era5_static_files
      path: data/static/
      role: static_fields
      description_zh: GraphCast 运行需要的静态地理场，包括 land_mask.npy、soil_type.npy、topography.npy、geopotential.nc、land_sea_mask.nc。
      required: true
      required_for: [train, finetune, inference]
      format: mixed
      source:
        platform: modelscope
        repo_id: "OneScience/ERA5"
        repo_type: dataset
        path: static/
        revision: master
        url: "https://modelscope.cn/datasets/OneScience/ERA5"
        download_method: command_ref
        command_ref: commands.download.download_era5_dataset
      local_path: session_workdir/data/static/
      large_file: true
    - id: graphcast_metadata_json
      path: data.json
      role: derived_metadata
      description_zh: 由 get_data_json.py 根据配置通道生成的 GraphCast 通道元数据。
      required: true
      required_for: [train, finetune]
      format: json
      source:
        platform: local_generated
        command_ref: commands.prepare.generate_data_json
      local_path: session_workdir/data.json
      large_file: false
    - id: graphcast_time_diff_std
      path: time_diff_std.npy
      role: derived_statistics
      description_zh: 由 compute_time_diff_std.py 根据训练年份数据生成的时间差标准差。
      required: true
      required_for: [train, finetune]
      format: npy
      source:
        platform: local_generated
        command_ref: commands.prepare.generate_time_diff_std
      local_path: session_workdir/time_diff_std.npy
      large_file: false
  sample_files: []

relations:
  required_datasets:
    - id: "OneScience/ERA5"
      role: train_eval_data
      required_for: [train, finetune, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: "OneScience/ERA5"
        repo_type: dataset
        url: "https://modelscope.cn/datasets/OneScience/ERA5"
        revision: master
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: data/
      notes_zh: 本次只整理模型仓库；数据集已上传为 OneScience/ERA5，应从该数据集仓库下载或由环境挂载。
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_config_preflight
      display_name_zh: 最小模型配置预检
      default: true
      capability: preflight
      required_datasets: []
      required_model_files:
        - conf/config.yaml
        - scripts/preflight_model.py
      required_dataset_files: []
      command_refs:
        - commands.preflight.check_model_config
      expected_outputs:
        - preflight_config_ok
      preconditions:
        - 已下载模型标准包并切换到包根目录。
    - name: era5_data_preflight
      display_name_zh: ERA5 与 GraphCast 派生文件预检
      default: false
      capability: preflight
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_eval_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - scripts/preflight_model.py
        - get_data_json.py
        - compute_time_diff_std.py
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
        - data/data/1953.h5
        - data/static/land_mask.npy
        - data/static/soil_type.npy
        - data/static/topography.npy
        - data/static/geopotential.nc
        - data/static/land_sea_mask.nc
        - data.json
        - time_diff_std.npy
      command_refs:
        - commands.download.download_era5_dataset
        - commands.prepare.generate_data_json
        - commands.prepare.generate_time_diff_std
        - commands.preflight.check_model_and_data
      expected_outputs:
        - preflight_data_ok
      preconditions:
        - OneScience/ERA5 已下载或挂载到 conf/config.yaml 中 datapipe.dataset.data_dir 指向的目录。
    - name: train_minimal
      display_name_zh: 最小训练
      default: false
      capability: train
      required_datasets:
        - id: "OneScience/ERA5"
          role: train_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - train.py
        - data.json
        - time_diff_std.npy
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
        - data/static/
      command_refs:
        - commands.preflight.check_model_and_data
        - commands.train.train_single_gpu
      expected_outputs:
        - checkpoint_model_bak
        - train_loss
      preconditions:
        - OneScience earth 环境已激活。
        - GPU 或 DCU 训练环境可用。
    - name: finetune_after_training
      display_name_zh: 基于训练 checkpoint 微调
      default: false
      capability: finetune
      required_datasets:
        - id: "OneScience/ERA5"
          role: finetune_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - finetune.py
        - data/checkpoints/model_bak.pth
        - data.json
        - time_diff_std.npy
      required_dataset_files:
        - data/data/1951.h5
        - data/data/1952.h5
        - data/static/
      command_refs:
        - commands.preflight.check_model_and_data
        - commands.finetune.finetune_single_gpu
      expected_outputs:
        - checkpoint_model_finetune_bak
        - finetune_loss
      preconditions:
        - data/checkpoints/model_bak.pth 已由训练生成或由用户放置。
    - name: inference_after_finetune
      display_name_zh: 基于微调 checkpoint 推理
      default: false
      capability: inference
      required_datasets:
        - id: "OneScience/ERA5"
          role: inference_input
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - inference.py
        - data/checkpoints/model_finetune_bak.pth
      required_dataset_files:
        - data/data/1953.h5
        - data/static/
      command_refs:
        - commands.preflight.check_model_and_data
        - commands.inference.run_inference
      expected_outputs:
        - inference_outputs
      preconditions:
        - data/checkpoints/model_finetune_bak.pth 已由微调生成或由用户放置。
    - name: evaluate_and_visualize
      display_name_zh: 评测与可视化
      default: false
      capability: evaluate
      required_datasets:
        - id: "OneScience/ERA5"
          role: eval_data
          local_path: data/
      required_model_files:
        - conf/config.yaml
        - result.py
        - data/checkpoints/trloss.npy
      required_dataset_files:
        - data/data/1953.h5
        - result/output/*.npy
      command_refs:
        - commands.evaluate.run_evaluate
      expected_outputs:
        - rmse_metrics
        - acc_metrics
        - loss_png
        - visualization_png
      preconditions:
        - 训练和推理已完成。

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: true
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载 GraphCast 模型标准运行包。
      target: model
      repo_id: "OneScience/GraphCast/"
      source: .
      local_path: ./earth_graphcast
      required: true
      required_for: [preflight, train, finetune, inference, evaluate, visualize]
      cwd: .
      command: "modelscope download --model OneScience/GraphCast/ --local_dir ./earth_graphcast"
      expected_outputs:
        - path: ./earth_graphcast/onescience_run_manifest.yaml
          type: file
        - path: ./earth_graphcast/conf/config.yaml
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: download_era5_dataset
      description: 下载模型运行所需 ERA5 数据集到模型包 data 目录。
      target: dataset
      repo_id: "OneScience/ERA5"
      source: .
      local_path: ./data
      required: true
      required_for: [train, finetune, inference, evaluate]
      cwd: .
      command: "modelscope download --dataset OneScience/ERA5 --local_dir ./data"
      expected_outputs:
        - path: ./data
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  preflight:
    - name: check_environment
      description: 检查基础 Python 与 OneScience 依赖是否可导入。
      cwd: .
      command: "python -c \"import torch, h5py, yaml; import onescience; print('environment ok')\""
      required_files: []
      required_env:
        - python
        - onescience
      expected_outputs:
        - path: stdout
          type: text
          contains: environment ok
      success_criteria:
        - exit_code == 0
    - name: check_model_config
      description: 不读取数据，只检查模型配置、年份、变量、静态路径和 checkpoint 设置。
      cwd: .
      command: "python scripts/preflight_model.py --config conf/config.yaml"
      required_files:
        - conf/config.yaml
        - scripts/preflight_model.py
      required_env:
        - python
        - pyyaml
        - h5py
        - numpy
      expected_outputs:
        - path: stdout
          type: text
          contains: "[OK] 配置可解析"
      success_criteria:
        - exit_code == 0
    - name: check_model_and_data
      description: 检查模型配置、ERA5 HDF5 文件结构、变量、静态文件和 GraphCast 派生统计文件。
      cwd: .
      command: "python scripts/preflight_model.py --config conf/config.yaml --check-data"
      required_files:
        - conf/config.yaml
        - scripts/preflight_model.py
        - data/data/*.h5
        - data/static/
        - data.json
        - time_diff_std.npy
      required_env:
        - python
        - pyyaml
        - h5py
        - numpy
      expected_outputs:
        - path: stdout
          type: text
          contains: "[OK] HDF5 数据结构可读"
      success_criteria:
        - exit_code == 0
  prepare:
    - name: generate_fake_data_for_smoke_test
      description: 可选，生成虚拟 HDF5 和静态文件用于模型流程 smoke test；不属于数据集整理结果。
      cwd: .
      command: "python fake_data.py"
      required_files:
        - fake_data.py
        - conf/config.yaml
      required_env:
        - python
        - h5py
        - xarray
        - onescience
      expected_outputs:
        - path: data/data/1951.h5
          type: file
        - path: data/static/land_mask.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: generate_data_json
      description: 根据 conf/config.yaml 中的通道列表生成 GraphCast 变量元数据。
      cwd: .
      command: "python get_data_json.py"
      required_files:
        - get_data_json.py
        - conf/config.yaml
      required_env:
        - python
        - onescience
      expected_outputs:
        - path: data.json
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: generate_time_diff_std
      description: 从训练年份 ERA5 数据计算 GraphCast 损失函数所需 time_diff_std.npy。
      cwd: .
      command: "python compute_time_diff_std.py"
      required_files:
        - compute_time_diff_std.py
        - conf/config.yaml
        - data/data/1951.h5
      required_env:
        - python
        - onescience
        - torch
        - numpy
      expected_outputs:
        - path: time_diff_std.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  train:
    - name: train_single_gpu
      description: 单卡训练 GraphCast，默认 max_epoch=1。
      cwd: .
      command: "python train.py"
      required_files:
        - train.py
        - conf/config.yaml
        - data/data/1951.h5
        - data/data/1952.h5
        - data/static/
        - data.json
        - time_diff_std.npy
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_bak.pth
          type: file
        - path: data/checkpoints/trloss.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: train_distributed
      description: 多卡训练 GraphCast，需要 torchrun 环境和按实际硬件调整参数。
      cwd: .
      command: "torchrun --nproc_per_node=8 --nnodes=1 --rdzv_id=1000 --rdzv_backend=c10d --max_restarts=0 --master_addr=localhost --master_port=29500 train.py"
      required_files:
        - train.py
        - conf/config.yaml
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_bak.pth
          type: file
      success_criteria:
        - exit_code == 0
  finetune:
    - name: finetune_single_gpu
      description: 单卡微调 GraphCast，默认 num_iters_step3=1。
      cwd: .
      command: "python finetune.py"
      required_files:
        - finetune.py
        - conf/config.yaml
        - data/checkpoints/model_bak.pth
        - data/data/1951.h5
        - data/data/1952.h5
        - data/static/
        - data.json
        - time_diff_std.npy
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_finetune_bak.pth
          type: file
        - path: data/checkpoints/ft_trloss.npy
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
    - name: finetune_distributed
      description: 多卡微调 GraphCast，需要 torchrun 环境和按实际硬件调整参数。
      cwd: .
      command: "torchrun --nproc_per_node=8 --nnodes=1 --rdzv_id=1000 --rdzv_backend=c10d --max_restarts=0 --master_addr=localhost --master_port=29500 finetune.py"
      required_files:
        - finetune.py
        - conf/config.yaml
        - data/checkpoints/model_bak.pth
      required_env:
        - python
        - onescience
        - torch
        - apex
      expected_outputs:
        - path: data/checkpoints/model_finetune_bak.pth
          type: file
      success_criteria:
        - exit_code == 0
  inference:
    - name: run_inference
      description: 加载微调 checkpoint，对测试年份 ERA5 数据执行推理。
      cwd: .
      command: "python inference.py"
      required_files:
        - inference.py
        - conf/config.yaml
        - data/checkpoints/model_finetune_bak.pth
        - data/data/1953.h5
        - data/static/
      required_env:
        - python
        - onescience
        - torch
        - h5py
      expected_outputs:
        - path: result/output
          type: directory
      success_criteria:
        - exit_code == 0
        - output_path_exists
  evaluate:
    - name: run_evaluate
      description: 计算 RMSE/ACC，并生成默认可视化图片。
      cwd: .
      command: "python result.py"
      required_files:
        - result.py
        - conf/config.yaml
        - data/checkpoints/trloss.npy
        - result/output/*.npy
        - data/data/1953.h5
      required_env:
        - python
        - h5py
        - numpy
        - matplotlib
      expected_outputs:
        - path: result/rmse.npy
          type: file
        - path: result/acc.npy
          type: file
        - path: result/loss.png
          type: file
      success_criteria:
        - exit_code == 0
        - output_path_exists
  visualize:
    - name: run_visualize
      description: result.py 在评测后同步输出默认变量的对比可视化图片。
      cwd: .
      command: "python result.py"
      required_files:
        - result.py
        - result/output/*.npy
      required_env:
        - python
        - matplotlib
      expected_outputs:
        - path: result/*.png
          type: file
      success_criteria:
        - exit_code == 0
  deploy: []

expected_outputs:
  - id: preflight_config_ok
    path: stdout
    type: text
    produced_by: commands.preflight.check_model_config
    description_zh: 输出配置可解析、通道数、年份、数据目录和 checkpoint 目录。
  - id: preflight_data_ok
    path: stdout
    type: text
    produced_by: commands.preflight.check_model_and_data
