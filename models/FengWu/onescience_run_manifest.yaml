onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/FengWu/
  name: FengWu
  domain: earth
  domain_tags: [earth, atmosphere, weather]
  task: weather_forecast
  task_tags: [weather_forecast, spatiotemporal_forecast]
  modalities: [gridded_field]
  input_formats: [hdf5]
  output_formats: [npy, png, checkpoint]
  summary: FengWu 全球天气预报 OneScience 标准运行包。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/FengWu/
    repo_type: model
    url: https://modelscope.cn/models/OneScience/FengWu/
    revision: main
    readme_path: README.md
    manifest_path: onescience_run_manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: Apache-2.0

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/FengWu/
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: earth
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]
  notes:
    - 推理和评测需要 data/checkpoints/model_bak.pth。

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh earth
  source_paths:
    - onescience.models.fengwu
    - onescience.datapipes.climate.ERA5Datapipe
  compatibility:
    examples_path: null
    status: standard_first

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: conf
    checkpoint_dir: data/checkpoints
    data_dir: data/ERA5
    output_dir: result
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - conf/config.yaml
    - scripts/preflight_fengwu.py
    - train.py
    - inference.py
    - result.py
  entrypoints:
    preflight: scripts/preflight_fengwu.py
    inference: inference.py
    train: train.py
    finetune: null
    evaluate: result.py
    visualize: result.py
    deploy: null

configuration_adaptation:
  adapted_from:
    path: ../../model/conf/config.yaml
    description: 原始模型配置副本，仅标准化包内配置被修改。
  changes:
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.data_dir
      original_value: ./data/
      current_value: ./data/ERA5
      reason: 标准化模型包要求将 OneScience/ERA5 下载到模型工作目录 data/ERA5。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.train_time
      original_value: [1951, 1952]
      current_value: [1979, 1980, 1981, 1982, 1983, 1984, 1985, 1986, 1987, 1988, 1989, 1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]
      reason: 当前整理数据只包含 1979-2025 年，原始训练年份不在数据目录中。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.val_time
      original_value: [1953]
      current_value: [2024]
      reason: 当前整理数据只包含 1979-2025 年，原始验证年份不在数据目录中。
    - file: conf/config.yaml
      yaml_path: datapipe.dataset.test_time
      original_value: [1954]
      current_value: [2025]
      reason: 当前整理数据只包含 1979-2025 年，原始测试年份不在数据目录中。

files:
  model_files:
    - id: train_script
      path: train.py
      role: script
      description_zh: FengWu 训练入口脚本。
      required: true
      required_for: [train]
      format: python
      source:
        platform: modelscope
        repo_id: OneScience/FengWu/
        repo_type: model
        path: train.py
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: train.py
      size: null
      checksum: null
      large_file: false
    - id: inference_script
      path: inference.py
      role: script
      description_zh: FengWu 推理入口脚本，需要训练生成的 checkpoint。
      required: true
      required_for: [inference]
      format: python
      source:
        platform: modelscope
        repo_id: OneScience/FengWu/
        repo_type: model
        path: inference.py
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: inference.py
      size: null
      checksum: null
      large_file: false
    - id: result_script
      path: result.py
      role: script
      description_zh: 评测和可视化脚本。
      required: true
      required_for: [evaluate, visualize]
      format: python
      source:
        platform: modelscope
        repo_id: OneScience/FengWu/
        repo_type: model
        path: result.py
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: result.py
      size: null
      checksum: null
      large_file: false
    - id: generated_checkpoint
      path: data/checkpoints/model_bak.pth
      role: checkpoint
      description_zh: 训练后生成的模型权重，推理、评测和可视化前必须存在。
      required: false
      required_for: [inference, evaluate, visualize]
      format: pth
      source:
        platform: generated
        repo_id: OneScience/FengWu/
        repo_type: model
        path: data/checkpoints/model_bak.pth
        revision: null
        download_method: produced_by_command
        command_ref: commands.train.train_single_gpu
      local_path: data/checkpoints/model_bak.pth
      size: null
      checksum: null
      large_file: true
  dataset_files: []
  config_files:
    - id: fengwu_config
      path: conf/config.yaml
      role: model_config
      description_zh: 已适配 OneScience/ERA5 当前年份和数据位置的 FengWu 配置。
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      format: yaml
      source:
        platform: modelscope
        repo_id: OneScience/FengWu/
        repo_type: model
        path: conf/config.yaml
        revision: main
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: conf/config.yaml
      size: null
      checksum: null
      large_file: false
  sample_files: []

relations:
  required_datasets:
    - id: OneScience/ERA5
      role: train_data
      required_for: [preflight, train, inference, evaluate, visualize]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/ERA5
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/ERA5
        revision: main
        readme_path: README.md
        manifest_path: onescience_run_manifest.yaml
      local_path: data/ERA5
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_validation
      default: true
      capability: preflight
      required_datasets:
        - id: OneScience/ERA5
          role: train_data
          local_path: data/ERA5
      required_model_files:
        - conf/config.yaml
        - scripts/preflight_fengwu.py
      command_refs:
        - commands.preflight.check_config_and_data
      expected_outputs:
        - FengWu preflight passed
      preconditions:
        - OneScience/ERA5 已下载到 data/ERA5。
    - name: train_from_scratch
      default: false
      capability: train
      required_datasets:
        - id: OneScience/ERA5
          role: train_data
          local_path: data/ERA5
      required_model_files:
        - conf/config.yaml
        - train.py
      command_refs:
        - commands.train.train_single_gpu
      expected_outputs:
        - data/checkpoints/model_bak.pth
        - data/checkpoints/trloss.npy
        - data/checkpoints/valoss.npy
      preconditions:
        - 预检通过。
        - OneScience earth 运行环境可用。
    - name: inference_with_trained_checkpoint
      default: false
      capability: inference
      required_datasets:
        - id: OneScience/ERA5
          role: inference_input
          local_path: data/ERA5
      required_model_files:
        - conf/config.yaml
        - inference.py
        - data/checkpoints/model_bak.pth
      command_refs:
        - commands.preflight.check_checkpoint
        - commands.inference.run_inference
      expected_outputs:
        - result/output/*.npy
      preconditions:
        - data/checkpoints/model_bak.pth 已存在。
    - name: evaluate_and_visualize
      default: false
      capability: evaluate
      required_datasets:
        - id: OneScience/ERA5
          role: eval_data
          local_path: data/ERA5
      required_model_files:
        - conf/config.yaml
        - result.py
        - data/checkpoints/model_bak.pth
      command_refs:
        - commands.evaluate.run_result
      expected_outputs:
        - result/rmse.npy
        - result/acc.npy
        - result/*.png
      preconditions:
        - 推理输出 result/output/*.npy 已存在。

capabilities:
  preflight: true
  inference: true
  train: true
  finetune: false
  evaluate: true
  visualize: true
  deploy: false

commands:
  download:
    - name: download_model_package
      description: 下载 FengWu 标准模型运行包。
      target: model
      repo_id: OneScience/FengWu/
      source: .
      local_path: session_workdir
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      command: modelscope download --model OneScience/FengWu/ --local_dir .
    - name: download_required_dataset
      description: 下载配套 ERA5 数据集到模型包期望目录。
      target: dataset
      repo_id: OneScience/ERA5
      source: .
      local_path: data/ERA5
      required: true
      required_for: [preflight, train, inference, evaluate, visualize]
      command: modelscope download --dataset OneScience/ERA5 --local_dir data/ERA5
  preflight:
    - name: check_config_and_data
      description: 检查 FengWu 配置和 ERA5 数据结构是否匹配。
      cwd: .
      command: python scripts/preflight_fengwu.py --workdir .
      required_files:
        - conf/config.yaml
        - data/ERA5/data/1979.h5
        - data/ERA5/data/2025.h5
      required_env: [python, h5py, yaml]
      expected_outputs:
        - FengWu preflight passed
      success_criteria: [exit_code == 0]
    - name: check_checkpoint
      description: 推理或评测前检查 checkpoint 是否存在。
      cwd: .
      command: python scripts/preflight_fengwu.py --workdir . --require-checkpoint
      required_files:
        - conf/config.yaml
        - data/checkpoints/model_bak.pth
      required_env: [python, h5py, yaml]
      expected_outputs:
        - FengWu preflight passed
      success_criteria: [exit_code == 0]
  prepare: []
  inference:
    - name: run_inference
      description: 使用已训练 checkpoint 对测试年份执行推理。
      cwd: .
      command: python inference.py
      required_files:
        - conf/config.yaml
        - data/checkpoints/model_bak.pth
        - data/ERA5/data/2025.h5
      required_env: [onescience, torch, h5py, numpy]
      expected_outputs:
        - path: result/output/
          type: directory
      success_criteria: [exit_code == 0, output_path_exists]
  train:
    - name: train_single_gpu
      description: 单卡训练 FengWu，输出 checkpoint 和 loss。
      cwd: .
      command: python train.py
      required_files:
        - conf/config.yaml
        - data/ERA5/data/1979.h5
        - data/ERA5/data/2024.h5
      required_env: [onescience, torch, apex, h5py, numpy]
      expected_outputs:
        - path: data/checkpoints/model_bak.pth
          type: file
        - path: data/checkpoints/trloss.npy
          type: file
        - path: data/checkpoints/valoss.npy
          type: file
      success_criteria: [exit_code == 0, output_path_exists]
    - name: train_slurm
      description: 使用 Slurm 脚本提交训练任务，提交前需检查分区和环境。
      cwd: .
      command: sbatch work_slurm.sh
      required_files:
        - work_slurm.sh
        - conf/config.yaml
      required_env: [slurm, onescience]
      expected_outputs:
        - path: logs/
          type: directory
      success_criteria: [job_submitted]
  finetune: []
  evaluate:
    - name: run_result
      description: 计算 RMSE/ACC 并生成可视化结果。
      cwd: .
      command: python result.py
      required_files:
        - conf/config.yaml
        - data/checkpoints/trloss.npy
        - data/checkpoints/valoss.npy
        - result/output/
      required_env: [onescience, h5py, numpy, matplotlib]
      expected_outputs:
        - path: result/rmse.npy
          type: file
        - path: result/acc.npy
          type: file
        - path: result/*.png
          type: files
      success_criteria: [exit_code == 0, output_path_exists]
  visualize:
    - name: run_visualization
      description: result.py 同时生成评测指标和可视化图片。
      cwd: .
      command: python result.py
      required_files:
        - result/output/
      required_env: [matplotlib, numpy]
      expected_outputs:
        - path: result/*.png
          type: files
      success_criteria: [exit_code == 0]
  deploy: []

expected_outputs:
  - path: data/checkpoints/model_bak.pth
    type: file
    produced_by: commands.train.train_single_gpu
  - path: result/output/
    type: directory
    produced_by: commands.inference.run_inference
  - path: result/rmse.npy
    type: file
    produced_by: commands.evaluate.run_result
  - path: result/acc.npy
    type: file
    produced_by: commands.evaluate.run_result
  - path: result/*.png
    type: files
    produced_by: commands.visualize.run_visualization

diagnostics:
  - id: missing_dataset
    match: missing ERA5 HDF5 directory
    severity: error
    message_zh: 数据集没有下载到 conf/config.yaml 指定的 data/ERA5。
    fix_zh: 运行 modelscope download --dataset OneScience/ERA5 --local_dir data/ERA5。
  - id: year_mismatch
    match: missing configured year files
    severity: error
    message_zh: 配置中声明的年份文件不存在。
    fix_zh: 检查 OneScience/ERA5 下载是否完整，或同步修改 conf/config.yaml 和 configuration_adaptation。
  - id: checkpoint_missing
    match: missing checkpoint for inference/evaluate
    severity: error
    message_zh: 推理或评测需要 checkpoint，但当前运行包未包含预训练权重。
    fix_zh: 先运行训练生成 data/checkpoints/model_bak.pth，或放入兼容 checkpoint。

domain_extension:
  earth:
    dataset_family: ERA5
    grid: 0.25_degree
    time_step_hours: 6
    variables_used_by_model: 189
    pressure_levels: 37
