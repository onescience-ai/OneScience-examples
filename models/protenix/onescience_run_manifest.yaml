onescience_manifest_version: "0.1"
resource_type: model
resource:
  id: OneScience/protenix/
  name: protenix
  domain: bio
  domain_tags: [bio, protein_structure, molecular_structure]
  task: protein_complex_structure_prediction
  task_tags: [structure_prediction, protein_folding, molecular_complex, alphafold3_like]
  modalities: [protein, dna, rna, ligand, msa, ccd]
  input_formats: [json, a3m, cif, pdb, sdf, smi]
  output_formats: [cif, json]
  summary: Protenix 是基于 AlphaFold3 思路实现的开源生物分子复合物结构预测模型，本标准包包含 OneScience Protenix 示例运行代码、配置、样例输入和 model_v0.5.0.pt 权重。

platform_resource:
  primary:
    platform: modelscope
    repo_id: OneScience/protenix/
    repo_type: model
    url: https://modelscope.cn/models/OneScience/protenix/
    revision: main
    readme_path: README.md
    manifest_path: manifest.yaml
  mirrors: []
  access:
    visibility: public
    license: research

website_integration:
  enabled: true
  click_target:
    platform: modelscope
    resource_url: https://modelscope.cn/models/OneScience/protenix/
  llm_handoff:
    readme_required: true
    manifest_required: true
    download_readme_first: true
    resolve_related_datasets: true
    default_run_goal: minimal_validation

runtime:
  enabled: true
  onescience_domain: bio
  min_onescience_version: null
  supported_execution: [local, local_slurm, remote_slurm, scnet_mcp]
  environment:
    python: "3.10+"
    accelerator: gpu_or_dcgu
    required_python_packages: [torch, numpy, rdkit]

onescience:
  repo: https://gitee.com/onescience-ai/onescience
  official_links:
    gitee:
      doc: https://gitee.com/onescience-ai/onescience-doc
      onescience: https://gitee.com/onescience-ai/onescience
      skills: https://gitee.com/onescience-ai/oneskills
    github:
      doc: https://github.com/onescience-ai/OneScience-doc
      onescience: https://github.com/onescience-ai/OneScience
      skills: https://github.com/onescience-ai/oneskills
  install:
    required_by_default: false
    command: bash install.sh bio
  source_paths:
    - src/onescience/models/protenix
    - src/onescience/datapipes/protenix
  compatibility:
    examples_path: examples/biosciences/protenix
    status: examples_compatible

runtime_package:
  kind: standard_runtime_package
  package_root: .
  standard_layout:
    workdir: .
    config_dir: configs
    checkpoint_dir: checkpoints
    data_dir: ../bio_protenix_dataset
    output_dir: output_unified
  apply_policy:
    mode: direct_use
    target: session_workdir
    overwrite: true
    protect_installed_onescience: true
  entry_files:
    - inference_unified_demo.sh
    - train_demo.sh
    - finetune_demo.sh
    - runner/inference_unified.py
    - runner/train.py
    - configs/inference_config.yaml
    - scripts/preflight_protenix.py
  entrypoints:
    preflight: scripts/preflight_protenix.py
    inference: inference_unified_demo.sh
    train: train_demo.sh
    finetune: finetune_demo.sh
    evaluate: null
    visualize: null
    deploy: null

configuration_adaptation:
  reason: 原始示例脚本依赖 ONESCIENCE_MODELS_DIR 和 ONESCIENCE_DATASETS_DIR；标准包需要在 ModelScope 下载后的会话工作区中直接运行，并与本次整理的数据集目录 bio_protenix_dataset 匹配。
  modified_files:
    - path: inference_unified_demo.sh
      changes:
        - yaml_path: shell.load_checkpoint_path
          original_value: ${ONESCIENCE_MODELS_DIR}/Protenix/model_v0.5.0.pt
          current_value: ./checkpoints/model_v0.5.0.pt
          reason: 权重已整理到模型仓库 checkpoints 目录。
        - yaml_path: shell.DATA_ROOT_DIR
          original_value: ${ONESCIENCE_DATASETS_DIR}/protenix/
          current_value: ../bio_protenix_dataset
          reason: 数据集标准仓库默认与模型仓库相邻放置。
    - path: train_demo.sh
      changes:
        - yaml_path: shell.DATA_ROOT_DIR
          original_value: ${ONESCIENCE_DATASETS_DIR}/protenix/
          current_value: ../bio_protenix_dataset
          reason: 训练数据根目录指向本次整理的数据集。
    - path: finetune_demo.sh
      changes:
        - yaml_path: shell.checkpoint_path
          original_value: ${ONESCIENCE_MODELS_DIR}/Protenix/model_v0.5.0.pt
          current_value: ./checkpoints/model_v0.5.0.pt
          reason: 微调默认加载本仓库权重。
        - yaml_path: shell.DATA_ROOT_DIR
          original_value: ${ONESCIENCE_DATASETS_DIR}/protenix/
          current_value: ../bio_protenix_dataset
          reason: 微调数据根目录指向本次整理的数据集。
    - path: configs/inference_config.yaml
      changes:
        - yaml_path: inference.load_checkpoint_path
          original_value: ${ONESCIENCE_MODELS_DIR}/model_v0.5.0.pt
          current_value: ./checkpoints/model_v0.5.0.pt
          reason: 与模型仓库内权重位置一致。
        - yaml_path: inference.dump_dir
          original_value: ./output
          current_value: ./output_unified
          reason: 与标准推理脚本输出目录一致。

