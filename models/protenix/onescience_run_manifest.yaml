      required: true
      required_for: [inference, finetune]
      format: pt
      source:
        platform: modelscope
        repo_id: OneScience/protenix/
        repo_type: model
        path: checkpoints/model_v0.5.0.pt
        revision: main
        url: https://modelscope.cn/models/OneScience/protenix/
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: checkpoints/model_v0.5.0.pt
      size: 1474265486
      checksum:
        sha256: 9ea20b0aba42f2256711da1d0cd081510a4b291e64375bff6b70ced70b87a5f1
      large_file: true
  dataset_files: []
  config_files:
    - id: inference_config
      path: configs/inference_config.yaml
      role: inference_config
      description_zh: 推理配置，声明默认输入、输出目录、权重路径和数据依赖。
      required: true
      required_for: [inference, preflight]
      format: yaml
      source:
        platform: modelscope
        repo_id: OneScience/protenix/
        repo_type: model
        path: configs/inference_config.yaml
        revision: main
        url: https://modelscope.cn/models/OneScience/protenix/
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: configs/inference_config.yaml
      size: null
      checksum: null
      large_file: false
  sample_files:
    - id: example_7r6r_json
      path: infer_datasets/7r6r.json
      role: example_input
      description_zh: 最小推理样例输入 JSON。
      required: true
      required_for: [inference, preflight]
      format: json
      source:
        platform: modelscope
        repo_id: OneScience/protenix/
        repo_type: model
        path: infer_datasets/7r6r.json
        revision: main
        url: https://modelscope.cn/models/OneScience/protenix/
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: infer_datasets/7r6r.json
      size: 829
      checksum: null
      large_file: false
    - id: example_7r6r_msa
      path: infer_datasets/7r6r/msa/1/
      role: example_input
      description_zh: 7r6r 样例的 pairing/non_pairing A3M MSA 文件。
      required: true
      required_for: [inference, preflight]
      format: directory
      source:
        platform: modelscope
        repo_id: OneScience/protenix/
        repo_type: model
        path: infer_datasets/7r6r/msa/1/
        revision: main
        url: https://modelscope.cn/models/OneScience/protenix/
        download_method: command_ref
        command_ref: commands.download.download_model_package
      local_path: infer_datasets/7r6r/msa/1/
      size: null
      checksum: null
      large_file: false

relations:
  required_datasets:
    - id: OneScience/protenix_dataset
      role: inference_input
      required_for: [inference, train, finetune]
      resource_ref:
        platform: modelscope
        repo_id: OneScience/protenix_dataset
        repo_type: dataset
        url: https://modelscope.cn/datasets/OneScience/protenix_dataset
        revision: main
        readme_path: README.md
        manifest_path: manifest.yaml
      local_path: ../bio_protenix_dataset
  optional_datasets: []
  compatible_models: []

run_matrix:
  scenarios:
    - name: minimal_inference_7r6r
      default: true
      capability: inference
      required_datasets:
        - id: OneScience/protenix_dataset
          role: inference_input
          local_path: ../bio_protenix_dataset
      required_model_files:
        - checkpoints/model_v0.5.0.pt
      required_config_files:
        - configs/inference_config.yaml
      required_sample_files:
        - infer_datasets/7r6r.json
        - infer_datasets/7r6r/msa/1/
      command_refs:
        - commands.preflight.model_preflight
        - commands.inference.run_unified_inference
      outputs:
        - output_unified/7r6r/seed_101/predictions/*.cif
        - output_unified/7r6r/seed_101/predictions/*summary_confidence*.json
      prerequisites:
        - OneScience bio 环境可用。
        - 数据集已下载到 ../bio_protenix_dataset 或 DATA_ROOT_DIR 指向实际数据集根目录。
    - name: train_full
      capability: train
      required_datasets:
        - id: OneScience/protenix_dataset
          role: train_data
          local_path: ../bio_protenix_dataset
      required_model_files: []
      required_config_files:
        - configs/configs_data.py
      command_refs:
        - commands.preflight.model_preflight
        - commands.train.train_demo
      outputs:
        - output/
      prerequisites:
        - 完整训练数据、MSA、mmCIF、bioassembly 和索引均可读。
        - GPU/DCU 显存和磁盘空间满足训练需求。
    - name: finetune_subset
      capability: finetune
      required_datasets:
        - id: OneScience/protenix_dataset
          role: train_data
          local_path: ../bio_protenix_dataset
      required_model_files:
        - checkpoints/model_v0.5.0.pt
      required_config_files:
        - ft_datasets/finetune_subset.txt
      command_refs:
        - commands.preflight.model_preflight
        - commands.finetune.finetune_demo
      outputs:
        - output/
      prerequisites:
        - 微调列表 ft_datasets/finetune_subset.txt 对应的数据在数据集根目录中存在。

capabilities:
  inference: true
  train: true
  finetune: true
  evaluate: false
  visualize: false
  deploy: false

commands:
  preflight:
    - name: model_preflight
      cwd: .
      command: python scripts/preflight_protenix.py --model-root . --data-root ../bio_protenix_dataset
      required_files:
        - scripts/preflight_protenix.py
        - checkpoints/model_v0.5.0.pt
        - configs/inference_config.yaml
      expected_outputs:
        - 模型预检通过
  download:
    - name: download_model_package
      cwd: session_workdir
      command: modelscope download --model OneScience/protenix/ --local_dir ./bio_protenix
      notes: 如果网页端使用 --cache_dir 下载模型，运行 cwd 必须切换到实际下载后的模型包根目录 bio_protenix，而不是 cache 根目录。
    - name: download_required_dataset
      cwd: session_workdir
      command: modelscope download --dataset OneScience/protenix_dataset --local_dir ./bio_protenix_dataset
      notes: 数据集下载后应与模型包相邻，或通过 DATA_ROOT_DIR 指向实际数据根目录。
  prepare:
    - name: set_data_root
      cwd: .
      command: export DATA_ROOT_DIR=../bio_protenix_dataset
      required_files:
        - ../bio_protenix_dataset/components.v20240608.cif
      expected_outputs:
        - DATA_ROOT_DIR 指向 Protenix 数据集根目录。
  inference:
    - name: run_unified_inference
      cwd: .
      command: bash inference_unified_demo.sh
      required_files:
        - checkpoints/model_v0.5.0.pt
        - infer_datasets/7r6r.json
        - ../bio_protenix_dataset/components.v20240608.cif
        - ../bio_protenix_dataset/components.v20240608.cif.rdkit_mol.pkl
      expected_outputs:
        - output_unified/7r6r/seed_101/predictions/
  train:
    - name: train_demo
      cwd: .
      command: bash train_demo.sh
      required_files:
        - ../bio_protenix_dataset/mmcif
        - ../bio_protenix_dataset/mmcif_bioassembly
        - ../bio_protenix_dataset/mmcif_msa
        - ../bio_protenix_dataset/indices/weightedPDB_indices_before_2021-09-30_wo_posebusters_resolution_below_9.csv.gz
      expected_outputs:
        - output/
  finetune:
    - name: finetune_demo
      cwd: .
      command: bash finetune_demo.sh
      required_files:
        - checkpoints/model_v0.5.0.pt
        - ft_datasets/finetune_subset.txt
        - ../bio_protenix_dataset/mmcif
        - ../bio_protenix_dataset/mmcif_bioassembly
      expected_outputs:
        - output/
  evaluate: []
  visualize: []
  deploy: []

expected_outputs:
  - path: output_unified/7r6r/seed_101/predictions/*.cif
    description_zh: 推理生成的结构预测 CIF 文件。
  - path: output_unified/7r6r/seed_101/predictions/*summary_confidence*.json
    description_zh: 每个采样结果的置信度摘要。
  - path: output/
    description_zh: 训练或微调输出目录，包含日志和 checkpoint。

diagnostics:
  - error_pattern: "No such file or directory"
    likely_cause: 模型权重、样例输入或数据集未下载到 Manifest 声明路径。
    action: 先执行模型和数据集下载命令，再运行 python scripts/preflight_protenix.py --model-root . --data-root ../bio_protenix_dataset。
  - error_pattern: "KeyError: 'DATA_ROOT_DIR'"
    likely_cause: 原始 Protenix 配置需要 DATA_ROOT_DIR 环境变量。
    action: export DATA_ROOT_DIR=../bio_protenix_dataset，或把变量指向实际数据集根目录。
  - error_pattern: "ModuleNotFoundError"
    likely_cause: OneScience bio 环境或 Python 依赖未安装。
    action: 执行 bash install.sh bio，并确认 PYTHONPATH 包含当前模型包和 OneScience。
  - error_pattern: "CUDA out of memory"
    likely_cause: 推理采样数、扩散步数或训练 batch 配置超过显存。
    action: 降低 N_sample、N_step、diffusion_batch_size 或使用更大显存设备。

domain_extension:
  bio:
    molecule_type: multimodal
    input_format: [json, a3m, cif, pdb, sdf, smi]
    output_format: [cif, json]
    database_dependencies:
      - id: OneScience/protenix_dataset
        role: inference_input
        local_path: ../bio_protenix_dataset
